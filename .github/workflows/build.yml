name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.12"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build dependencies
        run: |
          pip install nuitka ordered-set build wheel hatchling
          pip install -r requirements.txt

      # macOS needs Xcode command line tools for Nuitka C compilation
      - name: Install Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select --print-path || xcode-select --install

      # Windows: Nuitka auto-detects MSVC via Visual Studio Build Tools
      - name: Install MSVC Build Tools (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build compiled wheel
        run: python build_pyd.py
        env:
          NUITKA_ASSUME_YES: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.whl
          generate_release_notes: true

      # Upload to COS (PEP 503 index)
      - name: Upload to COS & update PEP 503 index
        if: startsWith(github.ref, 'refs/tags/')
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          pip install cos-python-sdk-v5
          python scripts/upload_to_cos.py dist/
