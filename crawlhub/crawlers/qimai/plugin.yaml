name: qimai
display_name: "七麦"
version: "1.0.0"
description: "七麦数据 — App Store 排行榜、关键词搜索、榜单追踪"
entry: crawlhub.crawlers.qimai.service:QimaiService
cookie:
  required: true
  stores: ["qimai.json"]
  description: "七麦数据登录态 Cookie（用于搜索 App 和获取排名数据）"

actions:
  search_app:

    display_name: "搜索应用"
    description: "在七麦数据按关键词搜索 App，返回 app_id、应用名、副标题、图标。常用于先拿 app_id 再调排名接口。"
    output_dataclass: "crawlhub.crawlers.qimai.crawler.models:SearchAppRecord"
    input_schema:
      type: object
      properties:
        keyword:
          type: string
          title: "搜索关键词"
          description: "应用名称"
        country:
          type: string
          title: "国家/地区"
          enum: ["cn", "us", "jp", "kr", "gb", "hk", "tw"]
          enum_labels: ["中国大陆", "美国", "日本", "韩国", "英国", "中国香港", "中国台湾"]
          default: "cn"
      required: ["keyword"]
    output_schema:
      app_id:
        type: VARCHAR
        label: "App ID"
        description: "App Store 应用唯一标识"
      app_name:
        type: VARCHAR
        label: "应用名称"
      subtitle:
        type: VARCHAR
        label: "副标题"
      icon:
        type: VARCHAR
        label: "图标 URL"

  get_rank_daily:
    display_name: "每日排名"
    description: "获取指定 App 在某国家某榜单的每日排名时序"
    output_dataclass: "crawlhub.crawlers.qimai.crawler.models:RankRecord"
    input_schema:
      type: object
      properties:
        app_id:
          type: string
          title: "App ID"
          description: "App Store 应用 ID"
        sdate:
          type: string
          title: "起始日期"
          description: "起始日期 YYYY-MM-DD（含）"
        edate:
          type: string
          title: "结束日期"
          description: "结束日期 YYYY-MM-DD（含）"
        brand:
          type: string
          title: "榜单类型"
          enum: ["free", "paid", "grossing"]
          enum_labels: ["免费榜（按下载量）", "付费榜（按下载量）", "畅销榜（按收入）"]
          default: "free"
        country:
          type: string
          title: "国家/地区"
          enum: ["cn", "us", "jp", "kr", "gb", "hk", "tw"]
          enum_labels: ["中国大陆", "美国", "日本", "韩国", "英国", "中国香港", "中国台湾"]
          default: "cn"
      required: ["app_id", "sdate", "edate"]
    output_schema:
      app_id:
        type: VARCHAR
        label: "App ID"
      sdate:
        type: VARCHAR
        label: "起始日期"
      edate:
        type: VARCHAR
        label: "结束日期"
      country:
        type: VARCHAR
        label: "国家/地区"
      brand:
        type: VARCHAR
        label: "榜单类型"
        description: "free / paid / grossing"
      data:
        type: JSON
        label: "排名时序"
        description: "数组，元素为 {date, rank, ...} 形式的逐日排名记录"

  get_global_rank:
    display_name: "全球排名"
    description: "获取某天的全球榜单总览：返回各国家/地区在指定分类+榜单下的 Top 应用列表"
    output_dataclass: "crawlhub.crawlers.qimai.crawler.models:GlobalRankCountry"
    input_schema:
      type: object
      properties:
        date:
          type: string
          title: "日期"
          description: "目标日期 YYYY-MM-DD"
        brand:
          type: string
          title: "榜单类型"
          enum: ["free", "paid", "grossing"]
          enum_labels: ["免费榜（按下载量）", "付费榜（按下载量）", "畅销榜（按收入）"]
          default: "grossing"
        genre:
          type: string
          title: "分类"
          enum: ["36", "6014"]
          enum_labels: ["应用（综合）", "游戏"]
          default: "6014"
        device:
          type: string
          title: "设备"
          enum: ["iphone", "ipad"]
          enum_labels: ["iPhone", "iPad"]
          default: "iphone"
      required: ["date"]
    output_schema:
      country:
        type: VARCHAR
        label: "国家/地区名称"
      country_code:
        type: VARCHAR
        label: "国家/地区代码"
        description: "ISO 3166 二字母代码"
      apps:
        type: JSON
        label: "Top 应用列表"
        description: "数组，元素为 {rank, app_id, app_name, ...}"

  get_rank_hourly:
    display_name: "小时排名"
    description: "获取指定 App 在某国家某榜单的小时级排名时序"
    output_dataclass: "crawlhub.crawlers.qimai.crawler.models:RankRecord"
    input_schema:
      type: object
      properties:
        app_id:
          type: string
          title: "App ID"
          description: "App Store 应用 ID"
        sdate:
          type: string
          title: "起始日期"
          description: "起始日期 YYYY-MM-DD（含）"
        edate:
          type: string
          title: "结束日期"
          description: "结束日期 YYYY-MM-DD（含）"
        brand:
          type: string
          title: "榜单类型"
          enum: ["free", "paid", "grossing"]
          enum_labels: ["免费榜（按下载量）", "付费榜（按下载量）", "畅销榜（按收入）"]
          default: "free"
        country:
          type: string
          title: "国家/地区"
          enum: ["cn", "us", "jp", "kr", "gb", "hk", "tw"]
          enum_labels: ["中国大陆", "美国", "日本", "韩国", "英国", "中国香港", "中国台湾"]
          default: "cn"
      required: ["app_id", "sdate", "edate"]
    output_schema:
      app_id:
        type: VARCHAR
        label: "App ID"
      sdate:
        type: VARCHAR
        label: "起始日期"
      edate:
        type: VARCHAR
        label: "结束日期"
      country:
        type: VARCHAR
        label: "国家/地区"
      brand:
        type: VARCHAR
        label: "榜单类型"
        description: "free / paid / grossing"
      data:
        type: JSON
        label: "排名时序"
        description: "数组，元素为 {datetime, rank, ...} 形式的逐小时排名记录"
