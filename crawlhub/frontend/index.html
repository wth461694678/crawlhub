    `;
}

// Called by the page bus after innerHTML is mounted. Wires up data load.
async function schAfterMount() {
    await schReloadAll();
}

async function schReloadAll() {
    try {
        const [groups, plans] = await Promise.all([
            api('/api/plan-groups'),
            api('/api/plans'),
        ]);
        _schState.groups = groups;
        _schState.plans = plans;
        schRenderGroupList();
        schRenderPlanList();
    } catch (e) {
        showToast('加载调度数据失败: ' + (e.message || e), 'error');
    }
}

function schRenderGroupList() {
    const ul = document.getElementById('sch-group-list');
    if (!ul) return;
    const allCount = _schState.plans.length;
    const items = [
        `<li class="schedule-group-item${_schState.selectedGroupId === null ? ' active' : ''}"
              onclick="schSelectGroup(null)">
            <span class="schedule-group-name">全部</span>
            <span class="schedule-group-count">${allCount}</span>
        </li>`,
    ];
    for (const g of _schState.groups) {
        const cnt = _schState.plans.filter(p => p.group_id === g.group_id).length;
        const active = _schState.selectedGroupId === g.group_id ? ' active' : '';
        items.push(`
            <li class="schedule-group-item${active}" onclick="schSelectGroup('${escapeHtml(g.group_id)}')">
                <span class="schedule-group-name">${escapeHtml(g.name)}</span>
                <span class="schedule-group-count">${cnt}</span>
                <span class="schedule-group-actions">
                    <button class="icon-btn" title="重命名" onclick="event.stopPropagation(); schRenameGroup('${escapeHtml(g.group_id)}')">✎</button>
                    <button class="icon-btn danger" title="删除" onclick="event.stopPropagation(); schDeleteGroup('${escapeHtml(g.group_id)}')">✕</button>
                </span>
            </li>
        `);
    }
    ul.innerHTML = items.join('');
}

function schSelectGroup(groupId) {
    _schState.selectedGroupId = groupId;
    _schState.expandedPlanId = null;
    schRenderGroupList();
    schRenderPlanList();
    const t = document.getElementById('sch-right-title');
    if (t) {
        if (groupId === null) {
            t.textContent = '所有调度计划';
        } else {
            const g = _schState.groups.find(x => x.group_id === groupId);
            t.textContent = g ? `${g.name} - 调度计划` : '调度计划';
        }
    }
}

function schRenderPlanList() {
    const root = document.getElementById('sch-plan-list');
    if (!root) return;
    let plans = _schState.selectedGroupId === null
        ? _schState.plans
        : _schState.plans.filter(p => p.group_id === _schState.selectedGroupId);
    // Sort by updated_at desc and cap to most recent 100 entries.
    plans = [...plans].sort((a, b) => (b.updated_at || 0) - (a.updated_at || 0));
    const totalCount = plans.length;
    if (totalCount > 100) plans = plans.slice(0, 100);
    if (plans.length === 0) {
        root.innerHTML = '<div class="empty-hint">暂无调度计划，点击右上角"新建计划"创建</div>';
        return;
    }
    const truncatedHint = totalCount > 100
        ? `<div class="muted" style="padding:6px 4px;font-size:12px;">仅展示最近更新的 100 条（共 ${totalCount} 条），按名称使用筛选定位更早条目</div>`
        : '';
    const rows = plans.map(p => {
        const triggerSummary = (p.triggers || []).map(t => {
            const dim = t.enabled ? '' : ' style="opacity:0.4;text-decoration:line-through;"';
            return `<code${dim}>${escapeHtml(t.kind)}: ${escapeHtml(t.expr)}</code>`;
        }).join(' ') || '<span class="muted">(无触发器)</span>';
        const stepCnt = (p.steps || []).length;
        const lastFired = p.last_fired_at
            ? new Date(p.last_fired_at * 1000).toLocaleString('zh-CN')
            : '从未';
        const expanded = _schState.expandedPlanId === p.plan_id;
        return `
            <div class="schedule-plan-row${expanded ? ' expanded' : ''}">
                <div class="schedule-plan-head" onclick="schTogglePlan('${escapeHtml(p.plan_id)}')">
                    <label class="toggle-switch" onclick="event.stopPropagation()" title="${p.enabled ? '已启用 — 点击停用' : '已停用 — 点击启用'}">
                        <input type="checkbox" ${p.enabled ? 'checked' : ''}
                               onchange="schToggleEnabled('${escapeHtml(p.plan_id)}', this.checked ? 1 : 0)">
                        <span class="slider"></span>
                    </label>
                    <span class="schedule-plan-name">${escapeHtml(p.name)}</span>
                    <span class="schedule-plan-triggers">${triggerSummary}</span>
                    <span class="schedule-plan-meta">步骤×${stepCnt}</span>
                    <span class="schedule-plan-meta">最近触发: ${escapeHtml(lastFired)}</span>
                    <span class="schedule-plan-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-sm" onclick="schRunPlan('${escapeHtml(p.plan_id)}')">手动运行</button>
                        <button class="btn btn-sm" onclick="schEditPlan('${escapeHtml(p.plan_id)}')">编辑</button>
                        <button class="btn btn-sm" onclick="schMovePlan('${escapeHtml(p.plan_id)}')">更换计划组</button>
                        <button class="btn btn-sm danger" onclick="schDeletePlan('${escapeHtml(p.plan_id)}')">删除</button>
                    </span>
                </div>
                ${expanded ? `<div class="schedule-plan-tasks schedule-scroll" id="sch-plan-tasks-${escapeHtml(p.plan_id)}" style="max-height:340px;"><div class="muted">加载中...</div></div>` : ''}
            </div>
        `;
    }).join('');
    root.innerHTML = truncatedHint + rows;
    if (_schState.expandedPlanId) {
        schLoadPlanTasks(_schState.expandedPlanId);
    }
}

async function schTogglePlan(planId) {
    _schState.expandedPlanId = (_schState.expandedPlanId === planId) ? null : planId;
    schRenderPlanList();
}

async function schLoadPlanTasks(planId) {
    const root = document.getElementById('sch-plan-tasks-' + planId);
    if (!root) return;
    try {
        const tasks = await api(`/api/plans/${encodeURIComponent(planId)}/tasks?limit=50`);
        if (tasks.length === 0) {
            root.innerHTML = '<div class="muted" style="padding:8px;">该计划尚未发起过任务</div>';
            return;
        }
        const rows = tasks.map(t => {
            const ts = t.created_at ? new Date(t.created_at * 1000).toLocaleString('zh-CN') : '';
            const origin = t.origin_type === 'plan_manual' ? '手动' : '调度';
            return `
                <div class="schedule-task-row">
                    <span class="muted">[${escapeHtml(origin)}]</span>
                    <code>${escapeHtml(t.task_id)}</code>
                    <span>${escapeHtml(t.platform)} / ${escapeHtml(t.task_type)}</span>
                    <span class="pill pill-${escapeHtml(t.status)}">${escapeHtml(t.status)}</span>
                    <span class="muted">${escapeHtml(ts)}</span>
                </div>
            `;
        }).join('');
        root.innerHTML = rows;
    } catch (e) {
        root.innerHTML = `<div class="error-text">加载任务失败: ${escapeHtml(e.message || String(e))}</div>`;
    }
}

// --- Group CRUD ---

async function schCreateGroup() {
    const name = await showInputDialog('新调度计划组名称', '');
    if (!name) return;
    try {
        await api('/api/plan-groups', { method: 'POST', body: JSON.stringify({ name }) });
        await schReloadAll();
        showToast('已创建调度计划组', 'success');
    } catch (e) {
        showToast('创建失败: ' + (e.message || e), 'error');
    }
}

async function schRenameGroup(groupId) {
    const g = _schState.groups.find(x => x.group_id === groupId);
    if (!g) return;
    const name = await showInputDialog('新名称', g.name);
    if (!name || name === g.name) return;
    try {
        await api('/api/plan-groups/' + encodeURIComponent(groupId), {
            method: 'PUT', body: JSON.stringify({ name }),
        });
        await schReloadAll();
    } catch (e) {
        showToast('重命名失败: ' + (e.message || e), 'error');
    }
}

async function schDeleteGroup(groupId) {
    const g = _schState.groups.find(x => x.group_id === groupId);
    if (!g) return;
    const plansInGroup = _schState.plans.filter(p => p.group_id === groupId);
    const enabledPlans = plansInGroup.filter(p => p.enabled);
    if (enabledPlans.length > 0) {
        showToast(`该组下有 ${enabledPlans.length} 个启用的调度计划，请先停用后再删除`, 'error');
        return;
    }
    let msg = `确定删除调度计划组 "${g.name}"？`;
    if (plansInGroup.length > 0) {
        msg += `\n\n此操作将一并删除组内 ${plansInGroup.length} 个已停用的计划及其触发器/步骤。`;
    }
    const ok = await showConfirmDialog({
        title: '删除调度计划组',
        message: msg,
        confirmLabel: '删除',
        variant: 'danger',
    });
    if (!ok) return;
    try {
        await api('/api/plan-groups/' + encodeURIComponent(groupId) + '?confirm=true', {
            method: 'DELETE',
        });
        if (_schState.selectedGroupId === groupId) _schState.selectedGroupId = null;
        await schReloadAll();
        showToast('已删除', 'success');
    } catch (e) {
        showToast('删除失败: ' + (e.message || e), 'error');
    }
}

// --- Plan CRUD / actions ---

async function schCreatePlan() {
    if (_schState.groups.length === 0) {
        showToast('请先创建至少一个调度计划组', 'error');
        return;
    }
    const draft = {
        plan_id: null,
        group_id: _schState.selectedGroupId || _schState.groups[0].group_id,
        name: '',
        enabled: 1,
        timezone: 'Asia/Shanghai',
        notify_on_fire_fail: 1,
        triggers: [{ kind: 'cron', expr: '0 9 * * *', enabled: 1 }],
        steps: [],
    };
    schOpenPlanEditor(draft, /*isNew=*/true);
}

async function schEditPlan(planId) {
    try {
        const plan = await api('/api/plans/' + encodeURIComponent(planId));
        schOpenPlanEditor(plan, /*isNew=*/false);
    } catch (e) {
        showToast('加载计划失败: ' + (e.message || e), 'error');
    }
}

function schOpenPlanEditor(plan, isNew) {
    const groupOpts = _schState.groups.map(g =>
        `<option value="${escapeHtml(g.group_id)}"${g.group_id === plan.group_id ? ' selected' : ''}>${escapeHtml(g.name)}</option>`
    ).join('');

    // Single-trigger model (task 4): the editor allows only ONE trigger.
    // Legacy plans with multiple triggers are gracefully migrated by keeping
    // the first one and surfacing a notice on save.
    const initialTrigger = (plan.triggers && plan.triggers.length > 0)
        ? plan.triggers[0]
        : { kind: 'cron', expr: '0 9 * * *' };
    const legacyTriggerCount = (plan.triggers || []).length;

    const html = `
        <div id="sch-modal-overlay" class="modal-overlay" onclick="if(event.target===this)schCloseModal()">
          <div class="modal" style="max-width:880px; width:90%;">
            <div class="modal-head">
                <h3>${isNew ? '新建' : '编辑'}调度计划</h3>
                <div style="flex:1;"></div>
                    <button class="icon-btn" onclick="schCloseModal()" style="margin-left:12px;">✕</button>
            </div>
            <div class="modal-body" style="max-height:70vh; overflow:auto;">
                <div class="form-grid">
                    <label>名称 <input id="sch-plan-name" value="${escapeHtml(plan.name || '')}"></label>
                    <label>所属组
                        <select id="sch-plan-group">${groupOpts}</select>
                    </label>
                </div>

                <div class="section-head">
                    <h4>触发器</h4>
                    <small class="muted">每个调度计划仅允许配置一个触发器。所有时间均为 <strong>北京时间 (Asia/Shanghai)</strong>。</small>
                </div>
                <div id="sch-trigger-area"></div>
                ${legacyTriggerCount > 1 ? `<div class="muted" style="margin-top:6px;color:var(--warn,#d97706);">该计划原有 ${legacyTriggerCount} 个触发器，已保留第 1 个；保存后其他触发器将被移除。</div>` : ''}

                <div class="section-head"><h4>步骤（按顺序提交）</h4></div>
                <div id="sch-step-rows"></div>
                <button class="btn btn-sm" onclick="schAddStep()">+ 添加步骤</button>

                <details style="margin-top:12px;">
                    <summary>预设参数说明（点击展开）</summary>
                <pre style="font-size:12px; line-height:1.5; background:var(--bg); padding:8px; border-radius:4px; border:1px solid var(--border);">
【日期/时间宏】（按调度触发的实例时间求值，时区固定为北京时间）
\${YYYYMMDD}            -> 实例日期，如 20260512
\${YYYY-MM-DD}          -> 2026-05-12（连字符是字面量，因为 Y/M/D 之间无运算）
\${YYYY-MM-DD HH:mm:ss} -> 2026-05-12 17:30:00
\${YYYYMM(DD-1)}        -> 昨天，如 20260511（运算必须用括号）
\${YYYY(MM-1)(DD+1)}    -> 上月后一天
\${YYYYMMDD_MONDAY}     -> 实例时间所在周的周一（先算周几偏移，再算 +/-），周从周一开始
\${(YYYY+1)-01-01}      -> 明年元旦（带括号才是运算；裸 YYYY-01-01 等价于 \${YYYY}-01-01）</pre>
                </details>
            </div>
            <div class="modal-foot">
                <button class="btn" onclick="schCloseModal()">取消</button>
                <button class="btn btn-primary" onclick="schSavePlan(${isNew ? 'true' : 'false'}, ${plan.plan_id ? "'" + escapeHtml(plan.plan_id) + "'" : 'null'})">保存</button>
            </div>
          </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', html);

    // Hydrate trigger + steps. Timezone is now hard-coded in payload.
    // The 'enabled' switch was removed from the modal head per UX revamp; we keep
    // the existing value (or default to 0 for new plans) and let users toggle it
    // from the plan list slider after save.
    _schEditState = {
        trigger: { kind: initialTrigger.kind || 'cron', expr: initialTrigger.expr || '' },
        steps: JSON.parse(JSON.stringify(plan.steps || [])),
        timezone: plan.timezone || 'Asia/Shanghai',
        enabled: plan.enabled ? 1 : 0,
    };
    schRenderTriggerArea();
    schRenderStepRows();
}

let _schEditState = { trigger: { kind: 'cron', expr: '' }, steps: [], timezone: 'Asia/Shanghai' };

// ─────────────────────────────────────────────────────────────────
// Trigger area — task 5: single trigger, three UI variants.
//   cron     -> visual builder (frequency + time + weekday/day) + raw fallback
//   interval -> number + unit selector
//   once     -> datetime-local input
// ─────────────────────────────────────────────────────────────────
function schRenderTriggerArea() {
    const root = document.getElementById('sch-trigger-area');
    if (!root) return;
    const t = _schEditState.trigger;
    const tabs = [
        { v: 'cron', label: '周期 (cron)' },
        { v: 'interval', label: '固定间隔' },
        { v: 'once', label: '一次性' },
    ];
    root.innerHTML = `
        <div class="trigger-tabs" style="display:flex;gap:6px;margin-bottom:10px;">
            ${tabs.map(tb => `
                <button type="button" class="btn btn-sm ${t.kind === tb.v ? 'btn-primary' : ''}"
                        onclick="schSwitchTriggerKind('${tb.v}')">${tb.label}</button>
            `).join('')}
        </div>
        <div id="sch-trigger-body"></div>
    `;
    schRenderTriggerBody();
}

function schSwitchTriggerKind(kind) {
    if (_schEditState.trigger.kind === kind) return;
    _schEditState.trigger.kind = kind;
    // Reset expr to a sensible default for the new kind.
    if (kind === 'cron') _schEditState.trigger.expr = '0 9 * * *';
    else if (kind === 'interval') _schEditState.trigger.expr = JSON.stringify({ hours: 1 });
    else if (kind === 'once') {
        const d = new Date(); d.setMinutes(d.getMinutes() + 5);
        _schEditState.trigger.expr = d.toISOString().slice(0, 16);
    }
    schRenderTriggerArea();
}

function schRenderTriggerBody() {
    const body = document.getElementById('sch-trigger-body');
    const t = _schEditState.trigger;
    if (t.kind === 'cron') {
        body.innerHTML = schCronBuilderHTML(t.expr || '0 9 * * *');
    } else if (t.kind === 'interval') {
        let parsed = { hours: 1 };
        try { parsed = JSON.parse(t.expr || '{}'); } catch (e) {}
        const unit = ['days', 'hours', 'minutes', 'seconds'].find(u => u in parsed) || 'hours';
        const n = parsed[unit] || 1;
        body.innerHTML = `
            <div style="display:flex;gap:8px;align-items:center;">
                <span>每隔</span>
                <input type="number" min="1" id="sch-int-n" value="${n}" style="width:90px;"
                       oninput="schSyncIntervalExpr()">
                <select id="sch-int-unit" onchange="schSyncIntervalExpr()">
                    <option value="seconds"${unit === 'seconds' ? ' selected' : ''}>秒</option>
                    <option value="minutes"${unit === 'minutes' ? ' selected' : ''}>分钟</option>
                    <option value="hours"${unit === 'hours' ? ' selected' : ''}>小时</option>
                    <option value="days"${unit === 'days' ? ' selected' : ''}>天</option>
                </select>
                <span class="muted">触发一次</span>
            </div>
            <div class="muted" style="margin-top:6px;font-size:12px;">将于保存时按当前时间为锚点开始计时（北京时间）。</div>
        `;
    } else if (t.kind === 'once') {
        // datetime-local format: yyyy-MM-ddTHH:mm
        let val = t.expr || '';
        if (val.length > 16) val = val.slice(0, 16);
        body.innerHTML = `
            <div style="display:flex;gap:8px;align-items:center;">
                <span>触发时间</span>
                <input type="datetime-local" id="sch-once-dt" value="${escapeHtml(val)}"
                       oninput="_schEditState.trigger.expr=this.value" style="flex:1;max-width:280px;">
                <span class="muted">（北京时间）</span>
            </div>
        `;
    }
}

function schSyncIntervalExpr() {
    const n = parseInt(document.getElementById('sch-int-n').value || '1', 10);
    const unit = document.getElementById('sch-int-unit').value;
    _schEditState.trigger.expr = JSON.stringify({ [unit]: Math.max(1, n) });
}

// Cron builder: parse `m h dom mon dow` → render visual controls + raw editor.
function schCronBuilderHTML(expr) {
    const parts = expr.split(/\s+/);
    const [mn = '0', hr = '9', dom = '*', mon = '*', dow = '*'] = parts;
    const weekdayLabels = ['一', '二', '三', '四', '五', '六', '日']; // APScheduler: 0=Mon..6=Sun
    const selectedDows = (dow === '*' ? [] : dow.split(',').map(s => parseInt(s, 10)).filter(n => !isNaN(n)));
    const isDaily = dom === '*' && mon === '*' && dow === '*';
    const isWeekly = dom === '*' && mon === '*' && dow !== '*';
    const isMonthly = dom !== '*' && dom !== '?' && !isWeekly;
    let mode = 'daily';
    if (isWeekly) mode = 'weekly'; else if (isMonthly) mode = 'monthly'; else if (!isDaily) mode = 'custom';

    return `
        <div style="display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;">
            <span class="sch-row-label">频率</span>
            <select id="sch-cron-mode" onchange="schCronModeChange()">
                <option value="daily"${mode === 'daily' ? ' selected' : ''}>每天</option>
                <option value="weekly"${mode === 'weekly' ? ' selected' : ''}>每周</option>
                <option value="monthly"${mode === 'monthly' ? ' selected' : ''}>每月</option>
            </select>

            <span class="sch-row-label" id="sch-cron-extra-label" style="${mode === 'weekly' || mode === 'monthly' ? '' : 'display:none;'}">${mode === 'weekly' ? '星期' : '日期'}</span>
            <div id="sch-cron-extra" style="${mode === 'weekly' || mode === 'monthly' ? 'display:flex;gap:6px;flex-wrap:wrap;' : 'display:none;'}">
                ${mode === 'weekly' ? weekdayLabels.map((lbl, i) => `
                    <button type="button" class="weekday-chip${selectedDows.includes(i) ? ' active' : ''}" data-dow="${i}" onclick="schCronToggleDow(this)">${lbl}</button>
                `).join('') : ''}
                ${mode === 'monthly' ? `
                    <input type="text" id="sch-cron-dom" value="${escapeHtml(dom === '*' ? '1' : dom)}" placeholder="如 1 或 1,15" style="width:160px;" oninput="schCronSyncFromUI()">
                    <span class="muted">每月第几天，逗号分隔；最大 31</span>
                ` : ''}
            </div>

            <span class="sch-row-label">时间</span>
            <div style="display:flex;gap:6px;align-items:center;">
                <input type="number" id="sch-cron-hr" min="0" max="23" value="${hr.match(/^\d+$/) ? hr : '9'}" style="width:70px;" oninput="schCronSyncFromUI()">
                <span>时</span>
                <input type="number" id="sch-cron-mn" min="0" max="59" value="${mn.match(/^\d+$/) ? mn : '0'}" style="width:70px;" oninput="schCronSyncFromUI()">
                <span>分</span>
            </div>

            <input type="hidden" id="sch-cron-raw" value="${escapeHtml(expr)}">
        </div>
    `;
}

function schCronModeChange() {
    const mode = document.getElementById('sch-cron-mode').value;
    // Re-render with sensible defaults for the chosen mode.
    const hr = document.getElementById('sch-cron-hr').value || '9';
    const mn = document.getElementById('sch-cron-mn').value || '0';
    let expr;
    if (mode === 'daily') expr = `${mn} ${hr} * * *`;
    else if (mode === 'weekly') expr = `${mn} ${hr} * * 0`; // Mon
    else if (mode === 'monthly') expr = `${mn} ${hr} 1 * *`;
    else expr = `${mn} ${hr} * * *`;
    _schEditState.trigger.expr = expr;
    schRenderTriggerBody();
}

function schCronToggleDow(btn) {
    btn.classList.toggle('active');
    schCronSyncFromUI();
}

function schCronSyncFromUI() {
    const mode = document.getElementById('sch-cron-mode').value;
    const hr = document.getElementById('sch-cron-hr').value || '0';
    const mn = document.getElementById('sch-cron-mn').value || '0';
    let dom = '*', dow = '*';
    if (mode === 'weekly') {
        const dows = Array.from(document.querySelectorAll('#sch-cron-extra .weekday-chip.active'))
            .map(el => el.dataset.dow);
        dow = dows.length > 0 ? dows.join(',') : '*';
    } else if (mode === 'monthly') {
        dom = (document.getElementById('sch-cron-dom').value || '1').trim() || '1';
    }
    const expr = `${mn} ${hr} ${dom} * ${dow}`;
    _schEditState.trigger.expr = expr;
    const raw = document.getElementById('sch-cron-raw');
    if (raw) raw.value = expr;
}

// ─────────────────────────────────────────────────────────────────
// Step rows — minimal summary; click "编辑" opens reused new-task modal
// in 'plan-step' mode (task 7).
// ─────────────────────────────────────────────────────────────────
function schRenderStepRows() {
    const root = document.getElementById('sch-step-rows');
    if (!root) return;
    if (_schEditState.steps.length === 0) {
        root.innerHTML = '<div class="muted">暂无步骤，点击下方"+ 添加步骤"开始</div>';
        return;
    }
    root.innerHTML = _schEditState.steps.map((s, i) => {
        const kindLabel = s.request_kind === 'batch' ? '批处理' : '单次';

function schMoveStep(i, delta) {
    const j = i + delta;
    if (j < 0 || j >= _schEditState.steps.length) return;
    const tmp = _schEditState.steps[i];
    _schEditState.steps[i] = _schEditState.steps[j];
    _schEditState.steps[j] = tmp;
    schRenderStepRows();
}

function schDeleteStep(i) {
    _schEditState.steps.splice(i, 1);
    schRenderStepRows();
}

function schAddStep() {

        mode: 'plan-step',

function schEditStep(i) {

async function schSavePlan(isNew, planId) {
    const name = document.getElementById('sch-plan-name').value.trim();
    if (!name) { showToast('请填写名称', 'error'); return; }
    const group_id = document.getElementById('sch-plan-group').value;
    const timezone = _schEditState.timezone || 'Asia/Shanghai';
    const enabled = (_schEditState.enabled ? 1 : 0);
    const notify_on_fire_fail = 0;

    // Validate single trigger.
    const t = _schEditState.trigger;
    if (!t || !t.expr || !String(t.expr).trim()) {
        showToast('请填写触发器表达式', 'error');
        return;
    }
    let triggerExpr = String(t.expr).trim();
    if (t.kind === 'interval') {
        // Ensure JSON object string.
        try {
            const obj = JSON.parse(triggerExpr);
            if (typeof obj !== 'object' || Array.isArray(obj)) throw new Error('需为对象');
        } catch (e) {
            showToast('间隔触发器表达式无效: ' + e.message, 'error');
            return;
        }
    }
    const triggers = [{ kind: t.kind, expr: triggerExpr, enabled: 1 }];

    // Steps were authored via the reused new-task modal — already structured
    // as {request_kind, platform, task_type, request_payload, note}.
    const steps = _schEditState.steps.map(s => {
        const out = {
            request_kind: s.request_kind,
            platform: s.platform,
            task_type: s.task_type,
            request_payload: s.request_payload || {},
        };
        if (s.note) out.note = s.note;
        return out;
    });
    if (steps.length === 0) {
        showToast('请至少添加一个步骤', 'error');
        return;
    }

    const body = { group_id, name, enabled, timezone, notify_on_fire_fail, triggers, steps };
    try {
        if (isNew) {
            await api('/api/plans', { method: 'POST', body: JSON.stringify(body) });
        } else {
            await api('/api/plans/' + encodeURIComponent(planId), {
                method: 'PUT', body: JSON.stringify(body),
            });
        }
        schCloseModal();
        await schReloadAll();
        showToast('保存成功', 'success');
    } catch (e) {
        showToast('保存失败: ' + (e.message || e), 'error');
    }
}

async function schMovePlan(planId) {
    const p = _schState.plans.find(x => x.plan_id === planId);
    if (!p) return;
    const candidates = _schState.groups.filter(g => g.group_id !== p.group_id);
    if (candidates.length === 0) { showToast('没有其他可选的调度计划组', 'error'); return; }

    const targetGroup = _schState.groups.find(g => g.group_id === targetId);
    if (!targetGroup) { showToast('未找到该组', 'error'); return; }
    try {
        // Reuse PUT with full body — we have everything cached except triggers/steps.
        const full = await api('/api/plans/' + encodeURIComponent(planId));
        full.group_id = targetGroup.group_id;
        // Strip read-only fields the server may complain about
        const body = {
            group_id: full.group_id, name: full.name, enabled: full.enabled,
            timezone: full.timezone, notify_on_fire_fail: full.notify_on_fire_fail,
            triggers: (full.triggers || []).map(t => ({ kind: t.kind, expr: t.expr, enabled: t.enabled })),
            steps: (full.steps || []).map(s => ({
                request_kind: s.request_kind,
                platform: s.platform,
                task_type: s.task_type,
                request_payload: typeof s.request_payload === 'string'
                    ? JSON.parse(s.request_payload)
                    : (s.request_payload || {}),
                ...(s.note ? { note: s.note } : {}),
            })),
        };
        await api('/api/plans/' + encodeURIComponent(planId), {
            method: 'PUT', body: JSON.stringify(body),
        });
        await schReloadAll();
        showToast('已移动到 ' + targetGroup.name, 'success');
    } catch (e) {
        showToast('移动失败: ' + (e.message || e), 'error');
    }
}

}

//   - First mount: build full skeleton via innerHTML, init ECharts.
//   - Subsequent ticks: only update stat values, KPI numbers, chart data,
//     and recent-task rows. Chart canvases are NOT recreated, so ECharts
//     diffs the option and only animates what actually changed.
async function renderDashboardSmart(main) {
    try { healthData = await api('/health'); } catch(e) { healthData = {}; }
    patchAppVersion(healthData.version);
    let dashTasks = [];

    try { dashTasks = await api('/api/tasks?limit=500'); } catch(e) { dashTasks = []; }
    _dashTasksCache = dashTasks;
    const stats = computeDashStats(dashTasks);
    const recent = dashTasks.slice(0, 5);

    if (_mountedPage !== 'dashboard') {
        // First mount on this page: build skeleton.
        main.innerHTML = renderDashboardSkeleton();
        _mountedPage = 'dashboard';
        // Initial chart paint — animation enabled (one-time intro).
        requestAnimationFrame(() => renderDashboardCharts(/*firstPaint=*/true));
    }
    // Patch dynamic regions in place. innerHTML on these small wrappers is
    // cheap; only the chart-grid is preserved verbatim.
    patchDashboardStats(stats);
    patchDashboardRecentTable(recent);
    // Chart data update — animations are off after first paint, so values
    // morph in place without restarting bars/lines/pie sweeps.
    if (_mountedPage === 'dashboard') {
        renderDashboardCharts(/*firstPaint=*/false);
    }
}

// ── Dashboard charts ─────────────────────────────────────
let _dashTasksCache = [];
const _chartInstances = {};  // id -> echarts instance

function computeDashStats(tasks) {
    const now = Date.now();
    const today0 = new Date(); today0.setHours(0, 0, 0, 0);
    const todayMs = today0.getTime();
    let todayRecords = 0, todayBytes = 0, totalRecords = 0, totalBytes = 0;
    let finished = 0, succeeded = 0;
    let durSum = 0, durCnt = 0;
    for (const t of tasks) {
        const r = t.record_count || 0;
        const b = t.total_bytes || 0;
        totalRecords += r;
        totalBytes += b;
        const created = t.created_at ? new Date(t.created_at).getTime() : 0;
        if (created >= todayMs) {
            todayRecords += r;
            todayBytes += b;
        }
        if (['succeeded', 'partial_succeeded', 'failed'].includes(t.status)) {
            finished += 1;
            if (t.status === 'succeeded' || t.status === 'partial_succeeded') succeeded += 1;
        }
        if (t.created_at && t.finished_at) {
            const d = (new Date(t.finished_at).getTime() - new Date(t.created_at).getTime()) / 1000;
            if (d > 0 && d < 86400 * 7) { durSum += d; durCnt += 1; }
        }
    }
    const successRate = finished > 0 ? Math.round((succeeded / finished) * 1000) / 10 : 0;
    const avgDur = durCnt > 0 ? durSum / durCnt : 0;
    return {
        todayRecords, todayBytes, totalRecords, totalBytes,
        successRate,
        avgDurationStr: avgDur > 0 ? formatSeconds(avgDur) : '—',
    };
}

function formatSeconds(s) {
    if (!s || s < 0) return '—';
    if (s < 60) return Math.round(s) + 's';
    if (s < 3600) return Math.round(s / 60) + 'm';
    if (s < 86400) return (s / 3600).toFixed(1) + 'h';
    return (s / 86400).toFixed(1) + 'd';
}

// ECharts shared theme — dark, matches our CSS variables.
const _CHART_THEME = {
    textStyle: { color: '#c8cad6', fontFamily: 'inherit' },
    backgroundColor: 'transparent',
};
const _STATUS_COLORS = {
    running: '#6366f1', queued: '#94a3b8',
    succeeded: '#22c55e', partial_succeeded: '#a3e635',
    failed: '#ef4444', cancelled: '#94a3b8',
    interrupted: '#f97316',
    archived: '#64748b', waiting_dependency: '#0ea5e9',
};

function _getOrInitChart(id) {
    const el = document.getElementById(id);
    if (!el || typeof echarts === 'undefined') return null;
    let inst = _chartInstances[id];
    if (inst && !inst.isDisposed() && inst.getDom() === el) return inst;
    if (inst) { try { inst.dispose(); } catch(e) {} }
    inst = echarts.init(el, null, { renderer: 'canvas' });
    _chartInstances[id] = inst;
    return inst;
}

function renderDashboardCharts(firstPaint) {
    if (typeof echarts === 'undefined') return;  // CDN failed; degrade silently
    const tasks = _dashTasksCache || [];
    const animate = !!firstPaint;
    _renderStatusChart(tasks, animate);
    _renderTrendChart(tasks, animate);
    _renderPlatformChart(tasks, animate);
    // Rate chart fetches its data from /api/dashboard/record-rate; fire-and-forget
    // so a slow request never blocks the other (purely client-side) charts.
    _refreshRateChart(animate);
}

function _renderStatusChart(tasks, animate) {
    const inst = _getOrInitChart('chart-status');
    if (!inst) return;
    const counts = {};
    for (const t of tasks) counts[t.status] = (counts[t.status] || 0) + 1;
    const data = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([k, v]) => ({
            name: STATUS_LABELS[k] || k,
            value: v,
            itemStyle: { color: _STATUS_COLORS[k] || '#94a3b8' },
        }));
    inst.setOption({
        ..._CHART_THEME,
        // animation flag controls whether the pie sweep replays.
        animation: animate,
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { bottom: 0, textStyle: { color: '#c8cad6', fontSize: 11 } },
        series: [{
            type: 'pie',
            radius: ['45%', '70%'],
            center: ['50%', '45%'],
            avoidLabelOverlap: true,
            label: { color: '#c8cad6', fontSize: 11 },
            labelLine: { lineStyle: { color: '#3a3f55' } },
            data: data.length ? data : [{ name: '暂无数据', value: 1, itemStyle: { color: '#3a3f55' } }],
        }],
    }, true);
}

function _renderTrendChart(tasks, animate) {
    const inst = _getOrInitChart('chart-trend');
    if (!inst) return;

    // Scope: user-facing top-level tasks (= "single_run + batch_run" in the
    // user's mental model). Matches the dash-stats KPI cards.
    //
    // Reality of task_type column: only 'batch_run' is a fixed sentinel.
    // Single user submissions store their action name (e.g. 'get_game_info')
    // as task_type, so we cannot whitelist by enum. Identify by predicate:
    //   - /api/tasks?limit=500 already filters parent_task_id IS NULL
    //     (include_children=false default) -> child tasks naturally absent.
    //   - Then drop housekeeping types ('probe', 'cookie_refresh') here.
    const HOUSEKEEPING = new Set(['probe', 'cookie_refresh']);
    const userTasks = tasks.filter(t => !HOUSEKEEPING.has(t.task_type));

    // Backend returns created_at / finished_at as Unix seconds (REAL column).
    // `new Date(1778557962.07)` interprets the arg as MILLISECONDS and
    // returns a 1970-01-21 date, so every bucket lookup missed and the
    // chart was stuck at all-zero. Multiply by 1000 to convert to ms first.
    // Also tolerate ISO strings (defensive — if anyone later changes the
    // serialization, the chart won't silently break again).
    const toMs = (v) => {
        if (v == null) return NaN;
        if (typeof v === 'number') return v * 1000;
        const n = Number(v);
        if (Number.isFinite(n)) return n * 1000;  // numeric string -> seconds
        const parsed = Date.parse(v);              // ISO string fallback
        return Number.isFinite(parsed) ? parsed : NaN;
    };

    // 24 hourly buckets ending now.
    const now = new Date();
    const buckets = [];
    for (let i = 23; i >= 0; i--) {
        const d = new Date(now.getTime() - i * 3600 * 1000);
        d.setMinutes(0, 0, 0);
        buckets.push({ ts: d.getTime(), label: String(d.getHours()).padStart(2, '0'), created: 0, succeeded: 0, failed: 0 });
    }
    const idx = (tsMs) => {
        if (!Number.isFinite(tsMs)) return -1;
        const h = new Date(tsMs); h.setMinutes(0, 0, 0);
        const t = h.getTime();
        for (let i = 0; i < buckets.length; i++) if (buckets[i].ts === t) return i;
        return -1;
    };
    for (const t of userTasks) {
        if (t.created_at) {
            const i = idx(toMs(t.created_at));
            if (i >= 0) buckets[i].created += 1;
        }
        if (t.finished_at && (t.status === 'succeeded' || t.status === 'partial_succeeded')) {
            const i = idx(toMs(t.finished_at));
            if (i >= 0) buckets[i].succeeded += 1;
        }
        if (t.finished_at && t.status === 'failed') {
            const i = idx(toMs(t.finished_at));
            if (i >= 0) buckets[i].failed += 1;
        }
    }
    inst.setOption({
        ..._CHART_THEME,
        animation: animate,
        tooltip: { trigger: 'axis' },
        legend: { data: ['新建', '成功', '失败'], textStyle: { color: '#c8cad6' }, top: 0 },
        grid: { left: 36, right: 12, top: 30, bottom: 24 },
        xAxis: {
            type: 'category',
            data: buckets.map(b => b.label),
            axisLine: { lineStyle: { color: '#3a3f55' } },
            axisLabel: { color: '#94a3b8', fontSize: 10 },
        },
        yAxis: {
            type: 'value',
            minInterval: 1,
            axisLine: { lineStyle: { color: '#3a3f55' } },
            splitLine: { lineStyle: { color: 'rgba(58,63,85,.4)' } },
            axisLabel: { color: '#94a3b8', fontSize: 10 },
        },
        series: [
            { name: '新建', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: buckets.map(b => b.created), itemStyle: { color: '#6366f1' }, areaStyle: { color: 'rgba(99,102,241,.18)' } },
            { name: '成功', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: buckets.map(b => b.succeeded), itemStyle: { color: '#22c55e' } },
            { name: '失败', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: buckets.map(b => b.failed), itemStyle: { color: '#ef4444' } },
        ],
    }, true);
}

function _renderPlatformChart(tasks, animate) {
    const inst = _getOrInitChart('chart-platform');
    if (!inst) return;
    // "平台 × 完整状态分布" 的堆叠条形图。
    // 与状态饼共用同一套 STATUS_LABELS / _STATUS_COLORS,所以分类口径
    // 完全一致 —— 饼图里出现的 status,这里就是一个 series。
    // 每个 status 自成一个 stack series,空 series 自动隐藏(echarts 会
    // 把全 0 的 series 收起来)。
    const byPlat = {};
    const statusSet = new Set();
    for (const t of tasks) {
        const p = t.platform || 'unknown';
        const s = t.status || 'unknown';
        statusSet.add(s);
        if (!byPlat[p]) byPlat[p] = {};
        byPlat[p][s] = (byPlat[p][s] || 0) + 1;
    }
    // 平台按总量降序,长条沉到底/顶都行 —— 横向条形图最长的放最上更易读
    const plats = Object.keys(byPlat).sort((a, b) => {
        const sa = Object.values(byPlat[a]).reduce((x, y) => x + y, 0);
        const sb = Object.values(byPlat[b]).reduce((x, y) => x + y, 0);
        return sb - sa;
    });
    // status 顺序:按 _STATUS_COLORS 里的声明顺序(运行→成功→失败...)
    // 保证图例稳定,避免每次刷新顺序抖动。
    const STATUS_ORDER = Object.keys(_STATUS_COLORS);
    const orderedStatuses = STATUS_ORDER.filter(s => statusSet.has(s))
        .concat([...statusSet].filter(s => !STATUS_ORDER.includes(s)));
    const series = orderedStatuses.map(s => ({
        name: STATUS_LABELS[s] || s,
        type: 'bar',
        stack: 'all',
        data: plats.map(p => byPlat[p][s] || 0),
        itemStyle: { color: _STATUS_COLORS[s] || '#94a3b8' },
        barMaxWidth: 22,
    }));
    inst.setOption({
        ..._CHART_THEME,
        animation: animate,
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: {
            data: orderedStatuses.map(s => STATUS_LABELS[s] || s),
            textStyle: { color: '#c8cad6', fontSize: 11 },
            top: 0,
            type: 'scroll',
        },
        grid: { left: 80, right: 24, top: 30, bottom: 24 },
        xAxis: {
            type: 'value',
            axisLine: { lineStyle: { color: '#3a3f55' } },
            splitLine: { lineStyle: { color: 'rgba(58,63,85,.4)' } },
            axisLabel: { color: '#94a3b8', fontSize: 10 },
            minInterval: 1,
        },
        yAxis: {
            type: 'category',
            data: plats,
            axisLine: { lineStyle: { color: '#3a3f55' } },
            axisLabel: { color: '#c8cad6' },
        },
        series,
    }, true);
}

// ── Download speed chart (chart-rate) ─────────────────────
// Backed by /api/dashboard/record-rate. Window state is per-session; shows
// records-per-second across all tasks (or a single task if extended later).
let _rateWindow = '5min';
let _rateInflight = false;  // dedupe overlapping refreshes

function switchRateWindow(w) {
    if (!['5min', '1h', '24h'].includes(w)) return;
    if (_rateWindow === w) return;
    _rateWindow = w;
    _syncRateTabButtons();
    // Force re-fetch + replay animation since the user just touched it.
    _refreshRateChart(/*animate=*/true);
}

function _syncRateTabButtons() {
    const buttons = document.querySelectorAll('#rate-tabs .rate-tab');
    buttons.forEach(b => {
        b.classList.toggle('active', b.dataset.window === _rateWindow);
    });
}

function _formatRate(v) {
    if (!v && v !== 0) return '—';
    if (v < 1) return v.toFixed(2) + '/s';
    if (v < 1000) return v.toFixed(1) + '/s';
    if (v < 1_000_000) return (v / 1000).toFixed(1) + 'k/s';
    return (v / 1_000_000).toFixed(2) + 'M/s';
}

function _formatRateTickTime(ts, window) {
    // Unified format: MM-DD HH:mm:ss. Density is controlled by xAxis.interval
    // + hideOverlap, so both tick labels and tooltip carry full context
    // (month/day/hour/minute/second) without overlapping on dense windows.
    const d = new Date(ts * 1000);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

async function _refreshRateChart(animate) {
    // ECharts must be loaded AND the canvas must be in the DOM.
    if (typeof echarts === 'undefined') return;
    if (!document.getElementById('chart-rate')) return;
    _syncRateTabButtons();
    if (_rateInflight) return;  // prior call still pending; skip this tick
    _rateInflight = true;
    let resp;
    try {
        resp = await api(`/api/dashboard/record-rate?window=${encodeURIComponent(_rateWindow)}`);
    } catch (e) {
        _rateInflight = false;
        return;  // silent degrade — server unreachable / temp error
    }
    _rateInflight = false;
    _renderRateChart(resp, !!animate);
}

function _renderRateChart(resp, animate) {
    const inst = _getOrInitChart('chart-rate');
    if (!inst) return;
    const points = (resp && resp.points) || [];
    const win = (resp && resp.window) || _rateWindow;
    const xs = points.map(p => _formatRateTickTime(p.ts, win));
    const ys = points.map(p => p.rate);

    // Update header summary (peak / avg / total).
    const sum = document.getElementById('rate-summary');
    if (sum) {
        const peak = resp && resp.peak_rate || 0;
        const avg = resp && resp.avg_rate || 0;
        const total = resp && resp.total_records || 0;
        sum.textContent = `峰值 ${_formatRate(peak)} · 均值 ${_formatRate(avg)} · 累计 ${total.toLocaleString()} 条`;
    }

    // Sparser x-labels for dense windows so they don't overlap.
    const interval = win === '24h' ? Math.max(1, Math.floor(xs.length / 8))
                  : win === '1h'  ? Math.max(1, Math.floor(xs.length / 6))
                                  : Math.max(1, Math.floor(xs.length / 6));

    inst.setOption({
        ..._CHART_THEME,
        animation: animate,
        tooltip: {
            trigger: 'axis',
            formatter: (params) => {
                const p = params[0];
                return `${p.axisValueLabel}<br/><span style="color:#a5b4fc">●</span> ${_formatRate(p.value)}`;
            },
        },
        grid: { left: 44, right: 12, top: 16, bottom: 24 },
        xAxis: {
            type: 'category',
            data: xs,
            axisLine: { lineStyle: { color: '#3a3f55' } },
            axisLabel: { color: '#94a3b8', fontSize: 10, interval, hideOverlap: true },
            boundaryGap: false,
        },
        yAxis: {
            type: 'value',
            min: 0,
            axisLine: { lineStyle: { color: '#3a3f55' } },
            splitLine: { lineStyle: { color: 'rgba(58,63,85,.4)' } },
            // Hide the "0.00/s" baseline label — it's visually noisy and the
            // gridline alone is enough to anchor the zero baseline.
            axisLabel: { color: '#94a3b8', fontSize: 10, formatter: (v) => (v === 0 ? '' : _formatRate(v)) },
        },
        series: [{
            type: 'line',
            smooth: true,
            symbol: 'none',
            sampling: 'lttb',  // downsample if many points; keeps shape
            data: ys,
            lineStyle: { color: '#6366f1', width: 2 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(99,102,241,.45)' },
                    { offset: 1, color: 'rgba(99,102,241,.02)' },
                ]),
            },
        }],
    }, true);
}

// ── Task filtering/sorting state ─────────────────────────
let taskFilters = { status: [], platform: '', action: '', search: '' };

// Status display name mapping for dynamic coupled filter dropdowns.
function _statusDisplayName(s) {
    const map = {
        running: '运行中', succeeded: '全部成功', failed: '失败',
        cancelled: '已取消', queued: '等待中', interrupted: '已中断',
        waiting_dependency: '等待上游', partial_succeeded: '部分成功',
        archived: '已归档',
    };
    return map[s] || s;
}

// Resolve the effective action for a task: batch_run tasks expose their
// underlying action via logic_param.action; single tasks use task_type.
function _resolveAction(t) {
    return (t.task_type === 'batch_run' && t.logic_param && t.logic_param.action)
        ? t.logic_param.action : t.task_type;
}

// Compute coupled filter options: for each dropdown, derive available values
// from tasks that match the OTHER filters (not the dropdown's own filter).
// Uses _resolveAction so batch_run tasks are grouped with their single-task peers.
function getCoupledFilterOptions(tasks, filters) {
    const hasStatus = filters.status && filters.status.length > 0;

    // Platform dropdown: filtered by action + status
    let forPlatform = tasks;
    if (filters.action) forPlatform = forPlatform.filter(t => _resolveAction(t) === filters.action);
    if (hasStatus) forPlatform = forPlatform.filter(t => filters.status.includes(t.status));

    // Action dropdown: filtered by platform + status
    let forAction = tasks;
    if (filters.platform) forAction = forAction.filter(t => t.platform === filters.platform);
    if (hasStatus) forAction = forAction.filter(t => filters.status.includes(t.status));

    // Status dropdown: filtered by platform + action
    let forStatus = tasks;
    if (filters.platform) forStatus = forStatus.filter(t => t.platform === filters.platform);
    if (filters.action) forStatus = forStatus.filter(t => _resolveAction(t) === filters.action);

    return {
        platforms: [...new Set(forPlatform.map(t => t.platform))].sort(),
        actions: [...new Set(forAction.map(t => _resolveAction(t)))].sort(),
        statuses: [...new Set(forStatus.map(t => t.status))].sort(),
    };
}

// Validate current filter selections against coupled options.
// Clears any selection that is no longer valid. Returns true if anything was cleared.
function _validateCoupledFilters(tasks, filters) {
    const coupled = getCoupledFilterOptions(tasks, filters);
    let changed = false;
    if (filters.platform && !coupled.platforms.includes(filters.platform)) {
        filters.platform = '';
        changed = true;
    }
    if (filters.action && !coupled.actions.includes(filters.action)) {
        filters.action = '';
        changed = true;
    }
    if (filters.status.length > 0) {
        const valid = filters.status.filter(s => coupled.statuses.includes(s));
        if (valid.length !== filters.status.length) {
            filters.status = valid;
            changed = true;
        }
    }
    return changed;
}
// ── Favorites filtering state ─────────────────────────────
let favFilters = { platform: '', action: '', search: '' };
let taskSort = { field: 'created_at', direction: 'desc' };
let taskPage = 1;
const TASKS_PER_PAGE = 50;

function loadTaskFiltersFromStorage() {
    try {
        const saved = localStorage.getItem('crawlhub_task_filters');
        if (saved) {
            const parsed = JSON.parse(saved);
            // Migrate old saved state that lacks `search`. Don't persist
            // search across reloads either \u2014 search is a transient filter.
            taskFilters = { status: [], platform: '', action: '', search: '', ...parsed, search: '' };
        }
        // Sort is intentionally NOT restored from localStorage: every page
        // reload resets to "newest first" (created_at DESC) so users always
        // land on the latest activity. Otherwise a stale sort like
        // `progress ASC` would push running tasks past the LIMIT window.
        // Clean up any sort persisted by older builds.
        localStorage.removeItem('crawlhub_task_sort');
    } catch(e) {}
}
loadTaskFiltersFromStorage();

function saveTaskFiltersToStorage() {
    // Persist filters only (excluding transient `search`). Sort is
    // session-only by design — see loadTaskFiltersFromStorage().
    const { search: _ignored, ...rest } = taskFilters;
    localStorage.setItem('crawlhub_task_filters', JSON.stringify(rest));
}

async function renderTasks() {
    // Trash view reuses this function entirely — same filters, search, note
    // editing, sorting, pagination. Only data source and a few UI bits differ.
    const isTrash = (currentPage === 'trash');

    // Ensure platform metadata is loaded so display-name maps are populated
    // before we render filters and tables (user may land here without visiting
    // the platforms page first).
    if (!platforms.length || !Object.keys(ACTION_NAME_MAP).length) {
        try {
            const data = await api('/api/platforms');
            platforms = data.platforms || [];
            refreshPlatformMetadataMaps(platforms);
        } catch (e) { /* ignore — fallback to raw IDs is acceptable */ }
    }

    let tasks = [];
    // Build query with search (server-side LIKE); other filters are still
    // applied client-side so the existing dropdown UX keeps working.
    const qs = new URLSearchParams({ limit: '200' });
        if (taskFilters.search && taskFilters.search.trim()) {
            qs.set('search', expandSearchTokens(taskFilters.search.trim()));
        }
    if (isTrash) qs.set('only_archived', 'true');
    try { tasks = await api('/api/tasks?' + qs.toString()); } catch(e) {}

    // Coupled filter options: each dropdown shows only values that exist
    // in tasks matching the OTHER filters. Auto-clear invalid selections.
    if (_validateCoupledFilters(tasks, taskFilters)) {
        // A selection was invalidated and cleared — re-save.
        saveTaskFiltersToStorage();
    }
    const coupled = getCoupledFilterOptions(tasks, taskFilters);

    // Apply filters
    let filtered = tasks;
    if (taskFilters.status.length > 0) {
        filtered = filtered.filter(t => taskFilters.status.includes(t.status));
    }
    if (taskFilters.platform) {
        filtered = filtered.filter(t => t.platform === taskFilters.platform);
    }
    if (taskFilters.action) {
        filtered = filtered.filter(t => _resolveAction(t) === taskFilters.action);
    }

    // Apply sorting
    filtered.sort((a, b) => {
        let va = a[taskSort.field] || 0;
        let vb = b[taskSort.field] || 0;
        if (taskSort.direction === 'desc') return vb > va ? 1 : vb < va ? -1 : 0;
        return va > vb ? 1 : va < vb ? -1 : 0;
    });

    // Pagination
    const totalPages = Math.ceil(filtered.length / TASKS_PER_PAGE);
    if (taskPage > totalPages) taskPage = Math.max(1, totalPages);
    const pageStart = (taskPage - 1) * TASKS_PER_PAGE;
    const pageTasks = filtered.slice(pageStart, pageStart + TASKS_PER_PAGE);

    const hasActiveFilters = taskFilters.status.length > 0 || taskFilters.platform || taskFilters.action || (taskFilters.search && taskFilters.search.trim());
    const activeCount = (taskFilters.status.length > 0 ? 1 : 0) + (taskFilters.platform ? 1 : 0) + (taskFilters.action ? 1 : 0) + (taskFilters.search && taskFilters.search.trim() ? 1 : 0);

    // Header / tabs differ between modes. Trash has no "新建任务", no
    // favorites tab, but gets a recycle-bin info banner + a "清空回收站"
    // button when there are tasks to purge.
    const PURGE_DAYS = 30;  // matches backend config.archived_purge_days default
    const headerHtml = isTrash
        ? `<div class="header"><h2>回收站</h2>${tasks.length > 0 ? `<button class="btn btn-danger" onclick="purgeAllTrash()">清空回收站</button>` : ''}</div>
           <div style="margin:8px 0 12px;padding:10px 14px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:6px;font-size:12px;color:var(--text2);">
             回收站中的任务保留 ${PURGE_DAYS} 天后将被自动彻底删除（含产物与日志）。在此之前可点「恢复」找回。
           </div>`
        : `<div class="header"><h2>任务中心</h2><button class="btn btn-primary" onclick="openNewTask()">+ 新建任务</button></div>
           <div class="tabs" style="margin-bottom:12px;">
             <div class="tab ${taskCenterTab === 'tasks' ? 'active' : ''}" onclick="switchTaskCenterTab('tasks')">任务列表</div>
             <div class="tab ${taskCenterTab === 'favorites' ? 'active' : ''}" onclick="switchTaskCenterTab('favorites')">收藏</div>
           </div>`;

    // In trash view we always show the table (no favorites sub-tab).
    const showTable = isTrash || taskCenterTab === 'tasks';

    return `
        ${headerHtml}
        ${showTable ? `
        <div class="filter-bar" id="task-filter-bar">
            <div class="fg"><label>平台</label><select id="filter-platform" onchange="taskFilters.platform=this.value;saveTaskFiltersToStorage();updateHash();render();" class="${taskFilters.platform ? 'filter-active' : ''}">
                <option value="">全部</option>
                ${coupled.platforms.map(p => `<option value="${p}" ${taskFilters.platform===p?'selected':''}>${getPlatformDisplayName(p)}</option>`).join('')}
            </select></div>
            <div class="fg"><label>接口</label><select id="filter-action" onchange="taskFilters.action=this.value;saveTaskFiltersToStorage();updateHash();render();" class="${taskFilters.action ? 'filter-active' : ''}">
                <option value="">全部</option>
                ${coupled.actions.map(a => `<option value="${a}" ${taskFilters.action===a?'selected':''}>${getActionDisplayName(a)}</option>`).join('')}
            </select></div>
            <div class="fg"><label>状态</label><select id="filter-status" onchange="updateTaskFilter('status')" class="${taskFilters.status.length ? 'filter-active' : ''}">
                <option value="">全部</option>
                ${coupled.statuses.map(s => `<option value="${s}" ${taskFilters.status.includes(s)?'selected':''}>${_statusDisplayName(s)}</option>`).join('')}
            </select></div>
            <div class="fg" style="flex:1;min-width:200px;"><label>搜索</label><input id="task-search-input" type="text"
                placeholder="ID / 平台 / 接口 / 参数 / 备注（空格分隔多关键词）"
                value="${(taskFilters.search || '').replace(/"/g, '&quot;')}"
                oninput="onTaskSearchInput(this.value)"
                class="${taskFilters.search && taskFilters.search.trim() ? 'filter-active' : ''}"
                style="width:100%;" /></div>
            ${hasActiveFilters ? `<div class="fg"><button class="btn-reset" onclick="clearTaskFilters()">重置</button></div>` : ''}
            <span class="filter-summary" id="task-filter-summary">共 ${filtered.length} 条${hasActiveFilters ? ' (已筛选)' : ''}</span>
        </div>
        <div id="task-table-area">
            ${pageTasks.length ? renderTaskTableSortable(pageTasks) : `<div class="empty">${isTrash ? '回收站为空' : '暂无匹配任务'}</div>`}
            ${totalPages > 1 ? renderPagination(totalPages) : ''}
        </div>
        ` : await renderFavoritesTab()}
    `;
}

function renderNoteCell(t) {
    // Escape for HTML attribute + body. Minimal util \u2014 <, >, &, ", ' only.
    const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const note = t.note || '';
    const display = note ? esc(note) : '<span class="note-empty">\u6dfb\u52a0\u5907\u6ce8\u2026</span>';
    // data-task-id used to swap to inline input without prompt().
    return `<span class="note-cell" data-task-id="${t.task_id}" data-note="${esc(note)}" onclick="startEditNote(this, event)" title="\u70b9\u51fb\u7f16\u8f91\u5907\u6ce8" style="cursor:text;display:inline-block;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;font-size:12px;">${display}</span>`;
}

// Inline note editing \u2014 replaces the prompt() approach.
// Click the cell \u2192 swap to <input>; Enter / blur saves; Esc cancels.
function startEditNote(span, ev) {
    if (ev) ev.stopPropagation();
    if (span.dataset.editing === '1') return;
    span.dataset.editing = '1';
    const taskId = span.dataset.taskId;
    const original = span.dataset.note || '';
    const original_html = span.innerHTML;
    const input = document.createElement('input');
    input.type = 'text';
    input.maxLength = 100;
    input.value = original;
    input.className = 'note-edit-input';
    input.placeholder = '\u56de\u8f66\u4fdd\u5b58\uff0cEsc \u53d6\u6d88';
    span.innerHTML = '';
    span.appendChild(input);
    input.focus();
    input.select();
    // Suspend auto-refresh while editing so render() doesn't blow away the input.
    _suspendAutoRefresh = true;

    let done = false;
    const restore = (html) => { span.innerHTML = html; span.dataset.editing = '0'; _suspendAutoRefresh = false; };
    const commit = async () => {
        if (done) return; done = true;
        const next = (input.value || '').trim().slice(0, 100);
        if (next === original) { restore(original_html); return; }
        try {
            await api(`/api/tasks/${taskId}/note`, {
                method: 'PATCH',
                body: JSON.stringify({ note: next || null }),
            });
            toast('\u5907\u6ce8\u5df2\u66f4\u65b0');
            _suspendAutoRefresh = false;
            render();
        } catch (e) {
            toast('\u66f4\u65b0\u5931\u8d25\uff1a' + (e.message || e), 'error');
            restore(original_html);
        }
    };
    const cancel = () => { if (done) return; done = true; restore(original_html); };

    input.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('click', e => e.stopPropagation());
}

// Check if a favorite/draft-like item has all required params filled
function isItemComplete(item, platformsData) {
    if (!item.platform || !item.task_type || !item.logic_param) return false;
    const pInfo = platformsData.find(p => p.platform === item.platform);
    if (!pInfo) return false;
    const action = (pInfo.actions || []).find(a => a.name === item.task_type);
    if (!action || !action.schema) return true; // No schema = no required fields
    const required = action.schema.required || [];
    if (required.length === 0) return true;
    // For batch favorites, required fields live under logic_param.common_params
    const lp = item.logic_param;
    const isBatch = !!(lp.action && lp.common_params);
    const paramSource = isBatch ? lp.common_params : lp;
    // For batch favorites, the field upgraded to batch (lp.upgrade.field_name)
    // is supplied by items/items_from, not common_params — skip it.
    // Also, batch favorites from completed tasks may lack the upgrade field but
    // still have items/items_from — in that case any missing required field in
    // common_params is assumed to be the batch-upgraded one.
    const upgradedField = isBatch && lp.upgrade ? lp.upgrade.field_name : null;
    const hasItems = isBatch && (lp.items?.length || lp.items_from);
    for (const key of required) {
        if (key === upgradedField) continue; // value comes from items/items_from
        const val = paramSource[key];
        const missing = val === undefined || val === null || val === '' || (Array.isArray(val) && val.length === 0);
        if (missing) {
            // Batch with items/items_from: missing fields are the batch-upgraded
            // parameter — they come from the item list, not common_params.
            if (hasItems) continue;
            return false;
        }
    }
    return true;
}

// Submit task directly from favorite list (opens probe flow)
async function submitFromFavorite(favId) {
    try {
        const fav = await api(`/api/favorites/${favId}`);
        const lp = fav.logic_param || {};
        // Detect batch favorite: logic_param has action + common_params (set by
        // both favoriteTask and saveAsFavorite for batch items).
        const isBatch = !!(lp.action && lp.common_params);
        if (isBatch) {
            await submitBatchFromFavorite(fav.platform, fav.task_type, lp);
        } else {
            window._directSubmitParams = { platform: fav.platform, task_type: fav.task_type, logic_param: lp };
            await directProbeAndSubmit(fav.platform, fav.task_type, lp);
        }
    } catch(e) { toast('提交失败: ' + e.message, 'error'); }
}

// Direct probe and submit flow (bypasses form, goes straight to cookie probe)
async function directProbeAndSubmit(platform, taskType, params) {
    // Platforms that don't need cookies - submit directly
    const noCookiePlatforms = ['steam'];
    if (noCookiePlatforms.includes(platform)) {
        try {
            await api('/api/tasks', { method: 'POST', body: JSON.stringify({ platform, task_type: taskType, logic_param: params }) });
            toast('任务已提交！');
            render();
        } catch(e) { toast('提交失败: ' + e.message, 'error'); }
        return;
    }

    // Show probe result modal with loading state
    openModal('modal-probe-result');
    document.getElementById('probe-result-content').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);">正在探查 Cookie...</div>';
    document.getElementById('btn-confirm-submit').classList.add('hidden');
    document.getElementById('btn-update-cookie').classList.add('hidden');

    try {
        const result = await api(`/api/cookies/${platform}/probe`, {
            method: 'POST',
            body: JSON.stringify({ task_type: taskType })
        });
        const probeResults = result.results || [];
        const validCookies = probeResults.filter(r => r.status === 'valid');
        const invalidCookies = probeResults.filter(r => r.status !== 'valid');

        let html = '';
        if (validCookies.length > 0) {
            html += `<div style="margin-bottom:12px;"><span style="color:var(--success);font-weight:500;">有效 (${validCookies.length})</span></div>`;
            html += validCookies.map(c => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
                <span class="cookie-dot valid"></span>
                <span style="font-size:13px;">${c.label}</span>
            </div>`).join('');
        }
        if (invalidCookies.length > 0) {
            html += `<div style="margin:12px 0 8px;"><span style="color:var(--danger);font-weight:500;">无效 (${invalidCookies.length})</span></div>`;
            html += invalidCookies.map(c => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
                <span class="cookie-dot invalid"></span>
                <span style="font-size:13px;">${c.label}</span>
                <span style="font-size:11px;color:var(--text3);">${c.message || ''}</span>
            </div>`).join('');
        }
        if (probeResults.length === 0) {
            html = '<div style="color:var(--text2);padding:12px 0;">该平台暂无 Cookie，请先添加</div>';
        }

        document.getElementById('probe-result-content').innerHTML = html;

        if (validCookies.length > 0) {
            document.getElementById('btn-confirm-submit').classList.remove('hidden');
            // Override confirmSubmitTask for direct submit
            document.getElementById('btn-confirm-submit').onclick = async () => {
                try {
                    await api('/api/tasks', { method: 'POST', body: JSON.stringify({ platform, task_type: taskType, logic_param: params }) });
                    toast('任务已提交！');
                    closeModal('modal-probe-result');
                    render();
                } catch(e) { toast('提交失败: ' + e.message, 'error'); }
            };
        }
        if (invalidCookies.length > 0 || probeResults.length === 0) {
            document.getElementById('btn-update-cookie').classList.remove('hidden');
        }
    } catch(e) {
        document.getElementById('probe-result-content').innerHTML = `<div style="color:var(--danger);padding:12px 0;">Cookie 探查失败: ${e.message}</div>`;
        document.getElementById('btn-update-cookie').classList.remove('hidden');
    }
}

        document.getElementById('probe-result-content').innerHTML = html;

// Debounced search-input handler. We avoid blowing away the input on every
// keystroke by NOT calling render() immediately \u2014 instead, after a 250ms
// debounce we soft-refresh just the data area, leaving the search input
// node intact so caret/focus stay where the user typed.
// 250ms, then render; after render we re-grab focus and restore caret.
let _taskSearchDebounce = null;
let _favSearchDebounce = null;
// Set true while the user is mid-interaction (inline note edit, open dropdown
// menu, etc.) so the 5s auto-refresh doesn't blow it away.
let _suspendAutoRefresh = false;
function onTaskSearchInput(value) {
    taskFilters.search = value;
    taskPage = 1;
    if (_taskSearchDebounce) clearTimeout(_taskSearchDebounce);
    _taskSearchDebounce = setTimeout(async () => {
        updateHash();
        // Soft-refresh the data area only — never touches the search input,
        // so caret/focus stay intact without any focus-restore dance.
        await softRefreshTasks();
    }, 250);
}

function onFavSearchInput(value) {
    favFilters.search = value;
    if (_favSearchDebounce) clearTimeout(_favSearchDebounce);
    _favSearchDebounce = setTimeout(async () => {
        await softRefreshFavorites();
    }, 250);
}

// ── Soft-refresh helpers ─────────────────────────────────────────────────
// Update <select> options without disturbing focus/value when possible.
// Skips the update if the select is currently the activeElement (user has
// it open / focused) — prevents native dropdown flicker mid-interaction.
function patchSelectOptions(selectId, optionsHtml, currentValue) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    if (sel === document.activeElement) return;  // user is interacting
    if (sel.innerHTML === optionsHtml) return;   // no change, skip
    sel.innerHTML = optionsHtml;
    if (currentValue != null) sel.value = currentValue;
}

// Refresh just the data parts of the task/trash page without rebuilding
// the filter bar (which contains the search input). Falls back to a full
// render() if the soft-refresh anchors aren't present yet.
async function softRefreshTasks() {
    const tableArea = document.getElementById('task-table-area');
    if (!tableArea) { await render(); return; }

    const isTrash = (currentPage === 'trash');
    let tasks = [];
    const qs = new URLSearchParams({ limit: '200' });
    if (taskFilters.search && taskFilters.search.trim()) {
        qs.set('search', expandSearchTokens(taskFilters.search.trim()));
    }
    if (isTrash) qs.set('only_archived', 'true');
    try { tasks = await api('/api/tasks?' + qs.toString()); } catch(e) {}

    // Coupled filter options: validate + compute coupled dropdown options
    if (_validateCoupledFilters(tasks, taskFilters)) {
        saveTaskFiltersToStorage();
    }
    const coupled = getCoupledFilterOptions(tasks, taskFilters);

    let filtered = tasks;
    if (taskFilters.status.length > 0) {
        filtered = filtered.filter(t => taskFilters.status.includes(t.status));
    }
    if (taskFilters.platform) filtered = filtered.filter(t => t.platform === taskFilters.platform);
    if (taskFilters.action)   filtered = filtered.filter(t => _resolveAction(t) === taskFilters.action);

    filtered.sort((a, b) => {
        let va = a[taskSort.field] || 0;
        let vb = b[taskSort.field] || 0;
        if (taskSort.direction === 'desc') return vb > va ? 1 : vb < va ? -1 : 0;
        return va > vb ? 1 : va < vb ? -1 : 0;
    });

    const totalPages = Math.ceil(filtered.length / TASKS_PER_PAGE);
    if (taskPage > totalPages) taskPage = Math.max(1, totalPages);
    const pageStart = (taskPage - 1) * TASKS_PER_PAGE;
    const pageTasks = filtered.slice(pageStart, pageStart + TASKS_PER_PAGE);

    const hasActiveFilters = taskFilters.status.length > 0 || taskFilters.platform || taskFilters.action || (taskFilters.search && taskFilters.search.trim());

    // Patch dynamic select options (coupled) — value preserved,
    // skipped when the user has the select focused/open.
    const platOpts = `<option value="">全部</option>` +
        coupled.platforms.map(p => `<option value="${p}" ${taskFilters.platform===p?'selected':''}>${getPlatformDisplayName(p)}</option>`).join('');
    const actionOpts = `<option value="">全部</option>` +
        coupled.actions.map(a => `<option value="${a}" ${taskFilters.action===a?'selected':''}>${getActionDisplayName(a)}</option>`).join('');
    const statusOpts = `<option value="">全部</option>` +
        coupled.statuses.map(s => `<option value="${s}" ${taskFilters.status.includes(s)?'selected':''}>${_statusDisplayName(s)}</option>`).join('');
    patchSelectOptions('filter-platform', platOpts, taskFilters.platform || '');
    patchSelectOptions('filter-action', actionOpts, taskFilters.action || '');
    patchSelectOptions('filter-status', statusOpts, taskFilters.status.length ? taskFilters.status[0] : '');

    // Patch summary text in place.
    const summary = document.getElementById('task-filter-summary');
    if (summary) {
        summary.textContent = `共 ${filtered.length} 条${hasActiveFilters ? ' (已筛选)' : ''}`;
    }

    // Preserve scroll, then swap table + pagination.
    const prevScroller = tableArea.querySelector('.table-scroll');
    const preservedScrollTop = prevScroller ? prevScroller.scrollTop : null;

    tableArea.innerHTML =
        (pageTasks.length ? renderTaskTableSortable(pageTasks) : `<div class="empty">${isTrash ? '回收站为空' : '暂无匹配任务'}</div>`) +
        (totalPages > 1 ? renderPagination(totalPages) : '');

    if (preservedScrollTop !== null) {
        const newScroller = tableArea.querySelector('.table-scroll');
        if (newScroller) newScroller.scrollTop = preservedScrollTop;
    }
}
