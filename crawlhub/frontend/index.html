function renderSchemaForm(schema) {
    if (!schema || !schema.properties) return '<div class="empty">该操作无参数</div>';

    const required = schema.required || [];
    let html = '';

    for (const [key, prop] of Object.entries(schema.properties)) {
        const isRequired = required.includes(key);
        const title = typeof prop.title === 'string' ? prop.title.trim() : '';
        const description = typeof prop.description === 'string' ? prop.description.trim() : '';
        const label = title && description && title !== description ? `${title}（${description}）` : (title || description || key);
        const hint = description && !label.includes(description) ? `<div class="hint">${description}</div>` : '';
        const reqClass = isRequired ? 'required' : '';

        const isUpgraded = (batchUpgrade.fieldName === key);
        if (isUpgraded) {
            // Render purple card placeholder; real card content is injected by renderBatchUpgradeCard.
            html += `<div class="form-group bp-row" data-bp-row="${key}" data-bp-card-host="1"></div>`;
            continue;
        }
        // Eligibility: only scalar (string / number / integer / enum-of-string-or-number) parameters can be upgraded.
        // Boolean / array / object are excluded (no fan-out semantics).
        const eligibleForBatch = (prop.type === 'string' || prop.type === 'integer' || prop.type === 'number' || (Array.isArray(prop.enum) && prop.enum.length > 0));
        // Disabled when ANOTHER field is already upgraded (only 1 batch param allowed at a time).
        const otherUpgraded = batchUpgrade.fieldName && batchUpgrade.fieldName !== key;
        const btnCls = otherUpgraded ? 'bp-upgrade-btn disabled' : 'bp-upgrade-btn';
        const btnTitle = otherUpgraded
            ? `仅能同时升级 1 个批处理参数（当前：${batchUpgrade.fieldName}）`
            : '升级为批处理参数';
        const btnLabel = otherUpgraded ? '仅可升级 1 个批处理参数' : '升级为批处理参数';
        const btnOnclick = otherUpgraded ? '' : ` onclick="upgradeBatchParam('${key}')"`;
        const upgradeBtn = eligibleForBatch
            ? `<button type="button" class="${btnCls}" title="${btnTitle}"${btnOnclick}>${BP_UPGRADE_ICON_SVG}<span>${btnLabel}</span></button>`
            : '';

        if (prop.type === 'boolean') {
            const checked = prop.default ? 'checked' : '';
            html += `<div class="form-group bp-row">
                <label class="cb-label"><input type="checkbox" data-field="${key}" ${checked}><span class="cb-box"></span><span class="cb-text ${reqClass}">${label}</span></label>
            </div>`;
        } else if (prop.enum) {
            const enumLabels = Array.isArray(prop.enum_labels) && prop.enum_labels.length === prop.enum.length ? prop.enum_labels : null;
            html += `<div class="form-group bp-row">
                <label class="${reqClass}">${label}</label>
                <select data-field="${key}">
                    ${prop.enum.map((v, i) => {
                        const optLabel = enumLabels ? enumLabels[i] : v;
                        return `<option value="${v}" ${v === prop.default ? 'selected' : ''}>${optLabel}</option>`;
                    }).join('')}
                </select>
                ${upgradeBtn}
            </div>`;
        } else if (prop.type === 'array') {
            // 当 items.enum 存在时，渲染多选下拉（中文名（英文名）+ 搜索 + 全选 + chips）；
            // 否则降级到原 textarea（每行一项，自由输入）。
            const itemEnum = Array.isArray(prop.items?.enum) ? prop.items.enum : null;
            if (itemEnum && itemEnum.length > 0) {
                const itemLabels = Array.isArray(prop.items?.enum_labels)
                    && prop.items.enum_labels.length === itemEnum.length
                        ? prop.items.enum_labels : null;
                const defaultArr = Array.isArray(prop.default) ? prop.default : [];
                html += renderMultiEnumPicker(key, label, reqClass, itemEnum, itemLabels, defaultArr, hint);
            } else {
                const placeholder = prop.items?.type === 'string' ? '每行一个值' : '每行一个数字';
                const defaultVal = prop.default ? (Array.isArray(prop.default) ? prop.default.join('\n') : '') : '';
                html += `<div class="form-group bp-row">
                    <label class="${reqClass}">${label}</label>
                    <textarea data-field="${key}" data-type="array" data-item-type="${prop.items?.type || 'string'}" placeholder="${placeholder}">${defaultVal}</textarea>
                    ${hint}
                </div>`;
            }
        } else if (prop.type === 'object') {

            html += `<div class="form-group bp-row">
                <label class="${reqClass}">${label}</label>
                <textarea data-field="${key}" data-type="object" placeholder="复杂类型，请使用 JSON 输入">${prop.default ? JSON.stringify(prop.default, null, 2) : '{}'}</textarea>
                <div class="hint">复杂类型，请使用 JSON 格式输入</div>
            </div>`;
        } else if (prop.type === 'integer' || prop.type === 'number') {
            html += `<div class="form-group bp-row">
                <label class="${reqClass}">${label}</label>
                <input type="number" data-field="${key}" value="${prop.default !== undefined ? prop.default : ''}" ${prop.type === 'integer' ? 'step="1"' : 'step="any"'}>
                ${hint}
                ${upgradeBtn}
            </div>`;
        } else {
            html += `<div class="form-group bp-row">
                <label class="${reqClass}">${label}</label>
                <input type="text" data-field="${key}" value="${prop.default || ''}">
                ${hint}
                ${upgradeBtn}
            </div>`;
        }

    }
    return html;
}

// ── Multi-Enum Picker (array<enum<string>>) ──────────────────────
// 渲染示例：UI 风格参考"维度多选"——下拉触发器+chips、搜索、全选、只看已选
// state 存储：用一个 hidden input[data-type="multi-enum"] 的 value 存 JSON 数组，
// 这样 collectFormData 只需加一个分支 JSON.parse 即可。
function renderMultiEnumPicker(key, label, reqClass, enumList, enumLabels, defaultArr, hint) {
    const items = enumList.map((v, i) => ({
        key: String(v),
        label: enumLabels ? String(enumLabels[i]) : String(v),
    }));
    const initial = JSON.stringify(defaultArr || []);
    const itemsJson = JSON.stringify(items);
    const placeholder = '点击选择…';
    return `<div class="form-group bp-row me-picker-row">
        <label class="${reqClass}">${label}</label>
        <div class="me-picker" data-me-key="${key}">
            <div class="me-trigger" tabindex="0">
                <span class="me-placeholder">${placeholder}</span>
            </div>
            <div class="me-panel">
                <div class="me-search"><input type="text" placeholder="搜索…" /></div>
                <div class="me-toolbar">
                    <label class="cb-label"><input type="checkbox" class="me-select-all"><span class="cb-box"></span><span class="cb-text">全选</span></label>
                    <label class="cb-label"><input type="checkbox" class="me-only-selected"><span class="cb-box"></span><span class="cb-text">只看已选</span></label>
                    <span class="me-count" style="margin-left:auto;color:var(--text2);font-size:12px;">0/${items.length}</span>
                </div>
                <div class="me-list"></div>
            </div>
            <input type="hidden" data-field="${key}" data-type="multi-enum"
                   data-items='${itemsJson.replace(/'/g, "&#39;")}'
                   value='${initial.replace(/'/g, "&#39;")}'>
        </div>
        ${hint}
    </div>`;
}

// 初始化所有 multi-enum picker（在 form 渲染完后调用，幂等）
function initMultiEnumPickers(container) {
    const root = container || document;
    root.querySelectorAll('.me-picker').forEach(picker => {
        if (picker.dataset.meReady === '1') return;
        picker.dataset.meReady = '1';
        const hidden = picker.querySelector('input[data-type="multi-enum"]');
        const trigger = picker.querySelector('.me-trigger');
        const panel = picker.querySelector('.me-panel');
        const list = picker.querySelector('.me-list');
        const search = picker.querySelector('.me-search input');
        const selectAll = picker.querySelector('.me-select-all');
        const onlySelected = picker.querySelector('.me-only-selected');
        const counter = picker.querySelector('.me-count');
        const items = JSON.parse(hidden.dataset.items || '[]');
        let selected = new Set(JSON.parse(hidden.value || '[]'));

        // 渲染 list
        list.innerHTML = items.map(it => `
            <label class="me-item" data-me-item-key="${it.key}">
                <input type="checkbox" ${selected.has(it.key) ? 'checked' : ''}>
                <span class="cb-box"></span>
                <span class="me-item-label">${it.label}</span>
            </label>
        `).join('');

        const sync = () => {
            // 同步 hidden + trigger chips + counter + selectAll 状态
            const arr = Array.from(selected);
            hidden.value = JSON.stringify(arr);
            counter.textContent = `${arr.length}/${items.length}`;
            selectAll.checked = arr.length === items.length && items.length > 0;
            // 渲染 chips
            if (arr.length === 0) {
                trigger.innerHTML = `<span class="me-placeholder">点击选择…</span>`;
            } else {
                const chipMax = 6;
                const visible = arr.slice(0, chipMax);
                const overflow = arr.length - visible.length;
                const chips = visible.map(k => {
                    const it = items.find(i => i.key === k);
                    const lbl = it ? it.label : k;
                    return `<span class="me-chip">${lbl}<span class="me-chip-x" data-me-remove="${k}">&times;</span></span>`;
                }).join('');
                const more = overflow > 0 ? `<span class="me-chip">+${overflow}</span>` : '';
                const clearAll = `<span class="me-clear-all" title="清空">&times;</span>`;
                trigger.innerHTML = chips + more + clearAll;
            }
            // hidden value 改了，需要触发 change 让监听者知道（兼容批量参数等）
            hidden.dispatchEvent(new Event('change', { bubbles: true }));
        };

        // 打开/关闭
        trigger.addEventListener('click', (e) => {
            // chip 删除 / 全部清空
            const x = e.target.closest('.me-chip-x');
            if (x) {
                e.stopPropagation();
                selected.delete(x.dataset.meRemove);
                const cb = list.querySelector(`[data-me-item-key="${x.dataset.meRemove}"] input`);
                if (cb) cb.checked = false;
                sync();
                return;
            }
            const clr = e.target.closest('.me-clear-all');
            if (clr) {
                e.stopPropagation();
                selected.clear();
                list.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                sync();
                return;
            }
            picker.classList.toggle('open');
            trigger.classList.toggle('open');
            if (picker.classList.contains('open')) search.focus();
        });

        // list 项点击
        list.addEventListener('change', (e) => {
            const item = e.target.closest('.me-item');
            if (!item) return;
            const k = item.dataset.meItemKey;
            if (e.target.checked) selected.add(k);
            else selected.delete(k);
            sync();
        });

        // 搜索
        search.addEventListener('input', () => {
            const q = search.value.trim().toLowerCase();
            list.querySelectorAll('.me-item').forEach(it => {
                if (!q) { it.classList.remove('hidden-by-search'); return; }
                const txt = (it.textContent || '').toLowerCase();
                it.classList.toggle('hidden-by-search', !txt.includes(q));
            });
        });

        // 全选 / 只看已选
        selectAll.addEventListener('change', () => {
            if (selectAll.checked) {
                items.forEach(it => selected.add(it.key));
            } else {
                selected.clear();
            }
            list.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => {
                cb.checked = selected.has(items[i].key);
            });
            sync();
        });
        onlySelected.addEventListener('change', () => {
            list.querySelectorAll('.me-item').forEach(it => {
                const k = it.dataset.meItemKey;
                it.classList.toggle('hidden-by-only-selected', onlySelected.checked && !selected.has(k));
            });
        });

        // 点击外部关闭
        document.addEventListener('click', (e) => {
            if (!picker.contains(e.target)) {
                picker.classList.remove('open');
                trigger.classList.remove('open');
            }
        });

        sync();
    });
}

function collectFormData() {

    const data = {};
    const container = document.getElementById('form-mode-container');
    container.querySelectorAll('[data-field]').forEach(el => {
        const key = el.dataset.field;
        // Skip the upgraded batch parameter — its value will be filled per-item by the executor.
        if (batchUpgrade.fieldName === key) return;
        // Skip elements inside the batch upgrade card (their values are not common_params).
        if (el.closest('.bp-card')) return;
        const type = el.dataset.type;

        if (el.type === 'checkbox') {
            data[key] = el.checked;
        } else if (type === 'multi-enum') {
            // multi-enum picker：hidden input.value 是 JSON 数组字符串
            try { data[key] = JSON.parse(el.value || '[]'); } catch(e) { data[key] = []; }
        } else if (type === 'array') {
            const itemType = el.dataset.itemType || 'string';
            const lines = el.value.split('\n').map(l => l.trim()).filter(l => l);
            data[key] = itemType === 'integer' ? lines.map(Number) : lines;
        } else if (type === 'object') {

            try { data[key] = JSON.parse(el.value); } catch(e) { data[key] = {}; }
        } else if (el.type === 'number') {
            if (el.value !== '') data[key] = el.step === '1' ? parseInt(el.value) : parseFloat(el.value);
        } else {
            if (el.value !== '') data[key] = el.value;
        }
    });
    return data;
}

function fillFormFromData(data) {
    const container = document.getElementById('form-mode-container');
    container.querySelectorAll('[data-field]').forEach(el => {
        const key = el.dataset.field;
        const val = data[key];
        if (val === undefined) return;

        if (el.type === 'checkbox') {
            el.checked = !!val;
        } else if (el.dataset.type === 'multi-enum') {
            // 写入 hidden value，再让 picker 重渲染（通过手动调 init 触发的 sync 路径无法
            // 用，因为 init 只跑一次。这里直接重写 hidden + 找到所属 picker 强制重建 chips）。
            el.value = JSON.stringify(Array.isArray(val) ? val : []);
            const picker = el.closest('.me-picker');
            if (picker) {
                // 标记为未初始化，强制重新 init（最简单的"重建" hook）
                picker.dataset.meReady = '';
                initMultiEnumPickers(picker.parentNode);
            }
        } else if (el.dataset.type === 'array') {

            el.value = Array.isArray(val) ? val.join('\n') : '';
        } else if (el.dataset.type === 'object') {
            el.value = typeof val === 'object' ? JSON.stringify(val, null, 2) : '';
        } else {
            el.value = val;
        }
    });
}

// ── API helpers ──────────────────────────────────────────
async function api(path, opts = {}) {
    const resp = await fetch(API + path, { headers: {'Content-Type': 'application/json'}, ...opts });
    if (!resp.ok) {
        const errText = await resp.text();
        let msg = `HTTP ${resp.status}`;
        let detail = null;
        try {
            const j = JSON.parse(errText);
            detail = (j && Object.prototype.hasOwnProperty.call(j, 'detail')) ? j.detail : null;
            msg = detail || msg;
        } catch(e) {}
        const err = new Error(translateError(typeof msg === 'string' ? msg : JSON.stringify(msg)));
        err.status = resp.status;
        err.detail = detail;
        throw err;
    }
    return resp.json();
}

function patchAppVersion(version) {

}

function copyTaskId(taskId, event) {

    if (event) { event.stopPropagation(); event.preventDefault(); }
    const doCopy = () => {
        // Show floating green tip centered above the element
        const el = event ? event.currentTarget || event.target : null;
        if (el) {
            // Remove any existing tip
            const old = el.querySelector('.copy-tip');
            if (old) old.remove();
            el.style.position = 'relative';
            const tip = document.createElement('span');
            tip.className = 'copy-tip';
            tip.textContent = 'Copied!';
            el.appendChild(tip);
            setTimeout(() => tip.remove(), 1200);
        }
    };
    navigator.clipboard.writeText(taskId).then(doCopy).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = taskId;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        doCopy();
    });
    // Prevent text selection
    window.getSelection().removeAllRanges();
}

function formatTime(ts) {
    if (!ts) return '-';
    return new Date(ts * 1000).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function formatUptime(seconds) {
    if (seconds < 60) return `${Math.round(seconds)}秒`;
    if (seconds < 3600) return `${Math.round(seconds/60)}分`;
    return `${Math.round(seconds/3600)}时`;
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '-';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
}

function formatHeartbeat(task) {
    if (!task.last_heartbeat) return '-';
    if (task.status === 'running') {
        // Show relative time for running tasks
        const ago = Math.round((Date.now()/1000) - task.last_heartbeat);
        if (ago < 5) return '刚刚';
        if (ago < 60) return `${ago}秒前`;
        if (ago < 3600) return `${Math.round(ago/60)}分前`;
        return `${Math.round(ago/3600)}时前`;
    }
    return formatTime(task.last_heartbeat);
}

function formatDuration(task) {
    if (!task.started_at) return '-';
    const end = task.finished_at || (Date.now()/1000);
    const seconds = Math.round(end - task.started_at);
    if (seconds < 60) return `${seconds}秒`;
    if (seconds < 3600) return `${Math.floor(seconds/60)}分${seconds%60}秒`;
    const h = Math.floor(seconds/3600);
    const m = Math.floor((seconds%3600)/60);
    return `${h}时${m}分`;
}

// Alias: many callers use showToast(...). Bind it to the canonical toast() impl.
const showToast = (msg, type='success') => toast(msg, type);

function toast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ── Task actions ─────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────
// Task-modal context. Drives behaviour of the shared new-task modal.
//   mode='task'      -> classic task-center flow (probe + submit)
//   mode='plan-step' -> serialize result back to scheduling plan editor
// ─────────────────────────────────────────────────────────────────
let _taskModalCtx = { mode: 'task', onSave: null, stepIdx: null, existingStep: null };

function closeNewTaskModal() {
    closeModal('modal-new-task');
    _taskModalCtx = { mode: 'task', onSave: null, stepIdx: null, existingStep: null };
    // Per requirement 5.4: drafts in the modal must not leak across opens.
    // Resetting batchUpgrade here clears all per-tab batch state (list /
    // upstream_field / upstream_sql / database) the user typed into.
    batchUpgrade = { fieldName: null, tab: 'list', state: _emptyUpgradeState(), blockOnPartial: false };
}

async function openNewTask(preselectedPlatform, preselectedAction, ctx) {
    // ctx may be: undefined (classic) | { mode: 'plan-step', onSave, stepIdx, existingStep }
    _taskModalCtx = ctx && ctx.mode === 'plan-step'
        ? { mode: 'plan-step', onSave: ctx.onSave, stepIdx: ctx.stepIdx ?? null, existingStep: ctx.existingStep || null }
        : { mode: 'task', onSave: null, stepIdx: null, existingStep: null };
    _applyTaskModalMode();

    openModal('modal-new-task');
    currentInputMode = 'form';
    // Reset batch upgrade state.
    batchUpgrade = { fieldName: null, tab: 'list', state: _emptyUpgradeState(), blockOnPartial: false };
    // Reset batch schedule controls.
    document.getElementById('batch-schedule-section').classList.add('hidden');
    const concEl = document.getElementById('batch-concurrency'); if (concEl) concEl.value = 1;
    const blockEl = document.getElementById('batch-block-on-partial'); if (blockEl) blockEl.checked = false;
    // Reset note (optional, <=100 chars).
    const noteEl = document.getElementById('task-note'); if (noteEl) noteEl.value = '';
    document.querySelectorAll('#input-mode-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.mode === 'form'));
    document.getElementById('form-mode-container').classList.remove('hidden');
    document.getElementById('json-mode-container').classList.add('hidden');

    try {
        const data = await api('/api/platforms');
        platforms = data.platforms || [];
        refreshPlatformDisplayMap(platforms);
        const sel = document.getElementById('task-platform');
        sel.innerHTML = platforms.map(p => `<option value="${p.platform}">${getPlatformDisplayName(p.platform)}</option>`).join('');
        // Preselect platform if specified
        if (preselectedPlatform && platforms.find(p => p.platform === preselectedPlatform)) {
            sel.value = preselectedPlatform;
        }
        updateActions();
        // Preselect action if specified
        if (preselectedAction) {
            const actionSel = document.getElementById('task-action');
            actionSel.value = preselectedAction;
            updateSchemaForm();
        }
        // For plan-step mode with an existing step, hydrate the form once schema is loaded.
        if (_taskModalCtx.mode === 'plan-step' && _taskModalCtx.existingStep) {
            _hydratePlanStepIntoForm(_taskModalCtx.existingStep);
        }
        // Safety-net: ensure batch-schedule-section visibility matches current state.
        // _hydratePlanStepIntoForm does this internally, but if it threw mid-flight
        // (e.g. renderSchemaForm failed after setting batchUpgrade.fieldName), the
        // section would be stuck hidden. This call guarantees eventual consistency.
        _toggleBatchScheduleSection();
    } catch(e) { toast('加载平台信息失败', 'error'); }
}

// Toggle UI elements based on the current modal mode.
function _applyTaskModalMode() {
    const isPlan = _taskModalCtx.mode === 'plan-step';
    // Header title.
    const head = document.querySelector('#modal-new-task h3');
    if (head) head.textContent = isPlan
        ? (_taskModalCtx.existingStep ? '编辑步骤（调度计划）' : '添加步骤（调度计划）')
        : '新建任务';
    // Hide favorite button in plan-step mode.
    const left = document.getElementById('task-modal-left-actions');
    if (left) left.style.display = isPlan ? 'none' : '';
    // Swap submit button label & handler.
    const btn = document.getElementById('btn-probe-submit');
    if (btn) {
        if (isPlan) {
            btn.textContent = '保存到调度计划';
            btn.onclick = savePlanStepFromModal;
        } else {
            btn.textContent = '检测可用 Cookie';
            btn.onclick = probeCookiesBeforeSubmit;
        }
    }
}

// Hydrate the modal form from an existing scheduling step.
// Renders both form-mode (fields populated, batch card if applicable) and
// JSON-mode (textarea pre-filled), so toggling between modes works.
//
// New schema: step = { request_kind: 'task'|'batch', platform, task_type,
//                      request_payload, note }.
//   - 'task'  payload  = the POST /api/task input dict (single-task params).
//   - 'batch' payload  = the POST /api/batch body
//                        ({action, item_key, common_params, items_from, ...}).
function _hydratePlanStepIntoForm(step) {
    if (!step) { console.log('[hydrate] step is null/undefined, skipping'); return; }
    const payload = step.request_payload || {};
    const isBatch = step.request_kind === 'batch';

    // Choose the dict that should populate the per-action schema form.
    // For batch the action params live under common_params; for task they
    // live at the payload root.
    const formParams = isBatch ? (payload.common_params || {}) : payload;

    // 1) Always populate form fields from per-action params.
    if (typeof _fillSingleParamsIntoForm === 'function') {
        _fillSingleParamsIntoForm(formParams);
    }

    // 2) If batch, reverse-engineer batchUpgrade state from items_from /
    //    inline items so the purple upgrade card renders with the saved
    //    tab + values.
    if (isBatch) {
        const ift = payload.items_from || null;
        const inlineItems = Array.isArray(payload.items) ? payload.items : null;
        const fieldName = payload.item_key || (ift && ift.param_name) || '';
        const empty = _emptyUpgradeState();
        let tab = 'list';

        if (ift && ift.sources) {
            // Detect simple upstream-field reference: exactly 1 source with run_id
            // (produced by the upstream_field tab's _buildBatchItemsSpec).
            // Display as upstream_field tab so the user sees the simple picker,
            // not the raw SQL pipeline editor.
            const srcKeys = Object.keys(ift.sources);
            if (srcKeys.length === 1) {
                const srcVal = ift.sources[srcKeys[0]];
                if (srcVal && typeof srcVal === 'object' && srcVal.run_id) {
                    tab = 'upstream_field';
                    empty.upstream_field.run_id = srcVal.run_id || '';
                    empty.upstream_field.field = ift.field || srcVal.field || '';
                    const m = String(srcVal.run_id || '').match(/^\$\{step\[(\d+)\]\.task_id\}$/);
                    if (m) {
                        empty.upstream_field.subTab = 'plan-step';
                        if (typeof _schEditState !== 'undefined') {
                            const idx0 = parseInt(m[1], 10) - 1;
                            const ps = (_schEditState.steps || [])[idx0];
                            if (ps) {
                                empty.upstream_field._stepRefPlatform = ps.platform;
                                empty.upstream_field._stepRefAction = ps.task_type;
                            }
                        }
                    } else {
                        empty.upstream_field.subTab = 'existing';
                    }
                } else {
                    tab = 'upstream_sql';
                    empty.upstream_sql.sources = ift.sources;
                    if (ift.sql != null) empty.upstream_sql.sql = ift.sql;
                }
            } else {
                tab = 'upstream_sql';
                empty.upstream_sql.sources = ift.sources;
                if (ift.sql != null) empty.upstream_sql.sql = ift.sql;
            }
        } else if (ift && ift.run_id && 'field' in ift) {
            tab = 'upstream_field';
            empty.upstream_field.run_id = ift.run_id || '';
            empty.upstream_field.field = ift.field || '';
            const m = String(ift.run_id || '').match(/^\$\{step\[(\d+)\]\.task_id\}$/);
            if (m) {
                empty.upstream_field.subTab = 'plan-step';
                if (typeof _schEditState !== 'undefined') {
                    const idx0 = parseInt(m[1], 10) - 1;
                    const ps = (_schEditState.steps || [])[idx0];
                    if (ps) {
                        empty.upstream_field._stepRefPlatform = ps.platform;
                        empty.upstream_field._stepRefAction = ps.task_type;
                    }
                }
            } else {
                empty.upstream_field.subTab = 'existing';
            }
        } else if (ift && ift.sql) {
            tab = 'database';
            empty.database.sql = ift.sql;
        } else if (inlineItems) {
            tab = 'list';
            empty.list.items = inlineItems.join('\n');
        }

        batchUpgrade.fieldName = fieldName;
        batchUpgrade.tab = tab;
        batchUpgrade.state = empty;
        batchUpgrade.blockOnPartial = !(payload.allow_partial_upstream !== false);
        // Restore batch schedule controls from saved payload.
        const concEl = document.getElementById('batch-concurrency');
        if (concEl && typeof payload.concurrency === 'number') concEl.value = payload.concurrency;
        const blockEl = document.getElementById('batch-block-on-partial');
        if (blockEl) blockEl.checked = !!batchUpgrade.blockOnPartial;

        // Re-render schema form so the upgraded field renders as a card-host
        // placeholder (renderSchemaForm only emits data-bp-card-host="1" when
        // batchUpgrade.fieldName === key).
        if (currentSchema) {
            document.getElementById('form-mode-container').innerHTML = renderSchemaForm(currentSchema);
            initMultiEnumPickers(document.getElementById('form-mode-container'));
            if (typeof _fillSingleParamsIntoForm === 'function') {
                _fillSingleParamsIntoForm(formParams);

            }
        }
        if (typeof _renderBatchUpgradeCard === 'function') {
            try { _renderBatchUpgradeCard(); } catch (e) { console.warn('[hydrate] _renderBatchUpgradeCard failed:', e); }
        }
        _toggleBatchScheduleSection();
    } else {
        // Task mode: reset batchUpgrade so prior batch UI doesn't leak.
        batchUpgrade = { fieldName: null, tab: 'list', state: _emptyUpgradeState(), blockOnPartial: false };
    }

    // 3) Sync JSON textarea so switching to JSON mode shows correct contents.
    //    We show the actual request_payload JSON — that IS the wire body.
    const ta = document.getElementById('task-params');
    if (ta) ta.value = JSON.stringify(payload, null, 2);

    // 4) Note (if any) re-uses the same field on the step.
    const noteEl = document.getElementById('task-note');
    if (noteEl && step.note) noteEl.value = step.note;
}

// Save handler for plan-step mode. Serializes the modal's CURRENT active
// state into a step object and hands it to the caller-provided onSave
// callback. Per requirement 4.4/5.3: only the active tab's data is read;
// nothing from the previously-loaded step persists unless the user kept it
// active in the form.
function savePlanStepFromModal() {
    const platform = document.getElementById('task-platform').value;
    const action = document.getElementById('task-action').value;
    if (!platform || !action) { toast('请选择平台和接口', 'error'); return; }

    let formParams;
    if (currentInputMode === 'json') {
        try { formParams = JSON.parse(document.getElementById('task-params').value || '{}'); }
        catch (e) { toast('参数 JSON 不合法: ' + e.message, 'error'); return; }
    } else {
        formParams = collectFormData();
    }

    // Detect batch by checking batchUpgrade state (user clicked "升级为批处理").
    const isBatch = !!batchUpgrade.fieldName;

    const step = {
        request_kind: isBatch ? 'batch' : 'task',
        platform,
        task_type: action,
    };

    if (isBatch) {
        // Build POST /api/batch body shape from the active tab's state only.
        // collectFormData returned the full per-action params, including the
        // upgraded item_key field — strip that since item values come from
        // items_from / inline items, not from common_params.
        const commonParams = { ...formParams };
        delete commonParams[batchUpgrade.fieldName];

        const batchBody = {
            action,
            item_key: batchUpgrade.fieldName,
            common_params: commonParams,
            concurrency: parseInt(document.getElementById('batch-concurrency')?.value) || 1,
            allow_partial_upstream: !(document.getElementById('batch-block-on-partial')?.checked),
        };
        const itemsFromOrItems = _buildBatchItemsSpec();
        Object.assign(batchBody, itemsFromOrItems);
        step.request_payload = batchBody;
    } else {
        // Task mode: payload is the input dict verbatim.
        step.request_payload = formParams;
    }

    const note = (document.getElementById('task-note') || {}).value;
    if (note && note.trim()) step.note = note.trim();

    if (typeof _taskModalCtx.onSave === 'function') {
        _taskModalCtx.onSave(step);
    }
    closeNewTaskModal();
}

// Build the items source for a batch step's request_payload, based on the
// CURRENTLY ACTIVE batchUpgrade tab. Returns an object that should be
// merged into the batch body — either { items: [...] } (inline list) or
// { items_from: {...} } (async source spec).
function _buildBatchItemsSpec() {
    const st = batchUpgrade.state;
    const tab = batchUpgrade.tab;
    if (tab === 'list') {
        const itemsArr = (st.list.items || '')
            .split('\n')
            .map(s => s.trim())
            .filter(Boolean);
        return { items: itemsArr };
    } else if (tab === 'upstream_field') {
        // Convert legacy {run_id, field} to SQL pipeline {sources, sql, field}
        // so that dependencies are wired via merged_deps and the task enters
        // waiting_dependency until the upstream completes.
        const runId = st.upstream_field.run_id || '';
        const fld = st.upstream_field.field || '';
        return {
            items_from: {
                sources: { upstream: { run_id: runId, field: fld } },
                sql: `SELECT ${fld || 'item'} FROM upstream`,
                field: fld,
            },
        };
    } else if (tab === 'upstream_failed') {
        return {
            items_from: { run_id: st.upstream_failed.run_id || '' },
        };
    } else if (tab === 'database') {
        return { items_from: { sql: st.database.sql || '' } };
    } else if (tab === 'upstream_sql') {
        return {
            items_from: {
                sources: st.upstream_sql.sources || {},
                sql: st.upstream_sql.sql || '',
            },
        };
    }
    return { items: [] };
}

// ── Action Schema Modal ───────────────────────────────────────────
// Lazily fetches /api/actions/{platform}/{action}/schema (which returns the
// v2 form: input_schema + output_schema_v2) and renders two tabs. The
// "创建任务" button calls openNewTaskWithAction so the modal becomes a
// drill-in step on the action card workflow rather than a parallel UI.
let _actionSchemaState = { platform: null, action: null, payload: null, tab: 'input' };

async function openActionSchemaModal(platform, action) {
    _actionSchemaState = { platform, action, payload: null, tab: 'input' };

    // Pre-populate header so user sees something while we fetch.
    const platDisplay = (platforms.find(p => p.platform === platform)?.display_name) || platform;
    const actDisplay = getActionDisplayName(action, platform);
    document.getElementById('action-schema-title').textContent =
        `${platDisplay} · ${actDisplay}`;
    document.getElementById('action-schema-desc').textContent = '加载中...';
    document.getElementById('action-schema-body').innerHTML =
        '<div class="action-schema-empty">加载中...</div>';
    _setActionSchemaTab('input');
    openModal('modal-action-schema');

    try {
        const payload = await api(`/api/actions/${encodeURIComponent(platform)}/${encodeURIComponent(action)}/schema`);
        _actionSchemaState.payload = payload;
        document.getElementById('action-schema-desc').textContent =
            payload.description || '';
        _renderActionSchemaBody();
    } catch (e) {
        document.getElementById('action-schema-desc').textContent = '';
        document.getElementById('action-schema-body').innerHTML =
            `<div class="action-schema-empty">加载失败：${(e && e.message) || e}</div>`;
    }
}

function switchActionSchemaTab(tab) {
    _actionSchemaState.tab = tab;
    _setActionSchemaTab(tab);
    _renderActionSchemaBody();
}

function _setActionSchemaTab(tab) {
    document.getElementById('action-schema-tab-input')
        .classList.toggle('active', tab === 'input');
    document.getElementById('action-schema-tab-output')
        .classList.toggle('active', tab === 'output');
}

function _escAttr(s) {
    return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function _renderActionSchemaBody() {
    const payload = _actionSchemaState.payload;
    const body = document.getElementById('action-schema-body');
    if (!payload) {
        body.innerHTML = '<div class="action-schema-empty">无数据</div>';
        return;
    }
    if (_actionSchemaState.tab === 'input') {
        body.innerHTML = _renderInputSchemaTable(payload.input_schema || {});
    } else {
        body.innerHTML = _renderOutputSchemaTable(payload.output_schema_v2 || {});
    }
}

function _renderInputSchemaTable(inputSchema) {
    const props = inputSchema.properties || {};
    const required = new Set(inputSchema.required || []);
    const names = Object.keys(props);
    if (!names.length) {
        return '<div class="action-schema-empty">该动作不需要参数</div>';
    }
    const rows = names.map(name => {
        const spec = props[name] || {};
        let typeStr = spec.type || 'any';
        if (spec.default !== undefined) typeStr += ` (默认 ${JSON.stringify(spec.default)})`;
        const isReq = required.has(name);
        // JSON Schema convention: ``title`` is the human-friendly label.
        const label = spec.title || '';
        let desc = spec.description || '';
        if (Array.isArray(spec.enum)) {
            const labels = Array.isArray(spec.enum_labels) ? spec.enum_labels : [];
            const pairs = spec.enum.map((v, i) => labels[i] ? `${v}=${labels[i]}` : v).join(', ');
            desc = (desc ? desc + ' · ' : '') + `枚举: ${pairs}`;
        }
        return `<tr>
            <td class="field-name">${_escAttr(name)}</td>
            <td class="field-type">${_escAttr(typeStr)}</td>
            <td class="field-required">${isReq ? '<span class="req-yes">必填</span>' : '<span class="req-no">可选</span>'}</td>
            <td class="field-label">${_escAttr(label)}</td>
            <td class="field-desc">${_escAttr(desc)}</td>
        </tr>`;
    }).join('');
    return `<table class="action-schema-table">
        <thead><tr>
            <th>字段</th><th>类型</th><th>必填</th><th>中文名</th><th>说明</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

function _renderOutputSchemaTable(outV2) {
    const names = Object.keys(outV2 || {});
    if (!names.length) {
        return '<div class="action-schema-empty">该动作未声明 output_schema</div>';
    }
    const rows = names.map(name => {
        const fd = outV2[name] || {};
        return `<tr>
            <td class="field-name">${_escAttr(name)}</td>
            <td class="field-type">${_escAttr(fd.type || '')}</td>
            <td class="field-label">${_escAttr(fd.label || '')}</td>
            <td class="field-desc">${_escAttr(fd.description || '')}</td>
        </tr>`;
    }).join('');
    return `<table class="action-schema-table">
        <thead><tr>
            <th>字段</th><th>类型</th><th>中文名</th><th>说明</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

function actionSchemaCreateTask() {

// ── Modal z-index stacking manager ───────────────────────
let _modalZBase = 100;
let _modalZCounter = 0;
function openModal(id) {
    const el = document.getElementById(id);
    _modalZCounter++;
    el.style.zIndex = _modalZBase + _modalZCounter;
    el.classList.remove('hidden');
}
function closeModal(id) {
    const el = document.getElementById(id);
    el.classList.add('hidden');
    el.style.zIndex = '';
    // Reset counter when all modals are closed
    const allOverlays = document.querySelectorAll('.modal-overlay:not(.hidden)');
    if (allOverlays.length === 0) _modalZCounter = 0;
    // Stop batch children auto-refresh when its modal is closed
    if (id === 'modal-batch-children') _stopBatchChildrenRefresh();
}

// Task type ('single' | 'batch'); items_from sub-mode ('simple' | 'advanced')
// ── Batch upgrade state ──────────────────────────────────
// Only ONE parameter can be upgraded to batch at a time.
//   batchUpgrade.fieldName  : string | null    -- which schema field is currently upgraded
//   batchUpgrade.tab        : 'list' | 'upstream_field' | 'upstream_sql'
//   batchUpgrade.state.list           : { items: string[] }
//   batchUpgrade.state.upstream_field : { run_id, field, fieldOptions }
//   batchUpgrade.state.upstream_sql   : { sources: [{alias,type,value}], sql }
//   batchUpgrade.blockOnPartial : boolean       -- checkbox: 上游部分失败就阻断（默认 false）
const _emptyUpgradeState = () => ({
    list: { items: '' },
    upstream_field: { run_id: '', field: '', fieldOptions: [] },
    upstream_sql: { sources: [{ alias: 'upstream', type: 'run_id', value: '' }], sql: '' },
});
let batchUpgrade = {
    fieldName: null,
    tab: 'list',
    state: _emptyUpgradeState(),
    blockOnPartial: false,
};

function _isBatchMode() { return batchUpgrade.fieldName !== null; }

// --- JSON-mode batch detection (decoupled from form-mode batchUpgrade) ---
// Identify batch payload purely by JSON content. Returns { isBatch, error?, normalized? }.
//   isBatch=true requires: object + non-empty string item_key + (non-empty items array OR items_from object).
//   error: structural inconsistency that should block submission (e.g. item_key but no items/items_from).
function _detectBatchFromJson(obj) {
    if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return { isBatch: false };
    const hasItemKey = typeof obj.item_key === 'string' && obj.item_key.trim() !== '';
    const hasItems = Array.isArray(obj.items) && obj.items.length > 0;
    const hasItemsFrom = obj.items_from && typeof obj.items_from === 'object' && !Array.isArray(obj.items_from);
    const looksBatch = hasItemKey || hasItems || hasItemsFrom
        || ('action' in obj) || ('common_params' in obj) || ('concurrency' in obj) || ('fail_strategy' in obj);
    if (!looksBatch) return { isBatch: false };
    // It looks like a batch payload — validate self-consistency.
    if (!hasItemKey) return { isBatch: true, error: 'JSON 看起来是批处理 payload，但缺少 item_key（要批量化的参数名）' };
    if (!hasItems && !hasItemsFrom) return { isBatch: true, error: 'JSON 看起来是批处理 payload，但缺少 items 或 items_from' };
    if (hasItems && hasItemsFrom) return { isBatch: true, error: 'items 与 items_from 互斥，请只填写其中一个' };
    if (hasItems) {
        for (const v of obj.items) {
            if (v === null || v === undefined || (typeof v === 'string' && v.trim() === '')) {
                return { isBatch: true, error: 'items 中存在空值' };
            }
        }
    }
    if (hasItemsFrom) {
        const f = obj.items_from;
        const hasFile = typeof f.file === 'string' && f.file.trim() !== '';
        const hasSql = typeof f.sql === 'string' && f.sql.trim() !== '' && f.sources && typeof f.sources === 'object';
        if (!hasFile && !hasSql) {
            return { isBatch: true, error: 'items_from 必须是 {file} 或 {sources, sql, field} 形式' };
        }
    }
    if ('concurrency' in obj && (!Number.isFinite(obj.concurrency) || obj.concurrency < 1)) {
        return { isBatch: true, error: 'concurrency 必须是 ≥1 的整数' };
    }
    if ('fail_strategy' in obj && obj.fail_strategy !== 'continue' && obj.fail_strategy !== 'abort') {
        return { isBatch: true, error: 'fail_strategy 仅支持 "continue" 或 "abort"' };
    }
    if ('action' in obj && (typeof obj.action !== 'string' || obj.action.trim() === '')) {
        return { isBatch: true, error: 'action 必须是非空字符串' };
    }
    return { isBatch: true };
}

// True iff current input is a (well-formed) JSON-mode batch payload.
function _isJsonModeBatch() {
    if (currentInputMode !== 'json') return false;
    let obj;
    try { obj = JSON.parse(document.getElementById('task-params').value); }
    catch(e) { return false; }
    const det = _detectBatchFromJson(obj);
    return det.isBatch && !det.error;
}

// SVG used inside the downgrade button.
const _BP_TAB_LABELS = {
    list: '直接输入清单',
    upstream_field: '直接获取上游字段',
    upstream_sql: '基于上游字段解析',
};

function upgradeBatchParam(fieldName) {
    // Hard guard: only 1 batch param can be active at a time. Caller must downgrade the
    // current one first. The render layer disables sibling upgrade buttons, so this
    // branch only triggers if invoked programmatically.
    if (batchUpgrade.fieldName && batchUpgrade.fieldName !== fieldName) {
        toast(`仅能同时升级 1 个批处理参数。请先取消「${batchUpgrade.fieldName}」的升级。`, 'warn');
        return;
    }
    batchUpgrade.fieldName = fieldName;
    if (!batchUpgrade.tab) batchUpgrade.tab = 'list';
    // Re-render schema form with new upgrade target highlighted.
    document.getElementById('form-mode-container').innerHTML = renderSchemaForm(currentSchema);
    initMultiEnumPickers(document.getElementById('form-mode-container'));
    _renderBatchUpgradeCard();
    _toggleBatchScheduleSection();
}

function downgradeBatchParam() {
    _captureBatchCardState();
    batchUpgrade.fieldName = null;
    document.getElementById('form-mode-container').innerHTML = renderSchemaForm(currentSchema);
    initMultiEnumPickers(document.getElementById('form-mode-container'));
    // Restore any non-upgraded form values from buildSaveInput cache (lazy: skip for now).
    _toggleBatchScheduleSection();
}

function _toggleBatchScheduleSection() {
    const section = document.getElementById('batch-schedule-section');
    if (_isBatchMode()) section.classList.remove('hidden');
    else section.classList.add('hidden');
    _refreshBlockOnPartialVisibility();
}

function _refreshBlockOnPartialVisibility() {
    // Show "上游部分失败就阻断" checkbox only when current tab uses upstream as data source.
    const label = document.getElementById('batch-block-on-partial-label');
    if (!label) return;
    const usesUpstream = (batchUpgrade.tab === 'upstream_field' || batchUpgrade.tab === 'upstream_sql');
    label.style.display = (_isBatchMode() && usesUpstream) ? '' : 'none';
    const cb = document.getElementById('batch-block-on-partial');
    if (cb) cb.checked = !!batchUpgrade.blockOnPartial;
    cb && (cb.onchange = () => { batchUpgrade.blockOnPartial = cb.checked; });
}

function _renderBatchUpgradeCard() {
    if (!_isBatchMode()) return;
    const host = document.querySelector(`[data-bp-card-host="1"][data-bp-row="${batchUpgrade.fieldName}"]`);
    if (!host) return;
    const prop = currentSchema?.properties?.[batchUpgrade.fieldName] || {};
    const required = (currentSchema?.required || []).includes(batchUpgrade.fieldName);
    const label = prop.description || batchUpgrade.fieldName;
    host.innerHTML = `
        <div class="bp-card">
            <div class="bp-card-head">
                <div class="bp-card-title ${required ? 'bp-required' : ''}">${label} · 批处理参数</div>
                <button type="button" class="bp-downgrade-btn" title="降级为普通参数" onclick="downgradeBatchParam()">${BP_DOWNGRADE_ICON_SVG}<span>降级</span></button>
            </div>
            <div class="bp-tabs" role="tablist">
                ${['list', 'upstream_field', 'upstream_sql'].map(t => `
                    <div class="bp-tab ${batchUpgrade.tab === t ? 'active' : ''}" data-tab="${t}" onclick="switchBatchTab('${t}')">${_BP_TAB_LABELS[t]}</div>
                `).join('')}
            </div>
            <div class="bp-pane" id="bp-pane-${batchUpgrade.tab}"></div>
        </div>
    `;
    _renderBatchPane();
}

function switchBatchTab(tab) {
    if (batchUpgrade.tab === tab) return;
    _captureBatchCardState();
    batchUpgrade.tab = tab;
    _renderBatchUpgradeCard();
    _refreshBlockOnPartialVisibility();
}

function _renderBatchPane() {
    const pane = document.getElementById(`bp-pane-${batchUpgrade.tab}`);
    if (!pane) return;
    if (batchUpgrade.tab === 'list') {
        const items = batchUpgrade.state.list.items || '';
        pane.innerHTML = `
            <div class="form-group" style="margin-bottom:8px;">
                <label class="required">每行一个值</label>
                <textarea id="bp-list-items" placeholder="王者荣耀&#10;原神&#10;..." style="min-height:120px;">${items}</textarea>
                <div class="hint">每行作为一个 item 取值，下游任务会逐个执行。提交时强制去重。</div>
            </div>
        `;
        document.getElementById('bp-list-items').addEventListener('input', e => {
            batchUpgrade.state.list.items = e.target.value;
        });
    } else if (batchUpgrade.tab === 'upstream_field') {
        const st = batchUpgrade.state.upstream_field;
        const opts = st.fieldOptions || [];
        const optsHtml = opts.length
            ? '<option value="">（请选择字段）</option>' + opts.map(c => {
                const labelPart = c.label ? ` — ${escapeHtml(c.label)}` : '';
                return `<option value="${c.name}" ${c.name === st.field ? 'selected' : ''}>${escapeHtml(c.name)} : ${escapeHtml(c.dtype)}${labelPart}</option>`;
            }).join('')
            : `<option value="">${st.run_id ? '（该 action 未声明 output_schema，请手填）' : '（先填上游任务 ID 自动加载字段）'}</option>`;
        // Plan-step mode adds an inner tab: "调度任务" (prior step ref)  /  "已有任务" (live task search).
        const isPlanStep = (typeof _taskModalCtx !== 'undefined') && _taskModalCtx.mode === 'plan-step';
        if (isPlanStep && !st.subTab) {
            // Default to plan-step ref if any prior steps exist; else fall back to existing-task.
            const hasPriorSteps = (typeof _schEditState !== 'undefined') && _schEditState.steps && _taskModalCtx.stepIdx > 0;
            st.subTab = hasPriorSteps ? 'plan-step' : 'existing';
        } else if (!isPlanStep) {
            st.subTab = 'existing';
        }
        const subTabsHtml = isPlanStep ? `
            <div class="tabs" style="margin-bottom:8px;">
                <div class="tab ${st.subTab === 'plan-step' ? 'active' : ''}" onclick="switchUpstreamFieldSubTab('plan-step')">调度任务</div>
                <div class="tab ${st.subTab === 'existing' ? 'active' : ''}" onclick="switchUpstreamFieldSubTab('existing')">已有任务</div>
            </div>
        ` : '';
        const sourcePickerHtml = (isPlanStep && st.subTab === 'plan-step')
            ? `<div id="bp-uf-stepref-host"></div>
               <div class="hint">仅能引用在当前步骤之前已填写的步骤</div>`
            : `<div id="bp-uf-runid-host"></div>
                <div class="hint">搜索 ID / 平台 / 接口 / 参数（空格分隔多关键词）</div>`;
        pane.innerHTML = `
            ${subTabsHtml}
            <div class="form-group">
                <label class="required">${(isPlanStep && st.subTab === 'plan-step') ? '前序步骤' : '上游任务 ID'}</label>
                ${sourcePickerHtml}
            </div>
            <div class="form-group">
                <label class="required">字段名</label>
                <div style="display:flex;gap:6px;">
                    <select id="bp-uf-field-select" style="flex:1;"><option value="" disabled selected hidden>${opts.length === 0 ? '（先填上游任务 ID 自动加载字段）' : '（请选择字段）'}</option>${optsHtml}</select>
                </div>
                <div class="hint">上游输出自动去重</div>
            </div>
        `;
        if (isPlanStep && st.subTab === 'plan-step') {
            // Render a simple <select> of prior steps.
            const priorSteps = (_schEditState.steps || []).slice(0, _taskModalCtx.stepIdx);
            const host = document.getElementById('bp-uf-stepref-host');
            if (priorSteps.length === 0) {
                host.innerHTML = '<div class="muted" style="padding:6px;">当前步骤之前没有可引用的步骤</div>';
            } else {
                // Determine which prior step (if any) is currently referenced.
                let curIdx = '';
                const m = String(st.run_id || '').match(/^\$\{step\[(\d+)\]\.task_id\}$/);
                if (m) {
                    const val = parseInt(m[1], 10);
                    // val===0 is definitely 0-based (1-based would never produce 0).
                    // For val>0 it's ambiguous (0-based new or 1-based legacy);
                    // default to legacy heuristic (val-1) which is correct for
                    // the most common case. The one-time re-selection on first edit
                    // is acceptable for the transitional edge cases.
                    curIdx = String(val === 0 ? 0 : val - 1);
                }
                host.innerHTML = `
                    <select id="bp-uf-stepref-select" style="width:100%;">
                        <option value="">（请选择前序步骤）</option>
                        ${priorSteps.map((ps, i) => `<option value="${i}" ${String(i) === curIdx ? 'selected' : ''}>步骤 #${i + 1} - ${escapeHtml(ps.platform || '?')}/${escapeHtml(ps.task_type || '?')}</option>`).join('')}
                    </select>
                `;
                document.getElementById('bp-uf-stepref-select').addEventListener('change', e => {
                    const v = e.target.value;
                    if (v === '') { st.run_id = ''; st.fieldOptions = []; _bpLoadUpstreamFields(); return; }
                    const idx0 = parseInt(v, 10);
                    // Store as ${step[n].task_id} where n is 0-based step_index.
                    st.run_id = `\${step[${idx0}].task_id}`;
                    // Cache prior step's platform/action so _bpLoadUpstreamFields can use them.
                    const ps = priorSteps[idx0];
                    st._stepRefPlatform = ps.platform;
                    st._stepRefAction = ps.task_type;
                    clearTimeout(_bpUfFieldsTimer);
                    _bpUfFieldsTimer = setTimeout(_bpLoadUpstreamFields, 100);
                });
                // If pre-existing ref, populate cached platform/action and trigger field load.
                if (curIdx !== '') {
                    const ps = priorSteps[parseInt(curIdx, 10)];
                    st._stepRefPlatform = ps.platform;
                    st._stepRefAction = ps.task_type;
                    clearTimeout(_bpUfFieldsTimer);
                    _bpUfFieldsTimer = setTimeout(_bpLoadUpstreamFields, 100);
                }
            }
        } else {
            // Mount the shared task-id search dropdown into the host div.
            mountTaskSearchSelect(document.getElementById('bp-uf-runid-host'), {
                initial: st.run_id && !String(st.run_id).startsWith('${') ? st.run_id : '',
                inputId: 'bp-uf-runid',
        placeholder: '搜索 ID / 平台 / 接口 / 参数（空格分隔多关键词）',
                onChange: (val) => {
                    st.run_id = (val || '').trim();
                    st._stepRefPlatform = null;
                    st._stepRefAction = null;
                    clearTimeout(_bpUfFieldsTimer);
                    _bpUfFieldsTimer = setTimeout(_bpLoadUpstreamFields, 400);
                },
            });
        }
        document.getElementById('bp-uf-field-select').addEventListener('change', e => {
            if (e.target.value) {
                st.field = e.target.value;
            }
        });
        if (st.run_id && opts.length === 0) _bpLoadUpstreamFields();
    } else if (batchUpgrade.tab === 'upstream_sql') {
        const st = batchUpgrade.state.upstream_sql;
        if (!st.sources || st.sources.length === 0) st.sources = [{ alias: 'upstream', type: 'run_id', value: '' }];
        pane.innerHTML = `
            <div class="form-group">
                <label class="required">Sources（上游别名 → 任务 ID 或文件路径）</label>
                <div id="bp-sql-sources"></div>
                <button class="btn btn-sm btn-outline" onclick="addBatchSqlSource()" style="margin-top:4px;">+ 添加源</button>
                <div class="hint">每行：alias / 类型（任务ID 或 path） / 值。在 SQL 中通过 alias 引用</div>
            </div>
            <div class="form-group">
                <label class="required">SQL（DuckDB 语法，仅支持 select 一个字段）</label>
                <textarea id="bp-sql-text" class="sql-editor" placeholder="SELECT app_id&#10;FROM upstream&#10;WHERE rank &lt;= 50">${st.sql || ''}</textarea>
            </div>
            <div style="margin-bottom:10px;">
                <div id="bp-sql-hint" style="font-size:11px;color:var(--text2);margin-bottom:6px;">L0/L1/L2 校验 + LIMIT 10 真实运行；提交时强制只能 SELECT 一个字段</div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-sm btn-outline" style="flex:1;white-space:nowrap;" onclick="previewBatchUpgradeSql()">预览结果</button>
                    <button class="btn btn-sm btn-outline" style="flex:1;white-space:nowrap;" onclick="validateBatchUpgradeSql()">校验 SQL</button>
                </div>
            </div>
            <div id="bp-sql-preview-result"></div>
        `;
        _renderSqlSourceRows();
        document.getElementById('bp-sql-text').addEventListener('input', e => { st.sql = e.target.value; });
    }
    // Field rendered after pane is built; bind partial-failure checkbox.
    _refreshBlockOnPartialVisibility();
}

let _bpUfFieldsTimer = null;
function switchUpstreamFieldSubTab(sub) {
    const st = batchUpgrade.state.upstream_field;
    if (st.subTab === sub) return;
    st.subTab = sub;
    // Clear current run_id when switching tabs to avoid mixing refs.
    st.run_id = '';
    st.fieldOptions = [];
    st._stepRefPlatform = null;
    st._stepRefAction = null;
    _renderBatchPane();
}
async function _bpLoadUpstreamFields() {
    const st = batchUpgrade.state.upstream_field;
    const sel = document.getElementById('bp-uf-field-select');
    if (!sel) return;
    if (!st.run_id) {
        st.fieldOptions = [];
        sel.innerHTML = '<option value="">（先填上游任务 ID 自动加载字段）</option>';
        return;
    }
    sel.innerHTML = '<option value="">（加载中...）</option>';
    try {
        let platform, action;
        if (st._stepRefPlatform && st._stepRefAction) {
            // Plan-step ref: skip /api/tasks lookup (the task does not exist yet).
            platform = st._stepRefPlatform;
            action = st._stepRefAction;
        } else {
            const task = await api(`/api/tasks/${st.run_id}`);
            platform = task.platform;
            // For batch parents, the real action lives in snapshot_param.action
            // (snapshot_param is the executable view; logic_param keeps the
            // user's items_from in its raw form which doesn't expose action).
            action = (task.task_type === 'batch_run' && task.snapshot_param && task.snapshot_param.action)
                ? task.snapshot_param.action
                : task.task_type;
        }
        const schemaResp = await api(`/api/actions/${platform}/${action}/schema`);
        const out = schemaResp.output_schema || {};
        const v2 = schemaResp.output_schema_v2 || {};
        // Schema v2 carries {type,label,description} per field; fall back to v1 type if v2 missing.
        const cols = Object.entries(out).map(([name, dtype]) => {
            const meta = v2[name] || {};
            return { name, dtype, label: meta.label || '' };
        });
        st.fieldOptions = cols;
        if (cols.length === 0) {
            sel.innerHTML = '<option value="">（该 action 未声明 output_schema，请手填）</option>';
        } else {
            sel.innerHTML = '<option value="">（请选择字段）</option>' + cols.map(c => {
                const labelPart = c.label ? ` — ${escapeHtml(c.label)}` : '';
                return `<option value="${c.name}" ${c.name === st.field ? 'selected' : ''}>${escapeHtml(c.name)} : ${escapeHtml(c.dtype)}${labelPart}</option>`;
            }).join('');
            // Force <select>.value sync (Chrome sometimes ignores 'selected' attr after dynamic innerHTML).
            if (st.field) sel.value = st.field;
        }
    } catch (e) {
        st.fieldOptions = [];
        sel.innerHTML = `<option value="">（加载字段失败：${e.message || ''}）</option>`;
    }
}

function _renderSqlSourceRows() {
    const list = document.getElementById('bp-sql-sources');
    if (!list) return;
    const st = batchUpgrade.state.upstream_sql;
    // Destroy any previous mountTaskSearchSelect instances
    (st._tssInstances || []).forEach(inst => inst.destroy());
    st._tssInstances = [];

    list.innerHTML = '';
    st.sources.forEach((src, idx) => {
        const row = document.createElement('div');
        row.className = 'src-row';
        row.innerHTML = `
            <input type="text" placeholder="alias" class="src-alias" value="${src.alias || ''}">
            <select class="src-type">
                <option value="run_id" ${src.type === 'path' ? '' : 'selected'}>任务ID</option>
                <option value="path" ${src.type === 'path' ? 'selected' : ''}>path</option>
            </select>
            <div class="src-value-host"></div>
            <button class="btn-del" title="删除" data-idx="${idx}">&times;</button>
        `;
        row.querySelector('.src-alias').addEventListener('input', e => { st.sources[idx].alias = e.target.value.trim(); });

        const typeSelect = row.querySelector('.src-type');
        typeSelect.addEventListener('change', e => {
            st.sources[idx].type = e.target.value;
            _renderSqlSourceRows(); // re-render to switch input type
        });

        // Render the value input — use mountTaskSearchSelect for run_id, plain input for path.
        const valueHost = row.querySelector('.src-value-host');
        if (src.type === 'run_id') {
            const tssInst = mountTaskSearchSelect(valueHost, {
                initial: src.value || '',
                placeholder: '搜索上游任务',
                onChange: (val) => { st.sources[idx].value = val; },
            });
            st._tssInstances.push(tssInst);
        } else {
            valueHost.innerHTML = `<input type="text" placeholder="文件路径" class="src-value" value="${escapeHtml(src.value || '')}">`;
            valueHost.querySelector('.src-value').addEventListener('input', e => { st.sources[idx].value = e.target.value.trim(); });
        }

        row.querySelector('.btn-del').addEventListener('click', () => {
            st.sources.splice(idx, 1);
            if (st.sources.length === 0) st.sources.push({ alias: 'upstream', type: 'run_id', value: '' });
            _renderSqlSourceRows();
        });
        list.appendChild(row);
    });
}

function addBatchSqlSource() {
    batchUpgrade.state.upstream_sql.sources.push({ alias: '', type: 'run_id', value: '' });
    _renderSqlSourceRows();
