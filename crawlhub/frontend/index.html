// ── View Task Logs ───────────────────────────────────────
let logWebSocket = null;
let logAutoScroll = true;

async function viewLogs(taskId, status) {
    document.getElementById('drawer-backdrop').classList.remove('hidden');
    document.getElementById('product-drawer').classList.add('open');
document.getElementById('drawer-title').textContent = `任务日志 - ${taskId}`;
    document.getElementById('drawer-content').innerHTML = '<div class="empty">加载中...</div>';

    // Close any existing WebSocket
    if (logWebSocket) { logWebSocket.close(); logWebSocket = null; }

    if (status === 'running') {
        // Use WebSocket for real-time logs
        connectLogWebSocket(taskId);
    } else {
        // Load historical logs via HTTP
        try {
            const resp = await fetch(`${API}/api/tasks/${taskId}/logs`);
            if (resp.ok) {
                const data = await resp.json();
                const lines = data.lines || [];
                renderLogPanel(lines, false);
            } else {
                document.getElementById('drawer-content').innerHTML = '<div class="empty">暂无日志</div>';
            }
        } catch(e) {
            document.getElementById('drawer-content').innerHTML = `<div class="empty">加载日志失败: ${e.message}</div>`;
        }
    }
}

function connectLogWebSocket(taskId) {
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}/ws/tasks/${taskId}/logs`;

    document.getElementById('drawer-content').innerHTML = `
        <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px;color:var(--text2);"><span class="cookie-dot refreshing" style="width:6px;height:6px;display:inline-block;"></span> 实时日志</span>
            <button class="btn btn-sm btn-outline" onclick="toggleLogAutoScroll()">自动滚动: <span id="autoscroll-status">开</span></button>
        </div>
        <div class="log-panel" id="log-panel"></div>
    `;

    logAutoScroll = true;
    const panel = document.getElementById('log-panel');

    // Detect manual scroll
    panel.addEventListener('scroll', () => {
        const atBottom = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 50;
        if (!atBottom && logAutoScroll) {
            logAutoScroll = false;
            const statusEl = document.getElementById('autoscroll-status');
            if (statusEl) statusEl.textContent = '关';
        }
    });

    try {
        logWebSocket = new WebSocket(wsUrl);
        logWebSocket.onmessage = (event) => {
            const line = event.data;
            appendLogLine(panel, line);
        };
        logWebSocket.onerror = () => {
            appendLogLine(panel, '[连接错误] WebSocket 连接失败，尝试 HTTP 加载...\n');
            // Fallback to HTTP
            loadLogsHttp(taskId);
        };
        logWebSocket.onclose = () => {
            appendLogLine(panel, '\n--- 日志流已关闭 ---\n');
        };
    } catch(e) {
        loadLogsHttp(taskId);
    }
}

async function loadLogsHttp(taskId) {
    try {
        const resp = await fetch(`${API}/api/tasks/${taskId}/logs`);
        if (resp.ok) {
            const data = await resp.json();
            renderLogPanel(data.lines || [], false);
        }
    } catch(e) {}
}

function renderLogPanel(lines, isLive) {
    const maxInitialLines = 200;
    const totalLines = lines.length;
    const displayLines = totalLines > 500 ? lines.slice(-maxInitialLines) : lines;
    const hasMore = totalLines > 500;

    let html = '';
    if (hasMore) {
        html += `<div style="margin-bottom:8px;text-align:center;">
            <button class="btn btn-sm btn-outline" onclick="this.parentElement.remove()">显示全部 ${totalLines} 行</button>
            <span style="font-size:11px;color:var(--text2);margin-left:8px;">当前显示最后 ${maxInitialLines} 行</span>
        </div>`;
    }
    html += `<div class="log-panel" id="log-panel">${displayLines.map(formatLogLine).join('')}</div>`;

    document.getElementById('drawer-content').innerHTML = html;

    // Auto-scroll to bottom
    const panel = document.getElementById('log-panel');
    if (panel) panel.scrollTop = panel.scrollHeight;
}

function formatLogLine(line) {
    let cls = '';
    if (line.includes('[OK]') || line.includes('[PASS]')) cls = 'log-line-ok';
    else if (line.includes('[ERR]') || line.includes('[FAIL]') || line.includes('Error')) cls = 'log-line-err';
    else if (line.includes('[WARN]')) cls = 'log-line-warn';
    return `<div class="${cls}">${escapeHtml(line)}</div>`;
}

function appendLogLine(panel, line) {
    if (!panel) return;
    const div = document.createElement('div');
    if (line.includes('[OK]') || line.includes('[PASS]')) div.className = 'log-line-ok';
    else if (line.includes('[ERR]') || line.includes('[FAIL]') || line.includes('Error')) div.className = 'log-line-err';
    else if (line.includes('[WARN]')) div.className = 'log-line-warn';
    div.textContent = line;
    panel.appendChild(div);
    if (logAutoScroll) panel.scrollTop = panel.scrollHeight;
}

function toggleLogAutoScroll() {
    logAutoScroll = !logAutoScroll;
    const statusEl = document.getElementById('autoscroll-status');
    if (statusEl) statusEl.textContent = logAutoScroll ? '开' : '关';
    if (logAutoScroll) {
        const panel = document.getElementById('log-panel');
        if (panel) panel.scrollTop = panel.scrollHeight;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ── Product Preview ──────────────────────────────────────
//
// Per-task Chinese-vs-English column header preference. ``true`` (default)
// shows the v2 ``label`` when present and falls back to the raw field name.
// ``false`` always shows the raw field name (handy for SQL / CSV authors).
function _getDrawerShowChinese() {
    try {
        const v = localStorage.getItem('drawer_show_chinese');
        if (v === '0' || v === 'false') return false;
    } catch(e) {}
    return true; // default ON
}
function _setDrawerShowChinese(on) {
    try { localStorage.setItem('drawer_show_chinese', on ? '1' : '0'); } catch(e) {}
}

// Cache for v2 schemas keyed by "platform:action" — drawer hits the same
// (platform, action) repeatedly when paginating; avoid refetching.
const _outputSchemaV2Cache = {};
async function _fetchOutputSchemaV2(platform, action) {
    if (!platform || !action) return {};
    const key = `${platform}:${action}`;
    if (_outputSchemaV2Cache[key] !== undefined) return _outputSchemaV2Cache[key];
    try {
        const r = await api(`/api/actions/${encodeURIComponent(platform)}/${encodeURIComponent(action)}/schema`);
        _outputSchemaV2Cache[key] = r.output_schema_v2 || {};
    } catch(e) {
        _outputSchemaV2Cache[key] = {};
    }
    return _outputSchemaV2Cache[key];
}

// Build <th> HTML for one column based on current language preference.
// Extracted so toggleDrawerHeaderLang can reuse it without rebuilding the
// entire drawer (which would reset the scroll position).
function _buildDrawerThHtml(columns, outV2, showCn) {
    return columns.map(c => {
        const fd = outV2[c] || {};
        const label = fd.label || '';
        const desc = fd.description || '';
        const display = (showCn && label) ? label : c;
        const tooltipParts = [c];
        if (label && label !== display) tooltipParts.push(label);
        if (desc) tooltipParts.push(desc);
        const tooltip = tooltipParts.join('\n');
        return `<th title="${escapeHtml(tooltip)}" style="position:sticky;top:0;background:var(--surface2);z-index:1;">${escapeHtml(display)}</th>`;
    }).join('');
}

// Drawer header language toggle — flips the preference and updates ONLY the
// <thead> + button text in place, preserving the drawer scroll position.
// Falls back to a full re-render if cached context is missing.
function toggleDrawerHeaderLang(taskId) {
    const next = !_getDrawerShowChinese();
    _setDrawerShowChinese(next);
    const ctx = window._drawerLastView;
    if (ctx && ctx.taskId === taskId && ctx.columns && ctx.outV2) {
        const thead = document.getElementById('drawer-data-thead');
        if (thead) {
            thead.innerHTML = `<tr>${_buildDrawerThHtml(ctx.columns, ctx.outV2, next)}</tr>`;
        }
        const btn = document.getElementById('drawer-lang-toggle-btn');
        if (btn) {
            btn.textContent = next ? '显示英文字段名' : '显示中文字段名';
        }
        return;
    }
    viewProduct(taskId);
}

async function viewProduct(taskId) {
    document.getElementById('drawer-backdrop').classList.remove('hidden');
    document.getElementById('product-drawer').classList.add('open');
document.getElementById('drawer-title').textContent = `产物预览 - ${taskId}`;
    document.getElementById('drawer-content').innerHTML = '<div class="empty">加载中...</div>';

    try {
        // Fetch task metadata in parallel with file list and first page —
        // we need (platform, action) to look up the v2 output_schema for
        // bilingual column headers.
        let task = null;
        let files = [];
        let resultData = { records: [], total_rows: 0 };
        const [taskR, filesR, dataR] = await Promise.all([
            api(`/api/tasks/${taskId}`).catch(() => null),
            api(`/api/tasks/${taskId}/files`).catch(() => []),
            api(`/api/tasks/${taskId}/result?offset=0&limit=100`).catch(() => ({ records: [], total_rows: 0 })),
        ]);
        task = taskR; files = filesR || []; resultData = dataR || { records: [], total_rows: 0 };

        // Resolve underlying action: batch_run wraps the real action under logic_param.action
        const platform = task?.platform || '';
        let action = task?.task_type || '';
        if (action === 'batch_run' && task?.logic_param?.action) action = task.logic_param.action;
        const outV2 = await _fetchOutputSchemaV2(platform, action);

        let html = '';

        // Warning banner: artifacts must not be moved/renamed
        html += `<div style="background:var(--surface2);border-left:3px solid var(--warning, #f59e0b);padding:8px 12px;border-radius:6px;margin-bottom:16px;font-size:12px;color:var(--text-muted);line-height:1.5;">
            ⚠️ 此目录由 CrawlHub 管理，请勿直接移动、重命名或删除文件，否则会破坏前端预览和下游任务。需要数据副本请用<b>导出</b>功能。
        </div>`;

        // File list
        if (files.length) {
            const attrEsc = s => JSON.stringify(String(s)).replace(/"/g, '&quot;');
            html += `<h4 style="margin-bottom:8px;">文件列表</h4>
            <table style="margin-bottom:20px;"><thead><tr><th>文件名</th><th>大小</th><th>行数</th><th style="width:90px;">操作</th></tr></thead><tbody>
            ${files.map(f => `<tr>
                <td>${escapeHtml(f.name)}</td>
                <td>${formatBytes(f.size)}</td>
                <td>${f.rows || '-'}</td>
                <td><button class="btn btn-sm btn-success" onclick="saveTaskFileAs(${attrEsc(taskId)}, ${attrEsc(f.name)})">导出</button></td>
            </tr>`).join('')}
            </tbody></table>`;
        }

        // Summary — render as a single capped-height scrollable block (no
        // collapse/expand needed; the user can scroll inside the box).
        if (resultData.summary) {
            const summaryJson = JSON.stringify(resultData.summary, null, 2);
            html += `<h4 style="margin-bottom:8px;">摘要信息</h4>
            <pre class="schedule-scroll" style="background:var(--surface2);padding:12px;border-radius:var(--radius);font-size:12px;margin-bottom:20px;max-height:340px;white-space:pre-wrap;">${escapeHtml(summaryJson)}</pre>`;
        }

        // Data table
        const records = resultData.records || [];
        const totalRows = resultData.summary?.record_count || resultData.total_rows || records.length;

        if (records.length) {
            // Union of all keys across sampled records — preserve first-seen order
            const colSet = new Set();
            records.forEach(r => { if (r && typeof r === 'object') Object.keys(r).forEach(k => colSet.add(k)); });
            const columns = Array.from(colSet);
            const showCn = _getDrawerShowChinese();
            // Render <th>: Chinese label when toggle ON & v2 has label, else raw column name.
            // ``title`` always carries raw English field name + Chinese label + description so
            // hovering never loses information regardless of which mode is active.
            const thHtml = _buildDrawerThHtml(columns, outV2, showCn);
            // Cache view context so toggleDrawerHeaderLang can update <thead>
            // in place without re-rendering the entire drawer (and resetting scroll).
            window._drawerLastView = { taskId, columns, outV2 };
            const toggleLabel = showCn ? '显示英文字段名' : '显示中文字段名';
            html += `<h4 style="margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span>数据预览 (共 ${totalRows} 条，当前展示 <span id="shown-count">${records.length}</span> 条 · ${columns.length} 列)</span>
                <button id="drawer-lang-toggle-btn" class="btn btn-sm btn-outline" onclick="toggleDrawerHeaderLang('${taskId}')" style="font-weight:normal;">${toggleLabel}</button>
            </h4>
            <div class="data-table schedule-scroll" style="overflow:auto;max-height:60vh;"><table style="min-width:100%;white-space:nowrap;"><thead id="drawer-data-thead"><tr>${thHtml}</tr></thead><tbody>
            ${records.slice(0, 100).map(r => `<tr>${columns.map(c => {
                let val = r[c];
                if (val === null || val === undefined) val = '';
                else if (typeof val === 'object') val = JSON.stringify(val);
                val = String(val);
                const truncated = val.length > 80 ? val.substring(0, 80) + '...' : val;
                return `<td title="${val.replace(/"/g, '&quot;')}" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;">${truncated}</td>`;
            }).join('')}</tr>`).join('')}
            </tbody></table></div>`;

            if (totalRows > 100) {
                html += `<div style="margin-top:12px;text-align:center;" id="load-more-bar">
                    <button class="btn btn-sm btn-outline" id="load-more-btn" onclick="loadMoreRecords('${taskId}', 100, ${totalRows})">加载更多</button>
                </div>`;
            }
        } else {
            html += '<div class="empty">暂无数据记录</div>';
        }

        document.getElementById('drawer-content').innerHTML = html;
    } catch(e) {
        document.getElementById('drawer-content').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
    }
}

async function loadMoreRecords(taskId, currentOffset, totalRows) {
    const btn = document.getElementById('load-more-btn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '加载中...';
    try {
        const data = await api(`/api/tasks/${taskId}/result?offset=${currentOffset}&limit=100`);
        const records = data.records || [];
        if (records.length === 0) {
            toast('没有更多数据了');
            btn.textContent = '已全部加载';
            btn.disabled = true;
            return;
        }
        // Append rows to existing table — need columns from the cached view context
        const ctx = window._drawerLastView;
        if (!ctx) { toast('上下文丢失，请重新打开', 'error'); return; }
        const columns = ctx.columns;
        const tbody = document.querySelector('#drawer-content .data-table tbody');
        if (!tbody) { toast('表格未找到', 'error'); return; }
        const fragment = document.createDocumentFragment();
        for (const r of records) {
            const tr = document.createElement('tr');
            tr.innerHTML = columns.map(c => {
                let val = r[c];
                if (val === null || val === undefined) val = '';
                else if (typeof val === 'object') val = JSON.stringify(val);
                val = String(val);
                const truncated = val.length > 80 ? val.substring(0, 80) + '...' : val;
                return `<td title="${val.replace(/"/g, '&quot;')}" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;">${truncated}</td>`;
            }).join('');
            fragment.appendChild(tr);
        }
        tbody.appendChild(fragment);

        const newOffset = currentOffset + records.length;
        const shownEl = document.getElementById('shown-count');
        if (shownEl) shownEl.textContent = newOffset;

        if (newOffset >= totalRows) {
            btn.textContent = '已全部加载';
            btn.disabled = true;
        } else {
            btn.textContent = '加载更多';
            btn.disabled = false;
            btn.setAttribute('onclick', `loadMoreRecords('${taskId}', ${newOffset}, ${totalRows})`);
        }
        toast(`已加载 ${records.length} 条`, 'success');
    } catch(e) {
        toast('加载失败', 'error');
        btn.textContent = '加载更多';
        btn.disabled = false;
    }
}

// Save a single task artifact file via the browser.
// Strategy:
//   1) If File System Access API is available (Chrome/Edge/Opera over HTTPS or localhost),
//      open a real "Save As" dialog so the user picks the destination.
//   2) Otherwise, fall back to the classic <a download> trigger which goes to the
//      browser's default download folder (or prompts depending on browser settings).
async function saveTaskFileAs(taskId, filename) {
    const url = `/api/tasks/${encodeURIComponent(taskId)}/files/${encodeURIComponent(filename)}?download=1`;

    // --- Path 1: File System Access API (true Save As dialog) ---
    if (window.showSaveFilePicker) {
        try {
            const ext = (filename.includes('.') ? filename.split('.').pop() : '').toLowerCase();
            const typeMap = {
                jsonl: { description: 'JSON Lines', accept: { 'application/x-ndjson': ['.jsonl'] } },
                json:  { description: 'JSON',       accept: { 'application/json': ['.json'] } },
                csv:   { description: 'CSV',        accept: { 'text/csv': ['.csv'] } },
                txt:   { description: 'Text',       accept: { 'text/plain': ['.txt'] } },
                xlsx:  { description: 'Excel',      accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } },
            };
            const types = typeMap[ext] ? [typeMap[ext]] : [];

            const handle = await window.showSaveFilePicker({
                suggestedName: filename,
                types,
            });

            const resp = await fetch(url, { credentials: 'same-origin' });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            // Stream the response into the chosen file. Avoids loading the whole
            // jsonl into memory for large artifacts.
            const writable = await handle.createWritable();
            if (resp.body && resp.body.pipeTo) {
                await resp.body.pipeTo(writable);
            } else {
                const blob = await resp.blob();
                await writable.write(blob);
                await writable.close();
            }
            toast(`已保存: ${filename}`);
            return;
        } catch (e) {
            // User cancelled the picker -> AbortError, treat as silent no-op.
            if (e && e.name === 'AbortError') return;
            // Anything else (permission denied, write failure) -> fall through to <a> fallback
            console.warn('showSaveFilePicker failed, falling back:', e);
        }
    }

    // --- Path 2: classic anchor download (browser default folder) ---
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function closeDrawer() {
    document.getElementById('drawer-backdrop').classList.add('hidden');
    document.getElementById('product-drawer').classList.remove('open');
}

// ── Cookie Management ────────────────────────────────────
let cookieRefreshTimers = {};

async function qimaiLogin() {
    const username = document.getElementById('qimai-username')?.value?.trim();
    const password = document.getElementById('qimai-password')?.value?.trim();
    if (!username || !password) {
        toast('请输入手机号和密码', 'error');
        return;
    }
    try {
        const res = await api('/api/cookies/qimai/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });
        if (res.ok) {
            toast(`七麦登录成功${res.is_vip ? ' (VIP)' : ''}`, 'success');
            // Refresh cookie status
            try {
                const st = await api('/api/cookies/qimai/status');
                cookieStatuses['qimai'] = st;
            } catch(e) {}
            render();
        } else {
            toast('七麦登录失败: ' + (res.error || '未知错误'), 'error');
        }
    } catch(e) {
        toast('七麦登录失败: ' + e.message, 'error');
    }
}

async function refreshCookie(platform) {
    if (refreshingPlatforms.has(platform)) {
        toast('该平台正在进行登录流程', 'error');
        return;
    }

    refreshingPlatforms.add(platform);
    render(); // Update UI to show refreshing state

    // Show login guidance modal
    showCookieLoginModal(platform);

    try {
        await api(`/api/cookies/${platform}/refresh`, { method: 'POST' });
        // Start polling for completion
        pollCookieRefreshStatus(platform);
    } catch(e) {
        toast(`${platform} Cookie 刷新失败: ${e.message}`, 'error');
        closeCookieLoginModal(platform);
        refreshingPlatforms.delete(platform);
        render();
    }
}

function closeCookieLoginModal(platform) {
    const modal = document.getElementById('cookie-login-modal');
    if (modal) modal.remove();
    if (cookieRefreshTimers[platform]) {
        clearInterval(cookieRefreshTimers[platform]);
        delete cookieRefreshTimers[platform];
    }
}

function cancelCookieRefresh(platform) {
    closeCookieLoginModal(platform);
    refreshingPlatforms.delete(platform);
    render();
    toast(`${platform} 登录流程已取消`);
}

function pollCookieRefreshStatus(platform) {
    const pollInterval = setInterval(async () => {
        try {
            const status = await api(`/api/cookies/${platform}/refresh-status`);
            if (!status.is_refreshing) {
                clearInterval(pollInterval);
                closeCookieLoginModal(platform);
                refreshingPlatforms.delete(platform);
                if (status.result === 'completed') {
                    toast(`${platform} Cookie 刷新成功！`);
                } else if (status.result === 'cancelled') {
                    toast(`${platform} 浏览器已关闭`);
                } else if (status.result === 'timeout') {
                    toast(`${platform} Cookie 刷新超时`, 'error');
                } else {
                    toast(`${platform} Cookie 刷新结束 (${status.result || 'unknown'})`);
                }
                render();
            }
        } catch(e) {
            // Ignore polling errors
        }

        // Also check if still refreshing on frontend
        if (!refreshingPlatforms.has(platform)) {
            clearInterval(pollInterval);
        }
    }, 3000);

    // Auto-stop polling after 5 minutes
    setTimeout(() => {
        clearInterval(pollInterval);
        if (refreshingPlatforms.has(platform)) {
            closeCookieLoginModal(platform);
            refreshingPlatforms.delete(platform);
            toast(`${platform} Cookie 刷新超时`, 'error');
            render();
        }
    }, 300000);
}

    const modal = document.createElement('div');
    modal.id = 'channel-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal">
            <h3>添加通知渠道</h3>
            <div class="form-group">
                <label class="required">渠道名称</label>
                <input type="text" id="channel-name" placeholder="如：运维群">
            </div>
            <div class="form-group">
                <label class="required">Webhook URL</label>
                <input type="text" id="channel-url" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
                <div class="hint" id="channel-url-hint"></div>
            </div>
            <div class="form-group">
                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="channel-enabled" checked>

                    </label>
                    <span class="toggle-label">启用</span>

            hint.textContent = 'URL 格式可能不正确，请确认是否为企业微信机器人 Webhook 地址';
            hint.style.color = 'var(--warning)';

            hint.textContent = '';
        }

}

async function submitChannel() {
    const name = document.getElementById('channel-name').value.trim();
    const url = document.getElementById('channel-url').value.trim();
    const enabled = document.getElementById('channel-enabled').checked;

    if (!name || !url) { toast('请填写渠道名称和 Webhook URL', 'error'); return; }

    try {
        await api('/api/notifications/channels', {
            method: 'POST',
            body: JSON.stringify({ name, webhook_url: url, enabled })
        });
        toast('渠道添加成功！');
        document.getElementById('channel-modal').remove();
        render();
    } catch(e) { toast('添加失败: ' + e.message, 'error'); }
}

async function toggleChannel(name, enabled) {
    try {
        // Fetch existing channel to preserve webhook_url
        const channels = await api('/api/notifications/channels');
        const channel = channels.find(c => c.name === name);
        if (!channel) throw new Error(`Channel ${name} not found`);
        await api('/api/notifications/channels', {
            method: 'POST',
            body: JSON.stringify({
                name: channel.name,
                webhook_url: channel.webhook_url,
                enabled
            })
        });
        toast(`渠道已${enabled ? '启用' : '禁用'}`);
        render();
    } catch(e) { toast('操作失败: ' + e.message, 'error'); }
}

async function testChannel(name) {
    try {
        await api('/api/notifications/test', {
            method: 'POST',

}

async function deleteChannel(name) {

// ── Recover refresh state on page load ───────────────────
(async function recoverRefreshState() {
    try {
        const states = await api('/api/cookies-refresh-status');
        for (const [platform, state] of Object.entries(states)) {
            if (state.is_refreshing) {
                refreshingPlatforms.add(platform);
                showCookieLoginModal(platform);
                pollCookieRefreshStatus(platform);
            }
        }
        render();
    } catch(e) {
        // Ignore - daemon might not be running yet
    }
})();

// ── Auto-refresh ────────────────────────────────────────
// Restore page/tab/filters from URL hash on first paint, fall back to default.
applyHashToState();
loadAppVersion();
render();

// _suspendAutoRefresh is declared near the top of the script so all
// interaction handlers (inline note edit, dropdowns) can read/write it safely.
setInterval(() => {
    if (_suspendAutoRefresh) return;
    // Don't refresh while a dropdown is open — it would close mid-click.
    if (document.querySelector('.dropdown-menu.show')) return;
    // Soft-refresh paths preserve the search input and other form state, so
    // we no longer need to bail out just because an INPUT has focus. We do
    // still skip when a TEXTAREA / native SELECT is the activeElement: those
    // are either large editors (don't disturb) or open native dropdowns.
    const focused = document.activeElement;
    const focusedTag = focused ? focused.tagName : '';
    if (focusedTag === 'TEXTAREA' || focusedTag === 'SELECT') return;

    if (currentPage === 'dashboard') {
        // Dashboard already does in-place patching (skeleton + patch funcs).
        render();
    } else if (currentPage === 'tasks') {
        if (taskCenterTab === 'favorites') {
            softRefreshFavorites();
        } else {
            softRefreshTasks();
        }
    } else if (currentPage === 'trash') {
        softRefreshTasks();
    } else if (currentPage === 'favorites') {
        // Legacy hash route — fall back to full render.
        render();
    }
}, 5000);
</script>
