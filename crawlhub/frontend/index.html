function _captureBatchCardState() {
    // Persist live DOM edits back into batchUpgrade.state so tab switches don't lose data.
    const tab = batchUpgrade.tab;
    if (tab === 'list') {
        const el = document.getElementById('bp-list-items');
        if (el) batchUpgrade.state.list.items = el.value;
    } else if (tab === 'upstream_field') {
        const st = batchUpgrade.state.upstream_field;
        const runEl = document.getElementById('bp-uf-runid');
        const sel = document.getElementById('bp-uf-field-select');
        const inp = document.getElementById('bp-uf-field-input');
        if (runEl) st.run_id = runEl.value.trim();
        if (inp && inp.value.trim()) st.field = inp.value.trim();
        else if (sel && sel.value) st.field = sel.value;
    } else if (tab === 'upstream_sql') {
        const sqlEl = document.getElementById('bp-sql-text');
        if (sqlEl) batchUpgrade.state.upstream_sql.sql = sqlEl.value;
        // Sources rows already auto-sync via input listeners.
    }
}

function _collectBatchPayloadFromCard() {
    // Build { item_key, items, items_from } from the upgrade card. Returns { error } on failure.
    if (!_isBatchMode()) return { error: '未升级任何参数为批处理参数' };
    _captureBatchCardState();
    const itemKey = batchUpgrade.fieldName;
    if (batchUpgrade.tab === 'list') {
        const raw = (batchUpgrade.state.list.items || '').trim();
        if (!raw) return { error: '请填写清单（每行一个值）' };
        const items = raw.split('\n').map(s => s.trim()).filter(Boolean);
        if (items.length === 0) return { error: '清单不能为空' };
        return { item_key: itemKey, items };
    }
    if (batchUpgrade.tab === 'upstream_field') {
        const st = batchUpgrade.state.upstream_field;
        if (!st.run_id) return { error: '请填写上游任务 ID' };
        if (!st.field) return { error: '请选择或填写字段名' };
        return {
            item_key: itemKey,
            items_from: {
                sources: { upstream: { run_id: st.run_id } },
                sql: `SELECT ${st.field} FROM upstream`,
                field: st.field,
                dedup: true,
            },
        };
    }
    if (batchUpgrade.tab === 'upstream_sql') {
        const st = batchUpgrade.state.upstream_sql;
        const sources = {};
        for (const src of st.sources) {
            if (!src.alias || !src.value) continue;
            sources[src.alias] = { [src.type]: src.value };
        }
        if (Object.keys(sources).length === 0) return { error: '请至少填写一个完整的 source' };
        const sql = (st.sql || '').trim();
        if (!sql) return { error: '请填写 SQL' };
        const fieldGuess = _extractSingleSelectField(sql);
        if (fieldGuess.error) return { error: fieldGuess.error };
        return {
            item_key: itemKey,
            items_from: {
                sources,
                sql,
                field: fieldGuess.field,
                dedup: true,
            },
        };
    }
    return { error: '未知 tab' };
}

function _extractSingleSelectField(sql) {
    // Lightweight client-side guard: SELECT must reference exactly one output column.
    // Server-side (L1/L2) will do the authoritative check.
    const m = /^\s*select\s+(.+?)\s+from\s/i.exec(sql);
    if (!m) return { error: 'SQL 必须以 SELECT ... FROM ... 开头' };
    const colsPart = m[1];
    if (/\*/.test(colsPart)) return { error: 'SQL 不能使用 SELECT *，必须指定一个列名' };
    // Reject commas at top level (rough heuristic — ignores commas inside parens).
    let depth = 0, hasComma = false;
    for (const ch of colsPart) {
        if (ch === '(') depth++;
        else if (ch === ')') depth = Math.max(0, depth - 1);
        else if (ch === ',' && depth === 0) { hasComma = true; break; }
    }
    if (hasComma) return { error: 'SQL 仅支持 SELECT 一个字段（检测到顶层逗号）' };
    // Extract field name: handle "expr AS alias" / bare column.
    const aliasMatch = /\s+as\s+([A-Za-z_][\w]*)\s*$/i.exec(colsPart);
    if (aliasMatch) return { field: aliasMatch[1] };
    const trimmed = colsPart.trim();
    const dotIdx = trimmed.lastIndexOf('.');
    const candidate = dotIdx >= 0 ? trimmed.slice(dotIdx + 1).trim() : trimmed;
    const cleanMatch = /^([A-Za-z_][\w]*)$/.exec(candidate);
    if (cleanMatch) return { field: cleanMatch[1] };
    // Fallback: server will normalize; we return a synthetic name.
    return { field: 'value' };
}

async function previewBatchUpgradeSql() {
    const target = document.getElementById('bp-sql-preview-result');
    const payload = _collectBatchPayloadFromCard();
    if (payload.error) { target.innerHTML = `<div style="color:var(--error);font-size:12px;">${payload.error}</div>`; return; }
    target.innerHTML = '<div style="font-size:12px;color:var(--text2);">校验中...</div>';
    try {
        const res = await api('/api/items_from/preview', { method: 'POST', body: JSON.stringify({ ...payload.items_from, limit: 10, timeout_s: 10 }) });
        const rows = res.rows || [];
        const fieldCol = res.field_column || payload.items_from.field;
        const cols = rows.length ? Object.keys(rows[0]) : [fieldCol];
        let html = `<div style="font-size:12px;background:var(--surface2);padding:8px;border-radius:4px;margin-bottom:6px;">
            <span style="color:var(--success);">L0/L1/L2 校验通过</span> &middot;
            预览 ${rows.length} 行（LIMIT ${res.limit_applied}）&middot;
            去重后 items: <strong>${res.items_preview_count}</strong> / 原始 ${res.raw_items_count}
        </div>`;
        if (rows.length === 0) {
            html += `<div style="font-size:12px;color:var(--text2);">SQL 执行成功但结果为空</div>`;
        } else {
            html += '<div style="max-height:240px;overflow:auto;"><table class="preview-result-table">';
            html += '<thead><tr>' + cols.map(c => `<th class="${c === fieldCol ? 'field-col' : ''}">${c}${c === fieldCol ? ' &rarr; items' : ''}</th>`).join('') + '</tr></thead>';
            html += '<tbody>' + rows.map(r => '<tr>' + cols.map(c => `<td class="${c === fieldCol ? 'field-col' : ''}">${r[c] === null || r[c] === undefined ? '<em style="color:var(--text2)">NULL</em>' : String(r[c])}</td>`).join('') + '</tr>').join('') + '</tbody>';
            html += '</table></div>';
        }
        target.innerHTML = html;
    } catch (e) {
        let msg = e.message || String(e);
        let detail = e.detail;
        if (typeof detail === 'object' && detail !== null) {
            const code = detail.error_code || '';
            const m = detail.message || msg;
            if (code === 'ArtifactNotReadyError') {
                target.innerHTML = `<div style="color:var(--warning,orange);font-size:12px;background:rgba(255,165,0,0.08);padding:8px;border-radius:4px;">
                    <strong>校验通过，但上游任务未就绪</strong><br>${m}<br>
                    ${(detail.not_ready || []).map(r => `&nbsp;&nbsp;- ${r.alias} (${r.run_id}): ${r.status}`).join('<br>')}
                </div>`;
                return;
            }
            target.innerHTML = `<div style="color:var(--error);font-size:12px;background:rgba(239,68,68,0.08);padding:8px;border-radius:4px;">
                <strong>${code}</strong><br><pre style="white-space:pre-wrap;margin:4px 0 0;font-size:11px;">${m}</pre>
            </div>`;
            return;
        }
        target.innerHTML = `<div style="color:var(--error);font-size:12px;">${msg}</div>`;
    }
}

async function validateBatchUpgradeSql() {
    // Same as preview but only reports validation status without table.
    const target = document.getElementById('bp-sql-preview-result');
    const payload = _collectBatchPayloadFromCard();
    if (payload.error) { target.innerHTML = `<div style="color:var(--error);font-size:12px;">${payload.error}</div>`; return; }
    target.innerHTML = '<div style="font-size:12px;color:var(--text2);">校验中...</div>';
    try {
        await api('/api/items_from/preview', { method: 'POST', body: JSON.stringify({ ...payload.items_from, limit: 1, timeout_s: 10 }) });
        target.innerHTML = `<div style="font-size:12px;color:var(--success);background:rgba(16,185,129,0.08);padding:8px;border-radius:4px;">SQL 校验通过</div>`;
    } catch (e) {
        let msg = e.message || String(e);
        if (e.detail && typeof e.detail === 'object') {
            msg = `${e.detail.error_code || ''} ${e.detail.message || ''}`.trim() || msg;
        }
        target.innerHTML = `<div style="color:var(--error);font-size:12px;background:rgba(239,68,68,0.08);padding:8px;border-radius:4px;">${msg}</div>`;
    }
}

async function submitTask() {
    // Direct submit (called from confirmSubmitTask after probe)
    const platform = document.getElementById('task-platform').value;
    const action = document.getElementById('task-action').value;

    let params;
    if (currentInputMode === 'form') {
        params = collectFormData();
    } else {
        try { params = JSON.parse(document.getElementById('task-params').value); }
        catch(e) { toast('JSON 格式错误', 'error'); return; }
    }

    try {
        const noteEl = document.getElementById('task-note');
        const note = noteEl ? (noteEl.value || '').trim().slice(0, 100) : '';
        const body = { platform, task_type: action, logic_param: params };
        if (note) body.note = note;
        await api('/api/tasks', { method: 'POST', body: JSON.stringify(body) });
        toast('任务已提交！');
        closeNewTaskModal();
        closeModal('modal-probe-result');
        render();
    } catch(e) { toast('提交失败: ' + e.message, 'error'); }
}

async function submitBatchTask() {
    const platform = document.getElementById('task-platform').value;
    const action = document.getElementById('task-action').value;

    let commonParams;
    if (currentInputMode === 'form') {
        commonParams = collectFormData();
    } else {
        try { commonParams = JSON.parse(document.getElementById('task-params').value); }
        catch(e) { toast('JSON 格式错误', 'error'); return; }
    }

    // Collect batch payload from the upgraded parameter card.
    const cardPayload = _collectBatchPayloadFromCard();
    if (cardPayload.error) { toast(cardPayload.error, 'error'); return; }

    // checkbox 文案 = "上游部分失败就阻断"; 后端 allow_partial_upstream=true 表示"允许 partial 上游启动".
    // 默认不勾选 -> 不阻断 -> allow_partial_upstream=true.
    const blockOnPartial = !!document.getElementById('batch-block-on-partial')?.checked;
    const noteElBatch = document.getElementById('task-note');
    const batchNote = noteElBatch ? (noteElBatch.value || '').trim().slice(0, 100) : '';
    const body = {
        platform,
        action,
        common_params: commonParams,
        item_key: cardPayload.item_key,
        concurrency: parseInt(document.getElementById('batch-concurrency').value) || 1,
        fail_strategy: 'continue',  // 强制默认值（不暴露给用户）
        allow_partial_upstream: !blockOnPartial,
    };
    if (batchNote) body.note = batchNote;
    if (cardPayload.items) body.items = cardPayload.items;
    if (cardPayload.items_from) body.items_from = cardPayload.items_from;

    try {
        await api('/api/batch', { method: 'POST', body: JSON.stringify(body) });
        toast('批处理任务已提交！');
        closeNewTaskModal();
        closeModal('modal-probe-result');
        render();
    } catch (e) {
        let msg = e.message || String(e);
        if (e.detail && typeof e.detail === 'object') {
            msg = `${e.detail.error_code || ''} ${e.detail.message || ''}`.trim() || msg;
        }
        toast('提交失败: ' + msg, 'error');
    }
}

// Cookie probe before submit
let _probeResults = [];

async function probeCookiesBeforeSubmit() {
    const platform = document.getElementById('task-platform').value;
    const action = document.getElementById('task-action').value;

    // Validate required fields first
    let params;
    if (currentInputMode === 'form') {
        params = collectFormData();
    } else {
        try { params = JSON.parse(document.getElementById('task-params').value); }
        catch(e) { toast('JSON 格式错误', 'error'); return; }
    }

    // JSON-mode batch detection (independent of form-mode batchUpgrade).
    const isJsonMode = currentInputMode === 'json';
    let jsonBatchDetect = { isBatch: false };
    if (isJsonMode) {
        jsonBatchDetect = _detectBatchFromJson(params);
        if (jsonBatchDetect.isBatch && jsonBatchDetect.error) {
            toast('JSON 不合法: ' + jsonBatchDetect.error, 'error');
            return;
        }
    }
    const isJsonBatch = jsonBatchDetect.isBatch && !jsonBatchDetect.error;

    if (currentSchema?.required) {
        // Validation strategy per input mode (decoupled from form-mode batch upgrade state):
        //   form mode      → respect batchUpgrade.fieldName skip (legacy form-driven batch UX)
        //   JSON single    → require schema fields on JSON itself
        //   JSON batch     → skip schema required check (per-item fields live in items / items_from,
        //                    common_params only carries the template; backend will enforce final shape)
        if (!isJsonBatch) {
            for (const key of currentSchema.required) {
                // Form mode: skip batch-upgraded field (its value is provided by the batch card).
                if (!isJsonMode && batchUpgrade.fieldName === key) continue;
                if (params[key] === undefined || params[key] === '' || (Array.isArray(params[key]) && params[key].length === 0)) {
                    const prop = currentSchema.properties[key];
                    toast(`请填写必填字段: ${prop?.description || key}`, 'error');
                    return;
                }
            }
        }
    }

    // Batch path: still goes through cookie probe so all-invalid cookies are caught
    // BEFORE fan-out creates N children that would all fail. The standard probe modal
    // gates submission via confirmSubmitTask, which already routes to submitBatchTask /
    // submitBatchTaskFromJson based on _isBatchMode() / isJsonBatch.
    // Threshold: at least 1 valid cookie is enough (matches single-task behaviour and
    // the dispatcher's select_best_cookie() priority — VALID cookies will be picked
    // first, so children won't waste themselves on invalid ones).

    // Platforms that don't need cookies - submit directly
    const noCookiePlatforms = ['steam'];
    if (noCookiePlatforms.includes(platform)) {
        if (_isBatchMode()) { await submitBatchTask(); return; }
        if (isJsonBatch)    { await submitBatchTaskFromJson(params); return; }
        await submitTask();
        return;
    }

    // Probe cookies
    const btn = document.getElementById('btn-probe-submit');
    btn.disabled = true;
    btn.textContent = '探查中...';

    try {
        const result = await api(`/api/cookies/${platform}/probe`, {
            method: 'POST',
            body: JSON.stringify({ task_type: action })
        });
        _probeResults = result.results || [];

        const validCookies = _probeResults.filter(r => r.status === 'valid');
        const invalidCookies = _probeResults.filter(r => r.status !== 'valid');

        let html = '';
        if (validCookies.length > 0) {
            html += `<div style="margin-bottom:12px;"><span style="color:var(--success);font-weight:500;">有效 (${validCookies.length})</span></div>`;
            html += validCookies.map(c => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
                <span class="cookie-dot valid"></span>
                <span style="font-size:13px;">${c.label}</span>
                <span style="font-size:11px;color:var(--text2);">${c.message || ''}</span>
            </div>`).join('');
        }
        if (invalidCookies.length > 0) {
            html += `<div style="margin:12px 0 8px;"><span style="color:var(--error);font-weight:500;">无效 (${invalidCookies.length})</span></div>`;
            html += invalidCookies.map(c => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
                <span class="cookie-dot expired"></span>
                <span style="font-size:13px;">${c.label}</span>
                <span style="font-size:11px;color:var(--error);">${c.message || ''}</span>
            </div>`).join('');
        }
        if (_probeResults.length === 0) {
            html = '<div class="empty">该平台暂无 Cookie，请先添加账号</div>';
        }

        document.getElementById('probe-result-content').innerHTML = html;

        // Show/hide buttons
        const btnSubmit = document.getElementById('btn-confirm-submit');
        const btnUpdate = document.getElementById('btn-update-cookie');
        // Reset onclick to default (may have been overridden by directProbeAndSubmit)
        btnSubmit.onclick = () => confirmSubmitTask();
        if (validCookies.length > 0) {
            btnSubmit.classList.remove('hidden');
            btnSubmit.disabled = false;
            btnSubmit.textContent = '提交任务';
        } else {
            btnSubmit.classList.remove('hidden');
            btnSubmit.disabled = true;
            btnSubmit.textContent = '无可用 Cookie，请先更新';
        }
        if (invalidCookies.length > 0 || validCookies.length === 0) {
            btnUpdate.classList.remove('hidden');
        } else {
            btnUpdate.classList.add('hidden');
        }

        openModal('modal-probe-result');
    } catch(e) {
        toast('Cookie 探查失败: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '检测可用 Cookie';
    }
}

async function confirmSubmitTask() {
    if (_isBatchMode()) { await submitBatchTask(); return; }
    if (_isJsonModeBatch()) {
        const obj = JSON.parse(document.getElementById('task-params').value);
        await submitBatchTaskFromJson(obj);
        return;
    }
    await submitTask();
}

// JSON-mode batch submission. The JSON itself is treated as the /api/batch body;
// platform is taken from the form (it's not part of the action's input schema),
// action defaults to JSON.action when present (with toast on conflict with the dropdown).
async function submitBatchTaskFromJson(obj) {
    const platform = document.getElementById('task-platform').value;
    const dropdownAction = document.getElementById('task-action').value;

    // action: JSON wins; warn on conflict so the user sees what actually got submitted.
    let action = dropdownAction;
    if (typeof obj.action === 'string' && obj.action.trim()) {
        if (obj.action !== dropdownAction) {
            toast(`已按 JSON 中的 action 提交：${obj.action}（与下拉选中的 ${dropdownAction} 不一致）`, 'warning');
        }
        action = obj.action;
    }

    const body = {
        platform,
        action,
        item_key: obj.item_key,
        common_params: obj.common_params || {},
        concurrency: Number.isFinite(obj.concurrency) ? obj.concurrency : 1,
        fail_strategy: obj.fail_strategy || 'continue',
        allow_partial_upstream: obj.allow_partial_upstream !== false,  // default true
    };
    if (Array.isArray(obj.items) && obj.items.length > 0) body.items = obj.items;
    if (obj.items_from && typeof obj.items_from === 'object') body.items_from = obj.items_from;
    if (obj.cookie_policy && typeof obj.cookie_policy === 'object') body.cookie_policy = obj.cookie_policy;
    if (Array.isArray(obj.depends_on_task_ids) && obj.depends_on_task_ids.length > 0) {
        body.depends_on_task_ids = obj.depends_on_task_ids;
    }

    try {
        await api('/api/batch', { method: 'POST', body: JSON.stringify(body) });
        toast('批处理任务已提交！');
        closeNewTaskModal();
        closeModal('modal-probe-result');
        render();
    } catch (e) {
        let msg = e.message || String(e);
        if (e.detail && typeof e.detail === 'object') {
            msg = `${e.detail.error_code || ''} ${e.detail.message || ''}`.trim() || msg;
        }
        toast('提交失败: ' + msg, 'error');
    }
}

// Build the full favorite payload, including batch-specific fields when applicable.
function buildSaveInput() {
    const platform = document.getElementById('task-platform').value;
    const action = document.getElementById('task-action').value;
    let params;
    if (currentInputMode === 'form') {
        params = collectFormData();
    } else {
        try { params = JSON.parse(document.getElementById('task-params').value); }
        catch(e) { params = {}; }
    }
    if (!_isBatchMode()) {
        return { platform, action, logic_param: params, task_type_kind: 'single' };
    }
    // Batch: persist a self-contained logic_param shape so the draft/favorite can recreate the dialog state.
    _captureBatchCardState();
    const blockOnPartial = !!document.getElementById('batch-block-on-partial')?.checked;
    const batchLogicParam = {
        kind: 'batch',
        // The real action lives at the top level of logic_param for batch
        // tasks (see crawlhub/core/batch.py:create_batch). Mirror that here
        // so the favorite is shape-compatible with backend-produced batch
        // task logic_params and the favorites table can render the action
        // badge correctly.
        action: action,
        common_params: params,
        concurrency: parseInt(document.getElementById('batch-concurrency').value) || 1,
        fail_strategy: 'continue',
        allow_partial_upstream: !blockOnPartial,
        // New shape: declares which scalar param is upgraded + per-tab state.
        upgrade: {
            field_name: batchUpgrade.fieldName,
            tab: batchUpgrade.tab,
            state: batchUpgrade.state,
            block_on_partial: blockOnPartial,
        },
    };
    return { platform, action, logic_param: batchLogicParam, task_type_kind: 'batch' };
}

async function saveAsFavorite() {
    const { platform, action, logic_param } = buildSaveInput();

    // Use custom inline input instead of prompt() to avoid browser bookmark trigger
    const defaultName = `${platform}_${getActionDisplayName(action)}`;
    const note = await showInputDialog('收藏备注', defaultName);
    if (!note) return;

    try {
        await api('/api/favorites', {

        });
        toast('已保存为收藏');

}

// ── items_from read-only renderer (used in viewParams) ──────────
function renderItemsFromReadOnly(itemsFrom) {
    if (!itemsFrom || typeof itemsFrom !== 'object') return '';
    if (itemsFrom.task_id && !itemsFrom.sources) {
        // Legacy shape — present for archived tasks; show as-is.
        return `<div style="margin:8px 0;padding:8px;background:rgba(239,68,68,0.08);border-radius:var(--radius);font-size:12px;">
            <strong>items_from（旧格式，已废弃）</strong>: task_id=<code>${itemsFrom.task_id}</code>, field=<code>${itemsFrom.field || ''}</code>
        </div>`;
    }
    if (itemsFrom.file && !itemsFrom.sources) {
        return `<div style="margin:8px 0;padding:8px;background:var(--surface2);border-radius:var(--radius);font-size:12px;">
            <strong>items_from</strong> (file): <code>${itemsFrom.file}</code>
        </div>`;
    }
    if (!itemsFrom.sources) return '';
    const sourcesHtml = Object.entries(itemsFrom.sources).map(([alias, ref]) => {
        const refText = ref && typeof ref === 'object'
            ? Object.entries(ref).map(([k, v]) => `${k}=<code>${v}</code>`).join(', ')
            : `<code>${ref}</code>`;
        return `<li><strong>${alias}</strong> &rarr; ${refText}</li>`;
    }).join('');
    return `<div style="margin:8px 0;padding:10px;background:var(--surface2);border-radius:var(--radius);font-size:12px;">
        <div style="font-weight:500;margin-bottom:6px;">items_from (SQL pipeline)</div>
        <div style="margin-bottom:4px;"><strong>sources</strong>:</div>
        <ul style="margin:0 0 6px 18px;">${sourcesHtml}</ul>
        <div style="margin-bottom:4px;"><strong>sql</strong>:</div>
        <pre style="margin:0 0 6px;padding:6px;background:var(--surface);border-radius:4px;font-family:'Consolas',monospace;font-size:11px;white-space:pre-wrap;">${itemsFrom.sql || ''}</pre>
        <div><strong>field</strong>: <code>${itemsFrom.field || ''}</code> &nbsp;&middot;&nbsp; <strong>dedup</strong>: ${itemsFrom.dedup === false ? 'false' : 'true'}</div>
    </div>`;
}

// Custom input dialog to replace prompt() which can trigger browser bookmark on some browsers
function showInputDialog(label, defaultValue) {
    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.cssText = 'display:flex;align-items:center;justify-content:center;z-index:10000;';
        overlay.innerHTML = `
            <div class="modal" style="max-width:360px;padding:20px;">
                <h3 style="margin:0 0 12px;font-size:15px;">${label}</h3>
                <input type="text" id="_custom_input_val" value="${defaultValue || ''}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--surface2);color:var(--text);" />
                <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
                    <button class="btn btn-outline" id="_custom_input_cancel">取消</button>
                    <button class="btn btn-primary" id="_custom_input_ok">确定</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);
        const input = overlay.querySelector('#_custom_input_val');
        input.focus();
        input.select();
        const cleanup = (val) => { document.body.removeChild(overlay); resolve(val); };
        overlay.querySelector('#_custom_input_cancel').onclick = () => cleanup(null);
        overlay.querySelector('#_custom_input_ok').onclick = () => cleanup(input.value.trim() || null);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') cleanup(input.value.trim() || null);
            if (e.key === 'Escape') cleanup(null);
        });
    });
}

function fillFormWithParams(params) {
    // Three shapes supported:
    //   1) Plain action params (single-task draft/favorite or legacy)
    //   2) Batch shape (saveAsFavorite): { kind: 'batch', common_params, upgrade, ... }
    //   3) Batch shape (favoriteTask): { action, common_params, item_key, concurrency, ... }
    //      — no `kind` field; detected by action + common_params co-existence.
    if (params && (params.kind === 'batch' || (params.action && params.common_params))) {
        // Restore common params first.
        const common = params.common_params || {};
        _fillSingleParamsIntoForm(common);
        // Restore batch schedule controls.
        const concEl = document.getElementById('batch-concurrency');
        const blockEl = document.getElementById('batch-block-on-partial');
        if (concEl && params.concurrency != null) concEl.value = params.concurrency;
        const blockOnPartial = (params.upgrade && params.upgrade.block_on_partial != null)
            ? params.upgrade.block_on_partial
            : (params.allow_partial_upstream === false);
        if (blockEl) blockEl.checked = !!blockOnPartial;
        batchUpgrade.blockOnPartial = !!blockOnPartial;
        // Restore upgrade state (saveAsFavorite format has upgrade, favoriteTask doesn't).
        if (params.upgrade && params.upgrade.field_name) {
            batchUpgrade.fieldName = params.upgrade.field_name;
            batchUpgrade.tab = params.upgrade.tab || 'list';
            // Merge persisted state with default skeleton to be safe.
            const empty = _emptyUpgradeState();
            batchUpgrade.state = Object.assign(empty, params.upgrade.state || {});
        } else if (params.items_from || params.items) {
            // Migrate legacy batch shape (with item_key/items/items_from at top level).
            _migrateLegacyBatchShape(params);
        } else if (params.item_key) {
            // favoriteTask format: item_key at top level, items/items_from too.
            _migrateLegacyBatchShape(params);
        }
        // Re-render schema form so upgrade card shows up at the right row.
        document.getElementById('form-mode-container').innerHTML = renderSchemaForm(currentSchema);
        initMultiEnumPickers(document.getElementById('form-mode-container'));
        _fillSingleParamsIntoForm(common);  // re-apply after re-render
        _renderBatchUpgradeCard();
        _toggleBatchScheduleSection();
        document.getElementById('task-params').value = JSON.stringify(params, null, 2);
        return;
    }
    // Single-task path.
    _fillSingleParamsIntoForm(params || {});
    document.getElementById('task-params').value = JSON.stringify(params || {}, null, 2);
}

function _fillSingleParamsIntoForm(params) {
    const container = document.getElementById('form-mode-container');
    for (const [key, value] of Object.entries(params)) {
        const el = container.querySelector(`[data-field="${key}"]`);
        if (!el) continue;
        if (el.type === 'checkbox') {
            el.checked = !!value;
        } else if (el.dataset.type === 'array') {
            el.value = Array.isArray(value) ? value.join('\n') : '';
        } else if (el.dataset.type === 'object') {
            el.value = typeof value === 'object' ? JSON.stringify(value, null, 2) : '';
        } else {
            el.value = value ?? '';
        }
    }
}

function _migrateLegacyBatchShape(params) {
    // Legacy draft format: { kind:'batch', source_mode, item_key, items, items_from, ... }
    // Fold it into the new upgrade shape so the user sees their old work.
    const itemKey = params.item_key || '';
    if (!itemKey) return;
    batchUpgrade.fieldName = itemKey;
    if (params.items && Array.isArray(params.items)) {
        batchUpgrade.tab = 'list';
        batchUpgrade.state.list.items = params.items.join('\n');
        return;
    }
    if (params.items_from && params.items_from.sources) {
        const srcs = params.items_from.sources || {};
        const aliases = Object.keys(srcs);
        const isSimpleUpstream = (
            aliases.length === 1
            && aliases[0] === 'upstream'
            && srcs.upstream && srcs.upstream.run_id
            && /^\s*select\s+\S+\s+from\s+upstream\s*$/i.test((params.items_from.sql || '').trim())
        );
        if (isSimpleUpstream) {
            batchUpgrade.tab = 'upstream_field';
            batchUpgrade.state.upstream_field.run_id = srcs.upstream.run_id;
            batchUpgrade.state.upstream_field.field = params.items_from.field || '';
        } else {
            batchUpgrade.tab = 'upstream_sql';
            batchUpgrade.state.upstream_sql.sources = aliases.map(a => {
                const ref = srcs[a] || {};
                if (ref.run_id) return { alias: a, type: 'run_id', value: ref.run_id };
                if (ref.path) return { alias: a, type: 'path', value: ref.path };
                return { alias: a, type: 'run_id', value: '' };
            });
            batchUpgrade.state.upstream_sql.sql = params.items_from.sql || '';
        }
    }
}

async function favoriteTask(taskId) {
    try {
        const task = await api(`/api/tasks/${taskId}`);
        // For batch_run tasks, resolve the real action name from logic_param
        // so the favorite stores a valid action (not "batch_run") — matching
        // the convention used by saveAsFavorite / buildSaveInput.
        const isBatch = task.task_type === 'batch_run';
        const realAction = isBatch ? (task.logic_param?.action || task.task_type) : task.task_type;
        const note = await showInputDialog('收藏备注', `${task.platform}_${getActionDisplayName(realAction, task.platform)}`);
        if (!note) return;
        await api('/api/favorites', {
            method: 'POST',
            body: JSON.stringify({
                platform: task.platform,
                task_type: realAction,
                // Use logic_param (the user's original POST body) verbatim
                // -- that's what "copy this submission" should mean.
                logic_param: task.logic_param || {},
                note,
                source_task_id: taskId,
            })
        });
        toast('已收藏');
    } catch(e) { toast('收藏失败: ' + e.message, 'error'); }
}

function editThrottleConfig(platform) {
    // Show a simple prompt-based editor for throttle config
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal" style="max-width:400px;">
            <h3>编辑 ${platform} 请求间隔配置</h3>
            <div class="form-group">
                <label>期望间隔 (秒)</label>
                <input type="number" step="0.1" id="tc-interval" placeholder="如: 2.0" />
            </div>
            <div class="form-group">
                <label>最小间隔 (秒)</label>
                <input type="number" step="0.01" id="tc-floor" placeholder="如: 0.6" />
            </div>
            <div class="form-group">
                <label>退避基数 (秒)</label>
                <input type="number" step="1" id="tc-backoff-base" placeholder="如: 60" />
            </div>
            <div class="form-group">
                <label>最大退避指数</label>
                <input type="number" step="1" id="tc-max-exp" placeholder="如: 4" />
            </div>
            <div class="form-group">
                <label>长尾截断分位数 (0&lt;p&lt;1，留空=不变，off=关闭)</label>
                <input type="text" id="tc-truncate-p" placeholder="如: 0.95 (砍top5%)；off=关闭" />
                <div style="font-size:11px;color:var(--text2);margin-top:4px;">
                    指数分布有不可避免的长尾。截断保留真人节奏感的同时消除极端长等待。
                    常用值：0.90(砍10%) / 0.95(砍5%, 默认) / 0.99(砍1%)。
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
                <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button>
                <button class="btn btn-primary" onclick="saveThrottleConfig('${platform}')">保存</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    // Pre-fill with current values from the page
    api('/api/platform-config').then(data => {
        const cfg = (data.platforms || {})[platform] || {};
        const tc = cfg.throttle_config || {};
        const el = (id) => document.getElementById(id);
        if (tc.expected_interval) el('tc-interval').value = tc.expected_interval;
        if (tc.min_floor) el('tc-floor').value = tc.min_floor;
        if (tc.backoff_base_seconds) el('tc-backoff-base').value = tc.backoff_base_seconds;
        if (tc.max_backoff_exponent) el('tc-max-exp').value = tc.max_backoff_exponent;
        // 长尾截断：null/undefined 渲染为 "off"，数值原样回填
        const tpInput = el('tc-truncate-p');
        if (tpInput) {
            tpInput.value = (tc.truncate_percentile == null) ? 'off' : String(tc.truncate_percentile);
        }
    }).catch(() => {});
}

async function saveThrottleConfig(platform) {
    const body = {};
    const interval = document.getElementById('tc-interval').value;
    const floor = document.getElementById('tc-floor').value;
    const base = document.getElementById('tc-backoff-base').value;
    const exp = document.getElementById('tc-max-exp').value;
    const tpRaw = document.getElementById('tc-truncate-p')?.value?.trim();
    if (interval) body.expected_interval = parseFloat(interval);
    if (floor) body.min_floor = parseFloat(floor);
    if (base) body.backoff_base_seconds = parseFloat(base);
    if (exp) body.max_backoff_exponent = parseInt(exp);
    // ──────────────────────────────────────────────────────────────
    //  长尾截断三态序列化：
    //    ''           → 不传，保持现状
    //    'off'|'none' → 显式 null，关闭截断
    //    数值        → 直接传 float，由后端校验 (0,1) 区间
    // ──────────────────────────────────────────────────────────────
    if (tpRaw) {
        const tpLower = tpRaw.toLowerCase();
        if (tpLower === 'off' || tpLower === 'none' || tpLower === 'null' || tpLower === 'false') {
            body.truncate_percentile = null;
        } else {
            const tpNum = parseFloat(tpRaw);
            if (Number.isNaN(tpNum)) {
                toast(`长尾截断: 无效值 "${tpRaw}"（应为 0~1 浮点数或 off）`, 'error');
                return;
            }
            body.truncate_percentile = tpNum;
        }
    }

    if (Object.keys(body).length === 0) { toast('未修改任何字段', 'error'); return; }

    try {
        await api(`/api/platform-config/${platform}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        toast('配置已更新（立即生效）');
        // Close the modal using the same method as the cancel button
        const modal = document.getElementById('tc-interval')?.closest('.modal-overlay');
        if (modal) modal.remove();
        render();
    } catch(e) { toast('保存失败: ' + e.message, 'error'); }
}

async function toggleCookieProbes(platform, label) {

        try {
            const data = await api(`/api/cookies/${platform}/${label}/probes`);
            const probes = data.probes || [];
            if (probes.length === 0) {
                el.innerHTML = '<div style="padding:8px;color:var(--text2);font-size:12px;">暂无探查记录</div>';
            } else {
                // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                //  探查结果渲染（2026-06-02 修复硬截断 30 字符的问题）
                // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                //  历史血泪：原版用 ${error_message.substring(0,30)} 硬截断，
                //  导致 "Cookie probe failed: cookie_jar at '...' has no
                //  origin metadata. Run BBA login first..." 这种关键诊断
                //  消息在 dashboard 上变成 "Cookie probe failed: cookie_ja"
                //  —— 用户根本看不出该跑 BBA 登录。
                //  修法：把 error 拆成独立 block 行，CSS 处理换行（外层已有
                //  max-height:200px + overflow-y:auto），完整显示。
                //  Security：error_message 来自后端异常 str()，必须 escapeHtml。
                el.innerHTML = `<div style="max-height:200px;overflow-y:auto;">
                    ${probes.map(p => `<div style="padding:4px 0;border-bottom:1px solid var(--border);">
                        <div style="display:flex;align-items:center;gap:8px;font-size:12px;">
                            <span class="cookie-dot ${p.result === 'valid' ? 'valid' : 'expired'}" style="width:6px;height:6px;"></span>
                            <span style="color:var(--text2);">${formatTime(p.probe_time)}</span>
                            <span>${getActionDisplayName(p.task_type)}</span>
                            <span style="color:${p.result === 'valid' ? 'var(--success)' : 'var(--error)'};">${p.result}</span>
                        </div>
                        ${p.error_message ? `<div style="margin-top:2px;padding-left:14px;font-size:11px;color:var(--text2);white-space:pre-wrap;word-break:break-word;line-height:1.5;">${escapeHtml(p.error_message)}</div>` : ''}

            }
        } catch(e) {
            el.innerHTML = '<div style="padding:8px;color:var(--error);font-size:12px;">加载失败</div>';
        }
    } else {
        el.classList.add('hidden');
    }
}

// ── Row Actions Dropdown ───────────────────────────────────
// Structured per actions-by-status v2 (spec v4):
//   参数 / 查看产物 / 血缘 ▸ {子任务, 上下游任务} / 打开文件夹 /
//   操作 ▸ {强制成功, 强制启动, 重试失败子任务, 重新执行/重新执行全部, 取消} /
//   日志 / 收藏
// Order is fixed; "操作" sub-menu items render based on (status × is_parent)
// matrix in actions-by-status.md.
function _buildActionsDropdown(t) {
    // Recycle-bin view: show inline restore + purge buttons instead of a
    // dropdown menu. Other dropdown items (params/logs/retry/etc) are
    // intentionally hidden — archived tasks shouldn't be re-run or edited
    // until restored.
    if (typeof currentPage !== 'undefined' && currentPage === 'trash') {
        return `<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();restoreTaskFromTrash('${t.task_id}')">恢复</button>
            <button class="btn btn-sm btn-danger" style="margin-left:6px;" onclick="event.stopPropagation();purgeTaskForever('${t.task_id}')">彻底删除</button>`;
    }
    const items = [];
    items.push(`<button class="dropdown-item" onclick="viewParams('${t.task_id}')">参数</button>`);
    if (hasOutput(t)) {
        items.push(`<button class="dropdown-item dropdown-item--success" onclick="viewProduct('${t.task_id}')">查看产物</button>`);
    }

    // 血缘 ▸ 子任务 / 上下游任务 ── only render parent if at least one child exists
    const lineageSubs = [];
    if (t.task_type === 'batch_run') {
        lineageSubs.push(`<button class="dropdown-item" onclick="viewBatchChildren('${t.task_id}')">子任务</button>`);
    }
    const hasUpstream = (t.depends_on_task_ids && t.depends_on_task_ids.length > 0);
    if (hasUpstream || t.has_downstream) {
        lineageSubs.push(`<button class="dropdown-item" onclick="viewLineage('${t.task_id}')">上下游任务</button>`);
    }
    if (lineageSubs.length > 0) {
        items.push(`<div class="dropdown-item dropdown-item--has-sub" onclick="event.stopPropagation();toggleSubmenu(this)">血缘<div class="dropdown-submenu">${lineageSubs.join('')}</div></div>`);
    }

    if (hasOutput(t)) {
        items.push(`<button class="dropdown-item" onclick="openDir('${t.task_id}')">打开文件夹</button>`);
    }

    // 操作 ▸ 按 spec actions-by-status v2 矩阵渲染（区分 atomic vs batch parent）
    const opSubs = [];
    const isParent = (t.task_type === 'batch_run');
    const status = t.status;
    const isNonTerminal = ['waiting_dependency','queued','running'].includes(status);

    // --- 强制成功（覆盖几乎所有状态，除了已 succeeded） ---
    if (status !== 'succeeded') {
        opSubs.push(`<button class="dropdown-item dropdown-item--success" onclick="${isParent ? `forceSucceededParent('${t.task_id}')` : `forceComplete('${t.task_id}')`}">强制成功</button>`);
    }

    // --- 强制启动（仅 waiting_dependency） ---
    if (status === 'waiting_dependency' && !isParent) {
        opSubs.push(`<button class="dropdown-item" onclick="forceStart('${t.task_id}')">强制启动（忽略依赖）</button>`);
    }

    // --- 重试失败子任务（仅 batch parent + partial_succeeded/failed/interrupted） ---
    if (isParent && ['partial_succeeded','failed','interrupted'].includes(status)) {
        opSubs.push(`<button class="dropdown-item" onclick="retryFailedChildren('${t.task_id}')">重试失败子任务</button>`);
    }

    // --- 重新执行 / 重新执行全部（终态 & 非终态都不允许；只允许 succeeded/partial_succeeded/failed/cancelled/interrupted） ---
    if (['succeeded','partial_succeeded','failed','cancelled','interrupted'].includes(status)) {
        const label = isParent ? '重新执行全部' : '重新执行';
        opSubs.push(`<button class="dropdown-item" onclick="retryTask('${t.task_id}')">${label}</button>`);
    }

    // --- 取消（仅非终态） ---
    if (isNonTerminal) {
        opSubs.push(`<button class="dropdown-item dropdown-item--danger" onclick="cancelTask('${t.task_id}')">取消</button>`);
    }

    if (opSubs.length > 0) {
        items.push(`<div class="dropdown-item dropdown-item--has-sub" onclick="event.stopPropagation();toggleSubmenu(this)">操作<div class="dropdown-submenu">${opSubs.join('')}</div></div>`);
    } else {
        // 矩阵保证此分支永远不进；做防御性占位（置灰）
        items.push(`<div class="dropdown-item dropdown-item--has-sub" style="opacity:0.4;cursor:not-allowed;">操作</div>`);
    }

    items.push(`<button class="dropdown-item" onclick="viewLogs('${t.task_id}', '${t.status}')">日志</button>`);
    // 收藏：永远可见，不校验任务状态。
    // 后端收藏接口对所有状态都接受 source_task_id（详见 favoriteTask），
    // 用户希望在 running/queued 等中途也能收藏当前参数集，便于复用。
    items.push(`<button class="dropdown-item" onclick="favoriteTask('${t.task_id}')">收藏</button>`);

    // 回收站操作 — 终态 + 顶层任务（无 parent_task_id）才允许删除/恢复。
    // 子任务跟着 parent 走，永远不出现在这个菜单里（它们的入口在 batch children 弹窗，
    // 那里也不放删除按钮）。
    const isTopLevel = !t.parent_task_id;
    const TERMINAL = ['succeeded','partial_succeeded','failed','cancelled','interrupted'];
    if (isTopLevel && TERMINAL.includes(t.status)) {
        if (t.archived_at) {
            // 已在回收站：恢复 + 彻底删除
            items.push(`<div class="dropdown-divider"></div>`);
            items.push(`<button class="dropdown-item" onclick="restoreTaskFromTrash('${t.task_id}')">恢复</button>`);
            items.push(`<button class="dropdown-item dropdown-item--danger" onclick="purgeTaskForever('${t.task_id}')">彻底删除</button>`);
        } else {
            items.push(`<div class="dropdown-divider"></div>`);
            items.push(`<button class="dropdown-item dropdown-item--danger" onclick="archiveTask('${t.task_id}')">删除</button>`);
        }
    }

    if (items.length === 0) return '';
    // 3-dot icon button. Inline SVG keeps it dependency-free and crisp at any DPI.
    const icon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>`;
    return `<div class="dropdown" style="display:inline-block;">
        <button class="btn-icon dropdown-toggle" title="更多操作" onclick="event.stopPropagation();toggleDropdown(this)">${icon}</button>
        <div class="dropdown-menu">${items.join('')}</div>
    </div>`;
}
// Backward-compat alias (in case other call sites exist).
function _buildMoreDropdown(t) { return _buildActionsDropdown(t); }

// ── Child Row Actions Dropdown ─────────────────────────────
// Used in the batch-children modal. Same 3-dot trigger as the main table,
// but the dropdown items are intentionally trimmed:
//   - 参数 / 日志 / 查看产物 / 打开文件夹 already render as inline buttons
//     in the row (left of this dropdown), so they're omitted here.
//   - 血缘 is omitted: a child of a batch_run is always atomic (never a
//     batch_run parent itself), so "子任务" is never relevant; "上下游任务"
//     for children inside a single batch is also redundant.
//   - 删除/恢复/彻底删除 are NOT rendered: the daemon hard-rejects deleting
//     a non-top-level task (see crawlhub/api/routes.py: code='not_top_level').
//     Children archive/purge in lockstep with their parent. Adding a button
//     that always 400s would be misleading.
//
// Everything else mirrors `_buildActionsDropdown` 1:1 — operations submenu
// (强制成功 / 强制启动 / 重新执行 / 取消) and 收藏.
function _buildChildActionsDropdown(c) {
    const items = [];
    const status = c.status;
    const isNonTerminal = ['waiting_dependency', 'queued', 'running'].includes(status);

    // 操作 ▸ — atomic-task subset of main table's matrix.
    const opSubs = [];

    // 强制成功（除已 succeeded 外都给）
    if (status !== 'succeeded') {
        opSubs.push(`<button class="dropdown-item dropdown-item--success" onclick="forceComplete('${c.task_id}')">强制成功</button>`);
    }
    // 强制启动（仅 waiting_dependency）
    if (status === 'waiting_dependency') {
        opSubs.push(`<button class="dropdown-item" onclick="forceStart('${c.task_id}')">强制启动（忽略依赖）</button>`);
    }
    // 重新执行（终态）
    if (['succeeded', 'partial_succeeded', 'failed', 'cancelled', 'interrupted'].includes(status)) {
        opSubs.push(`<button class="dropdown-item" onclick="retryTask('${c.task_id}')">重新执行</button>`);
    }
    // 取消（非终态）
    if (isNonTerminal) {
        opSubs.push(`<button class="dropdown-item dropdown-item--danger" onclick="cancelTask('${c.task_id}')">取消</button>`);
    }

    if (opSubs.length > 0) {
        items.push(`<div class="dropdown-item dropdown-item--has-sub" onclick="event.stopPropagation();toggleSubmenu(this)">操作<div class="dropdown-submenu">${opSubs.join('')}</div></div>`);
    }

    // 收藏（任意状态都允许，与主表保持一致）
    items.push(`<button class="dropdown-item" onclick="favoriteTask('${c.task_id}')">收藏</button>`);

    if (items.length === 0) return '';
    const icon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>`;
    return `<div class="dropdown" style="display:inline-block;">
        <button class="btn-icon dropdown-toggle" title="更多操作" onclick="event.stopPropagation();toggleDropdown(this)">${icon}</button>
        <div class="dropdown-menu">${items.join('')}</div>
    </div>`;
}

function toggleDropdown(btn) {
    const menu = btn.nextElementSibling;
    // Close all other dropdowns first
    document.querySelectorAll('.dropdown-menu.show').forEach(m => { if (m !== menu) m.classList.remove('show'); });
    // Also close any open submenus when switching root menus.
    document.querySelectorAll('.dropdown-submenu.show').forEach(s => s.classList.remove('show'));
    document.querySelectorAll('.dropdown-item--has-sub.active').forEach(s => s.classList.remove('active'));
    const willShow = !menu.classList.contains('show');
    menu.classList.toggle('show');
    if (willShow) _positionDropdownMenu(btn, menu);
}

// Toggle a level-2 submenu. Positioned with fixed coords so it escapes
// .table-scroll like the parent menu does.
function toggleSubmenu(parentItem) {
    const sub = parentItem.querySelector(':scope > .dropdown-submenu');
    if (!sub) return;
    // Close sibling submenus.
    const root = parentItem.closest('.dropdown-menu');
    if (root) {
        root.querySelectorAll(':scope > .dropdown-item--has-sub > .dropdown-submenu.show').forEach(s => {
            if (s !== sub) s.classList.remove('show');
        });
        root.querySelectorAll(':scope > .dropdown-item--has-sub.active').forEach(s => {
            if (s !== parentItem) s.classList.remove('active');
        });
    }
    const willShow = !sub.classList.contains('show');
    sub.classList.toggle('show');
    parentItem.classList.toggle('active', willShow);
    if (willShow) _positionSubmenu(parentItem, sub);
}

function _positionSubmenu(parent, sub) {
    const rect = parent.getBoundingClientRect();
    sub.style.visibility = 'hidden';
    sub.style.left = '0px';
    sub.style.top = '0px';
    const subRect = sub.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Default: open to the left of parent (parent menu sits right-aligned).
    let left = rect.left - subRect.width - 2;
    if (left < 4) left = rect.right + 2;  // flip to right if no room
    if (left + subRect.width > vw - 4) left = Math.max(4, vw - subRect.width - 4);
    let top = rect.top;
    if (top + subRect.height > vh - 4) top = Math.max(4, vh - subRect.height - 4);
    sub.style.left = left + 'px';
    sub.style.top = top + 'px';
    sub.style.visibility = '';
}

// ── Recycle bin: ConfirmDialog + archive / restore / purge handlers ─────
//
// ConfirmDialog: a single reusable modal. Each call returns a Promise that
// resolves to true (confirmed) or false (cancelled). Variant 'danger' shows
// a red confirm button; 'safe' is the default. Pass `requireText` to make
// the user type a phrase before confirm enables (used by 'purge all').
//
// Why not `confirm()`: native dialogs block the JS thread (interrupting
// auto-refresh, ECharts animations, websockets), are non-themeable, and
// look out of place. This implementation matches existing modal styling.
function showConfirmDialog({ title, message, confirmLabel = '确认', cancelLabel = '取消', variant = 'safe', requireText = null } = {}) {
    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.zIndex = '9999';
        const cls = variant === 'danger' ? 'btn-danger' : 'btn-primary';
        const escMsg = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
        const reqHtml = requireText
            ? `<div class="form-group" style="margin-top:12px;">
                  <label>请输入「${escMsg(requireText)}」以确认</label>
                  <input type="text" id="cd-confirm-input" placeholder="${escMsg(requireText)}" autocomplete="off">
               </div>`
            : '';
        overlay.innerHTML = `
          <div class="modal" style="max-width:480px;">
            <h3 style="margin-bottom:8px;">${escMsg(title || '确认操作')}</h3>
            <div style="font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;">${escMsg(message || '')}</div>
            ${reqHtml}
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
              <button class="btn btn-outline" id="cd-cancel">${escMsg(cancelLabel)}</button>
              <button class="btn ${cls}" id="cd-confirm" ${requireText ? 'disabled' : ''}>${escMsg(confirmLabel)}</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        const confirmBtn = overlay.querySelector('#cd-confirm');
        const cancelBtn = overlay.querySelector('#cd-cancel');
        const input = overlay.querySelector('#cd-confirm-input');
        const cleanup = () => { try { document.body.removeChild(overlay); } catch (_) {} document.removeEventListener('keydown', onKey); };
        const ok = () => { cleanup(); resolve(true); };
        const no = () => { cleanup(); resolve(false); };
        const onKey = (e) => {
            if (e.key === 'Escape') { e.preventDefault(); no(); }
            if (e.key === 'Enter' && !confirmBtn.disabled) { e.preventDefault(); ok(); }
        };
        document.addEventListener('keydown', onKey);
        confirmBtn.addEventListener('click', ok);
        cancelBtn.addEventListener('click', no);
        if (input) {
            input.addEventListener('input', () => {
                confirmBtn.disabled = (input.value.trim() !== requireText);
            });
            input.focus();
        } else {
            confirmBtn.focus();
        }
    });
}

async function archiveTask(taskId) {
    const ok = await showConfirmDialog({
        title: '移入回收站',
        message: `任务 ${taskId} 将移入回收站，30 天后自动彻底删除。\n该操作不会立刻删除产物和日志，可在回收站中恢复或彻底删除。`,
        confirmLabel: '移入回收站',
        variant: 'danger',
    });
    if (!ok) return;
    try {
        await api(`/api/tasks/${taskId}`, { method: 'DELETE' });
        toast('已移入回收站');
        invalidateDashboardOnNextTick();
        render();
    } catch (e) {
        // Backend returns structured detail for the 3 known refusals.
        const detail = e && e.detail ? e.detail : null;
        if (detail && detail.code === 'has_downstream') {
            const downstream = (detail.downstream || []).map(d => `• ${d.task_id} (${d.status})`).join('\n');
            toast(detail.message + (downstream ? `\n\n${downstream}` : ''), 'error');
        } else if (detail && detail.message) {
            toast(detail.message, 'error');
        } else {
            toast('删除失败: ' + (e && e.message ? e.message : e), 'error');
        }
    }
}

async function restoreTaskFromTrash(taskId) {

}

async function purgeTaskForever(taskId) {

async function purgeAllTrash() {
    // Two-stage confirm: show count first, then require typed phrase.
    let count = 0;
    try {
        const list = await api('/api/trash?limit=1000');
        count = (list || []).length;
    } catch (_) {}
    if (count === 0) { toast('回收站已空'); return; }
    const ok = await showConfirmDialog({
        title: '清空回收站',
        message: `将永久删除回收站中的 ${count} 个任务，连同它们的产物和日志。\n\n此操作不可恢复。`,
        confirmLabel: '清空全部',
        variant: 'danger',
        requireText: '清空全部',
    });
    if (!ok) return;
    try {
        const resp = await api('/api/trash/purge_all', { method: 'POST' });
        toast(`已清空 ${resp.purged} 个任务${resp.failed ? `（${resp.failed} 个失败）` : ''}`);
        invalidateDashboardOnNextTick();
        render();
    } catch (e) {
        toast('清空失败: ' + (e && e.message ? e.message : e), 'error');
    }
}

// Force dashboard to re-fetch on next mount/refresh tick. We don't keep a
// data cache (renderDashboardSmart re-fetches on every call), but if the
// user happens to be on /dashboard right now, the next 5s auto-refresh will
// pick up the change. To make it feel instant when switching tabs back, we
// reset _mountedPage so the skeleton re-builds and ECharts gets fresh data.
function invalidateDashboardOnNextTick() {
    if (typeof _mountedPage !== 'undefined' && _mountedPage === 'dashboard') {
        // Already mounted — trigger an immediate background refresh so
        // dash-stats/charts drop the archived task without waiting 5s.
        const main = document.getElementById('main-content');
        if (main && currentPage === 'dashboard') {
            renderDashboardSmart(main).catch(() => {});
        }
    }
    // If user is on trash/tasks now, the next time they switch to dashboard
    // renderDashboardSmart will fetch fresh data anyway (no cache to bust).
}

// Compute fixed-position coordinates so the menu escapes overflow:auto ancestors
// (e.g. .table-scroll) and stays within the viewport.
function _positionDropdownMenu(btn, menu) {
    const rect = btn.getBoundingClientRect();
    // Temporarily ensure the menu is measurable.
    menu.style.visibility = 'hidden';
    menu.style.left = '0px';
    menu.style.top = '0px';
    const menuRect = menu.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Right-align with the toggle button, clamp within viewport.
    let left = rect.right - menuRect.width;
    if (left < 4) left = 4;
    if (left + menuRect.width > vw - 4) left = vw - menuRect.width - 4;
    // Prefer dropping down; flip up if overflow bottom.
    let top = rect.bottom + 4;
    if (top + menuRect.height > vh - 4) {
        top = rect.top - menuRect.height - 4;
        if (top < 4) top = Math.max(4, vh - menuRect.height - 4);
    }
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
    menu.style.visibility = '';
}

// Close dropdowns on outside click
document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown') && !e.target.closest('.dropdown-submenu')) {
        document.querySelectorAll('.dropdown-menu.show').forEach(m => m.classList.remove('show'));
        document.querySelectorAll('.dropdown-submenu.show').forEach(s => s.classList.remove('show'));
        document.querySelectorAll('.dropdown-item--has-sub.active').forEach(s => s.classList.remove('active'));
    }
});
// Close/reposition dropdowns on scroll or resize so they don't float in stale positions.
window.addEventListener('scroll', () => {
    document.querySelectorAll('.dropdown-menu.show').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.dropdown-submenu.show').forEach(s => s.classList.remove('show'));
    document.querySelectorAll('.dropdown-item--has-sub.active').forEach(s => s.classList.remove('active'));
}, true);
window.addEventListener('resize', () => {
    document.querySelectorAll('.dropdown-menu.show').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.dropdown-submenu.show').forEach(s => s.classList.remove('show'));
    document.querySelectorAll('.dropdown-item--has-sub.active').forEach(s => s.classList.remove('active'));
});
