<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quark Ring</title>
<style>
    :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --accent-cyan: #22d3ee;
        --accent-pink: #ec4899;
        --text: #e4e6eb;
        --text2: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background:
            radial-gradient(circle at 20% 30%, rgba(99,102,241,0.08) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(34,211,238,0.06) 0%, transparent 50%),
            var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 48px;
        overflow: hidden;
    }

    /* ============ 圆环主舞台 ============ */
    .stage {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 外层呼吸光晕 */
    .glow {
        position: absolute;
        inset: -40px;
        border-radius: 50%;
        background: radial-gradient(circle,
            rgba(99,102,241,0.35) 0%,
            rgba(129,140,248,0.18) 35%,
            transparent 70%);
        filter: blur(20px);
        animation: breathe 3.6s ease-in-out infinite;
        pointer-events: none;
    }

    /* 主圆环（SVG） */
    .ring {
        width: 100%;
        height: 100%;
        animation: spin 12s linear infinite;
    }

    /* 内层小圆环（反向旋转，呼吸缩放） */
    .ring-inner {
        position: absolute;
        width: 60%;
        height: 60%;
        animation: spin-reverse 8s linear infinite, pulse 3.6s ease-in-out infinite;
    }

    /* 中心圆点 */
    .core {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%,
            #ffffff 0%,
            var(--accent-hover) 40%,
            var(--accent) 100%);
        box-shadow:
            0 0 20px rgba(129,140,248,0.8),
            0 0 40px rgba(99,102,241,0.5),
            inset -2px -2px 6px rgba(0,0,0,0.3);
        animation: core-breathe 3.6s ease-in-out infinite;
    }

    /* ============ 动画 ============ */
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
        to { transform: rotate(-360deg); }
    }

    @keyframes breathe {
        0%, 100% {
            opacity: 0.55;
            transform: scale(0.92);
        }
        50% {
            opacity: 1;
            transform: scale(1.08);
        }
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(0.95) rotate(0deg);
            opacity: 0.85;
        }
        50% {
            transform: scale(1.05) rotate(-180deg);
            opacity: 1;
        }
    }

    @keyframes core-breathe {
        0%, 100% {
            transform: scale(1);
            box-shadow:
                0 0 18px rgba(129,140,248,0.7),
                0 0 36px rgba(99,102,241,0.4),
                inset -2px -2px 6px rgba(0,0,0,0.3);
        }
        50% {
            transform: scale(1.18);
            box-shadow:
                0 0 28px rgba(129,140,248,1),
                0 0 60px rgba(99,102,241,0.6),
                0 0 90px rgba(34,211,238,0.3),
                inset -2px -2px 6px rgba(0,0,0,0.3);
        }
    }

    /* ============ 文字 ============ */
    .label {
        text-align: center;
        color: var(--text2);
        font-size: 13px;
        letter-spacing: 2px;
        animation: text-fade 3.6s ease-in-out infinite;
    }
    .label .title {
        display: block;
        color: var(--text);
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 4px;
        margin-bottom: 6px;
    }
    @keyframes text-fade {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="stage">
    <div class="glow"></div>

    <!-- 外层主圆环 -->
    <svg class="ring" viewBox="0 0 200 200">
        <defs>
            <!-- 主渐变：indigo -> cyan -> pink -->
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#6366f1"/>
                <stop offset="50%"  stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
            <!-- 副渐变：浅 indigo -->
            <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
            </linearGradient>
            <!-- 发光滤镜 -->
            <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- 底环：暗色描边 -->
        <circle cx="100" cy="100" r="86"
                fill="none"
                stroke="rgba(99,102,241,0.12)"
                stroke-width="6"/>

        <!-- 主弧线（占 70%） -->
        <circle cx="100" cy="100" r="86"
                fill="none"
                stroke="url(#ringGrad)"
                stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="380 540"
                filter="url(#ringGlow)"/>

        <!-- 副弧线（占 30%，错开） -->
        <circle cx="100" cy="100" r="86"
                fill="none"
                stroke="url(#ringGrad2)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="80 540"
                stroke-dashoffset="-420"/>
    </svg>

    <!-- 内层小圆环 -->
    <svg class="ring-inner" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="80"
                fill="none"
                stroke="rgba(129,140,248,0.18)"
                stroke-width="2"
                stroke-dasharray="4 8"/>
        <circle cx="100" cy="100" r="80"
                fill="none"
                stroke="url(#ringGrad)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="120 360"
                filter="url(#ringGlow)"/>
    </svg>

    <!-- 中心核心 -->
    <div class="core"></div>
</div>

<div class="label">
    <span class="title">CRAWLHUB</span>
    <span>LOADING · PLEASE WAIT</span>
</div>

</body>
</html>
